481f4803fe0d369f3e242"},{"text":"リセスライト／recessed lights","author":"","book":"","note":"天井埋め込み式照明。近年、アメリカで流行。","id":"35530ed08f3481f490e3c0096e84e415"},{"text":"tadpole","author":"","book":"","note":"オタマジャクシ。","id":"35530ed08f3481f581d8d62cff9506dc"},{"text":"Nero Marquina","author":"","book":"","note":"スペイン・マルキーナ地方で採掘される高品質の黒色大理石の一種。","id":"35530ed08f3481f5ae9fdfe0f1acac91"},{"text":"酒保／しゅほ","author":"","book":"","note":"軍隊で兵士に酒・食料・日用品を売る店。営内売店。","id":"35530ed08f3481f68a38e12894923795"},{"text":"permanently","author":"","book":"","note":"永遠に。恒久的に。","id":"35530ed08f3481f78866cb83745e45fb"},{"text":"恐懼／きょうく","author":"","book":"","note":"恐れ入って縮まること。","id":"35530ed08f3481f7a4f9d7fe2604bbbf"},{"text":"葉叢／はむら","author":"","book":"","note":"群がり茂った葉。葉の茂み。","id":"35530ed08f3481f7b67bc1d4e462d1fd"},{"text":"オルガする","author":"","book":"","note":"オルガナイザーの略。組合や政党の組織拡充などのため、本部から派遣されて、労働者・大衆の中で宣伝・勧誘活動を行うこと。また、その人。","id":"35530ed08f3481f88bf0f36c040d4ad3"},{"text":"脂溶性ビタミン","author":"","book":"","note":"A、D、E、K。肝臓、脂肪細胞に蓄積される。","id":"35530ed08f3481f98712fae81aa751cf"},{"text":"パイロキネシス／pyrokinesis","author":"","book":"","note":"超心理学の超能力の 1 つで、火を発生させることのできる能力。ギリシャ語の πυρ (pûr、「火、稲妻」を意味する) と κίνησις (kínesis、「動き」を意味する) から。","id":"35530ed08f3481f9ad10fd7afdb4fd34"},{"text":"マカ族／Makah","author":"","book":"","note":"ワシントン州オリンピック半島一帯に居住するアメリカ先住民　2 つのクジラ漁伝統を持ち、他の多くの先住民と違ってカジノを持たず漁業で生計を立てる。19 世紀、ワシントン準州知事アイザック・スティーブンスからどこを保留地に欲しいかと尋ねられたチュカ・ウィトル首長が「海が欲しい。あれは私の国だ」と答えたという逸話がある。","id":"35530ed08f3481fab617d85fa4a2e92d"},{"text":"パイピング／piping","author":"","book":"","note":"手芸や裁縫でよく使う手法で、布の端をテープ状でくるむ装飾方法。","id":"35530ed08f3481fb9434e731a7609598"},{"text":"Lion’s Head Village","author":"","book":"","note":"アメリカ・コロラド州の山間の街。","id":"35530ed08f3481fc8f6de0642d082832"},{"text":"アトリウム／atrium","author":"","book":"","note":"巨大なガラス張りの吹抜け空間。","id":"35530ed08f3481fdbbc7cef09f8bee67"},{"text":"マシンエルフ／machine elves","author":"","book":"","note":"DMT を摂取した人の多くが見るという姖精。","id":"35530ed08f3481fe93c9e32f5cb78dfd"},{"text":"大向こう向け／おおむこうむけ","author":"","book":"","note":"意図的に大衆受けをねらった言動をする。電車や劇場の「大向こう／遠くの観客」を意識した振る舞いをいう。","id":"35530ed08f3481feabd3f77e3ebc8842"},{"text":"ingredient","author":"","book":"","note":"材料。構成物。重要な要素。\nラテン語 ingrediēns (in- 中に + gradī 行く + -ēns 現在分詞語尾 = 中にはいる物 → 構成要素)。関連: GRADIENT, GRADE, INGRESS。","id":"35530ed08f3481fead7bcabd413b3f48"},{"text":"salient な刺激／顕著刺激","author":"","book":"","note":"知覚的に目立つ刺激。ヒトの視覚システムが自動的に注意を振り向ける(ボトムアップ型注意)対象。意図的な注意の向け方(トップダウン型注意)と対比される。","id":"35530ed08f3481ffa23ced03e98112d7"},{"text":"赫／かく","author":"漢字。①(訓: あか) 鮮やかに赤いさま、輝くさま。②(音: かく) 怒り盛んなさま、威光が盛んなさま。「赫怒」「赫赫」「赫灼」など熟語に用いる。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f348104803cdcad82467367"},{"text":"照応／しょうおう","author":"","book":"","note":"二つのものが互いに対応し、響き合うこと。呼応。「文章の前後が―する」「色彩と感情が―する」のように使う。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f3481049359d84485ef0bac"},{"text":"白眼視／はくがんし","author":"","book":"","note":"冷淡な目つきで見ること。憎悪や軽蔑をもって相手を見ること。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f348104b229e1f3a3e66a9d"},{"text":"射垜／しゃだ","author":"","book":"","note":"弓矢や鉄砲の的の後ろに設ける盛り土や土塁。流れ弾を受け止める安全装置。「垜」は土を盛った的場の意。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f348105aa5ec2d6c8cb03e7"},{"text":"心のフィルター／こころのフィルター","author":"信念と一致しない情報を脳が却下し、信念の裏付けとなる証拠だけを受け入れる認知バイアス。抑鬱状態で顕著になり、自己否定的思考を補強する。","book":"ジュリー・スミス／『一番大切なのに誰も教えてくれない メンタルマネジメント大全』","note":"","id":"35630ed08f348106af1acd6a1b2f7f2a"},{"text":"燭光／しょっこう","author":"","book":"","note":"ともしびの火、ろうそくの火の光。明るさの単位「カンデラ（カンチ、火点」の旧訳語としても使われる。\nマーク・グリーニー／『暗殺者の鎮魂』","id":"35630ed08f348107a8faec556441e71a"},{"text":"膺懲／ようちょう","author":"名詞・サ変動詞。悪人や敵を討って懲らしめること。武力をもって討伐すること。漢籍由来の文語。「鬼畜米英を膺懲す」のように使われた。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f348109922ef7348381f557"},{"text":"標点／ひょうてん","author":"","book":"","note":"目印として記す点。射撃などにおける照準点。基準となる点。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f348109a78ec7cf4bf84810"},{"text":"払暁／ふつぎょう","author":"名詞。夜明け方、明け方。日が昇り出す前後の時刻。軍事・文学で多用される。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f34810b8f73e4050c492e0f"},{"text":"掣肘／せいちゅう","author":"","book":"","note":"そばから口出しして人の自由な行動を妨げること。「―を加える」「―を受ける」のように使う。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f34810b9066cfff3f588a35"},{"text":"感情的な推論／かんじょうてきなすいろん","author":"感情を客観的事実として推論する認知歪み。「不安だから本当に危険なはずだ」と思い込む型。認知行動療法で扱う「認知の歪み」の代表的タイプ。","book":"ジュリー・スミス／『メンタルマネジメント大全』","note":"","id":"35630ed08f34810b9b1de98a4773ccee"},{"text":"言明／げんめい","author":"","book":"","note":"はっきりと言い切ること。明言。公的な発言・宣言。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f34810bb4e9e65fe79a67af"},{"text":"フレンチスリーブ","author":"袖付けの切り替えがなく、身頃から続いた袖。袖を切り出さず、肩からそのまま腋下近くまで伸びるデザイン。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f34810c8505cb470fa0d8f9"},{"text":"姦しい／かしましい","author":"","book":"","note":"声や音が入り乱れて騒がしい。やかましい。「女三人寄れば姦しい」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34810db573e2663a363bfe"},{"text":"蛙女房／かえるにょうぼう","author":"民話のmotif。蛙が人間女性に化けて結婚する型の異類婚姻譚。世界各地に分布する民俗学的型分類。","book":"沖田瑞穂／『世界の神話』","note":"","id":"35630ed08f34810e8e02f79a1d164275"},{"text":"殺ぐ／そぐ","author":"","book":"","note":"鋭く削り取る。物の端などを斜めに切り落とす。勢いや力を弱める。\n映島巡／『小説NieR:Automata 長イ話』","id":"35630ed08f34810eba0fe7ea1f055402"},{"text":"諧謔／かいぎゃく","author":"","book":"","note":"気のきいた、おもしろみのある言葉や言いまわし。ユーモア。洒落。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f34810fa42fe6983026bf50"},{"text":"リトグラフ／lithograph","author":"石版画。石版とインクの反発作用を利用した印刷技術で、微細な表現が可能。ドイツ人 Senefelder が 1796 年に発明。Lithograph。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f34811196f4f75b43932cd8"},{"text":"スターリン主義／スターリンしゅぎ","author":"スターリンによる一党独裁・計画経済・粛清・個人崇拝などを特徴とするソ連型の政治経済体制。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 上』","note":"","id":"35630ed08f3481128f87c78af88b0322"},{"text":"千変万化／せんぺんばんか","author":"","book":"","note":"さまざまに変化すること。さまざまに変わり進むこと。\n冲方丁／『生き残る作家、生き残れない作家』","id":"35630ed08f348112958fe891c3a4f186"},{"text":"青息吐息／あおいきといき","author":"","book":"","note":"苦しさや始末に困ったときにフッと取る息。貧乏や限界状態にあるさまをいう。\n福井晴敏／『機動戦士ガンダムUC9 虹の彼方に 上』","id":"35630ed08f3481138d61f9d183a91667"},{"text":"扁桃体／へんとうたい","author":"脳の側頭葉内側の神経核群。情動・恐怖反応・記憶形成に関わる脳器官。","book":"帚木蓬生／『ネガティブ・ケイパビリティ』","note":"","id":"35630ed08f348113ae06ff080654699f"},{"text":"道程／どうてい","author":"","book":"","note":"目的地までの道のり。そこに至るまでの過程。街道をひと邀り、長さ・距離・進捗を含意する。\n長月達平、梅原英司／『Vivy prototype 1巻』","id":"35630ed08f34811483a2d0bbbe3ba989"},{"text":"腸神経系／ちょうしんけいけい","author":"","book":"","note":"消化管壁の内部に網目状に分布する自律神経系。脳の指示を受けずに消化機能を独自に制御することから「第二の脳」とも呼ばれる。ENS (Enteric Nervous System)。\nジム・クウィック／『LIMITLESS 超加速学習』","id":"35630ed08f3481148e2dff9f6ad1c1ef"},{"text":"空頼み／そらだのみ","author":"","book":"","note":"あてにならない頗み。期待できないことに期待をかけること。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481148fabc4dfc9d9dd92"},{"text":"スペア・ブラザー","author":"病気の兄弟・姉妹のドナーとなることを目的に意図的に出産された弟・妹を表す用語。生命倫理的議論の対象。","book":"シカゴ・メッド","note":"","id":"35630ed08f3481159140f77874ed807f"},{"text":"厖大／ぼうだい","author":"","book":"","note":"計り知れないほど大きいさま。「膨大」の異字体。「―な資料」「―なデータ量」のように使う。\n大澤真幸ほか／『私たちはAIを信頼できるか』","id":"35630ed08f348115a0cfe6416509fbdb"},{"text":"群選択／ぐんせんたく","author":"","book":"","note":"進化が個体ではなく集団単位で働くという考え方。「不安定な休戦状態」が必要とされ、現代では限定的にしか支持されない。\nアンドリュー・スティール／『AGELESS（エイジレス）』","id":"35630ed08f348115ab51f4eb6fd90e88"},{"text":"囲繞／いにょう","author":"","book":"","note":"周りをぐるりと取り囲むこと。「いじょう」とも読む。「―地」「家を―する木立」のように使う。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f34811681a5e2f92fc9a947"},{"text":"バプテスマ","author":"キリスト教の洗礼。日本語訳では「洗礼」が一般的だが、ギリシャ語原音「バプテスマ」で表記する場合もある。","book":"ジョーゼフ・キャンベル・ビル・モイヤーズ／『神話の力』","note":"","id":"35630ed08f348116b8fbd5a4a97ac51a"},{"text":"自家薬籠中／じかやくろうちゅう","author":"","book":"","note":"「他人の思想を―のものにする」のように使う。身につけて思うように使いこなし、いつでも自由に使えるもののこと。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f3481188584de75a379d765"},{"text":"クラッシュ症候群／クラッシュしょうこうぐん","author":"圧挫症候群。長時間の圧迫から解放された時に筋肉壊死成分が血液循環で全身に回り急性腎不全を起こす。","book":"蒔田陽平／『ナイト・ドクター 上』","note":"","id":"35630ed08f348118a376f8ff4dbbb087"},{"text":"浮沈／ふちん","author":"","book":"","note":"浮かぶことと沈むこと。転じて、栄えることと衰えること、運命の盛衰。「政界の―」「―を繰り返す」のように使う。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f34811a8cfdc61987ceeadd"},{"text":"意気阻喪／いきそそう","author":"意気込みが衰え弱ること。「阻」は進みがストップ、「喪」は失う意。「―する」「―を招く」のように使う四字熟語。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f34811b808afa9ab35d9ccb"},{"text":"排撃／はいげき","author":"","book":"","note":"排斥して攻撃すること。代表例: 「迫害と―」「その考え方を―する」。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f34811bbe14e3ac2742a3e1"},{"text":"道程／どうてい","author":"","book":"","note":"道のり。そこに至るまでの道筋・過程。\n長月達平／『Vivy prototype 1巻』","id":"35630ed08f34811c89cce7dd2a549bdf"},{"text":"糸遊／いとゆう","author":"陽炎の古名。春・夏に地面から立ちのぼる温められた空気のゆらめき。古語・詩歌で使われる。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f34811d86dad37d42e6109f"},{"text":"祐筆／ゆうひつ","author":"名詞。武家・公家・寺社などで主君に仕えて文書の作成や記録を担当した役職、またその人。「右筆」とも書く。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f34811d9163cc055d8febb6"},{"text":"瞞着／まんちゃく","author":"","book":"","note":"人をだまして欺くこと、ごまかすこと。「瞞」はだます意、「着」はひっつける意。「―を企てる」「―される」のように使う。\nマーク・グリーニー／『暗殺者の鎮魂』","id":"35630ed08f34811d9abaf341d1b0db71"},{"text":"口惜しい／くやしい","author":"","book":"","note":"そうなるべきではないと思い返して、うらめしく思う。残念で腹立たしい。\n長月達平／『Vivy prototype 1巻』","id":"35630ed08f34811dae21ccb87ef6f7b7"},{"text":"聖職按手礼／せいしょくあんしゅれい","author":"","book":"","note":"キリスト教で、聖職者 (牧師・司祭・司教) を任命する際に、任命者の頭や肩に手を置いて以て聖霊の赋与を願う儀式。「按手」は手を置いて祝福を以てすること。\n黒崎真／『マーティン・ルーサー・キング―非暴力の闘士』","id":"35630ed08f34811e936ff8e8fde49027"},{"text":"慙愧／ざんき","author":"","book":"","note":"自分の言動を恥じ反省すること。「慙愧に堪えない」と使う。慚愧とも書く。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34811e9388feb22f47a021"},{"text":"葉々／ようよう","author":"","book":"","note":"枝葉の一枚一枚。多くの葉。葉ごと。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34811e9549ca571d3b3dbc"},{"text":"微に入り細をうがった","author":"態言。こまかな部分まで詳しく説明するさま。「穿つ」は「うがつ (鍵をあける・見抵く)」と読み、「細部をうがつ (詳しく探る)」から転じた態用句。","book":"マーク・グリーニー／『暗殺者の飛躍 上』","note":"","id":"35630ed08f34811ea75ccb99bc817f4d"},{"text":"閉口／へいこう","author":"","book":"","note":"ひどい目にあって言葉に詰まること。言い返したり反論したりできず軒下ること。もて余さず困りこみること。\n長月達平、梅原英司／『Vivy prototype 1巻』","id":"35630ed08f34811ebf26f4cb4e2775da"},{"text":"夜闇／よやみ","author":"名詞。夜の闇。月明かりも届かない暗夜のとばり。文学的・古語的表現。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f348120b040fd87b6059a74"},{"text":"乾坤一擲／けんこんいってき","author":"","book":"","note":"天地を賭けて運命を決めるような大勝負を一度の行動でしかけること。命運を賭けた一回限りの大博打。「乾坤」は天と地、「一擲」はサイコロを一回投げること。\n三田誠／『ロード・エルメロイII世の冒険 11 星冠密議(３)』","id":"35630ed08f348120b7b6d1fd85e9dc33"},{"text":"タティングレース","author":"シャトル（舟形の糸巻き）を使い、結び目を作ってレースを編む手芸技法。和風レースの代表的技法の一つ。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f34812282d0f9f176eb6f97"},{"text":"清冽／せいれつ","author":"","book":"","note":"清く澄んで冷たいさま。水や空気などが澄み切っているさま。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f348122991effea93ca34ca"},{"text":"レジメンタル・タイ／regimental tie","author":"斜めのストライプ柄のネクタイ。イギリス軍・クラブ・スクールなどの連隊・所属色を表したシグネチャードレス。Regimental tie。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f34812388a2c55491a40988"},{"text":"ペンネ","author":"","book":"","note":"ペン先のように両端を斜めに切り落とした筒状のショートパスタ。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f348123b840c3c7ead44d1f"},{"text":"斯界／しかい","author":"名詞。この分野、この社会。特定の専門分野を指して「斯界の権威」のように用いる文語。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481248602c64f0af549ed"},{"text":"匪賊／ひぞく","author":"","book":"","note":"集団で人々を襲い、金品・財物を略奪する盗賊。バンディット。「「区」は、邪悪・不正を意味する。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f34812497d1c1cc4ecba3a6"},{"text":"趨向／すうこう","author":"物事の成り行きがある方向へ向かうこと。趨勢（すうせい）と同義的。「時代の―」「歴史的―」のように使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f348124b232fc55acad9114"},{"text":"紫煙／しえん","author":"紫色の煙。特に吐き出された脈草の煙を文学的に言う。「―をぐらす」「―の香り」などと使う。","book":"福井晴敏／『機動戦士ガンダムUC9 虹の彼方に 上』","note":"","id":"35630ed08f3481259bcfe8b15f89b4f2"},{"text":"恃む／たのむ","author":"頼りにする。あてにする。「―むに足らず」「力を―む」のように使う文語表現。","book":"池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","note":"","id":"35630ed08f348125ac33c517aa4a4740"},{"text":"エピゴーネン","author":"Epigone。先人の作風・言動を模倣するだけの独自性のない追随者。文芸・思想・古典ギリシャ文化史で使う語。","book":"野崎透／『アニメーションの脚本術』","note":"","id":"35630ed08f348125b362c99e21cab60d"},{"text":"ドゥンボヴィツァ／Dâmbovița","author":"","book":"","note":"ルーマニアの首都ブカレストを流れる川。ドナウ川の支流。街を東西に貨いて、ブカレストのしんぼるしとなっている。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f34812687fce82f88d56e00"},{"text":"披見／ひけん","author":"","book":"","note":"書面・手紙を開いて見ること。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481268e41c9f9fec63174"},{"text":"琥珀色／こはくいろ","author":"琥珀のような、透明感のある黄褐色。やや赤みを帯びた濃い黄色。「―の瞳」「―の液体」のように使う。","book":"長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","note":"","id":"35630ed08f348126b114cf63042cc933"},{"text":"同道／どうどう","author":"","book":"","note":"同行すること。ともに連れ立って道を行くこと。「―を請う」「―を藦わる」のように使う。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f3481278d1dd200e3fdef54"},{"text":"北欧神話における死後の獣化","author":"","book":"","note":"北欧神話に見られる、死者の魂がその生前の徳・性質に応じた動物に変容するという信仰。Beast Transformation After Death。","id":"35630ed08f348127a587c6134bad6ce7"},{"text":"オーガンジー","author":"薄くて軽く、ハリのある風合いの固い手織りの平織り。ウェディングドレスやフォーマル装でよく使われる。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f348127b1deec7d4c32166f"},{"text":"教皇分界線／きょうこうぶんかいせん","author":"1493年ローマ教皇が定めたスペイン・ポルトガル新世界領土分界線。トルデシリャス条約の前身。","book":"川北稔／『砂糖の世界史』","note":"","id":"35630ed08f348128ae7fcebf9c7f7994"},{"text":"噴飯／ふんぱん","author":"","book":"","note":"あまりにおかしくて、口に含んだ飯を噴き出してしまうこと。「―もの」の形で、笑いを禁じ得ないほど馬鹿げているさまをいう。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34812a8908ccf54f7f0f7d"},{"text":"微に入り細をうがった／びにいりさいをうがった","author":"","book":"","note":"細部に至るまで詳しく行き届いているさま。「うがつ」は穴を開ける意で、転じて隅々まで調べ尽くす意。「―調査」のように使う。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f34812a9413d66bcb611f74"},{"text":"厭悪／えんお","author":"名詞・サ変動詞。嫌い憎むこと。嫌悪。「厭悪の情を抱く」「厭悪に眇める」のように、感情の強い拒絶を表す文語。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f34812a96c6c8e6cd1c8d08"},{"text":"ウィンザー・ノット／Windsor knot","author":"","book":"","note":"ネクタイの結び方の一つ。三重ノットとも呼ばれ、大きくドッシリした三角形の結び目を作る。ウィンザー公 (後のエドワード 8 世) が始めたとされる。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f34812a9aafccc8717fff40"},{"text":"背馳／はいち","author":"","book":"","note":"互いに背き合うこと、不一致。「言動が―する」のように使う。反語は一致、合致。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f34812aab77cc3460ecd683"},{"text":"奢侈／しゃし","author":"","book":"","note":"必要以上に金を使ったぜいたく。「―品」「―に流れる」のように使う。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f34812aad6bd4fcf459b612"},{"text":"立錐／りっすい","author":"","book":"","note":"錐 (きり) を立てるほどのわずかな面積。「立錐の余地 (ち) もない」の形で使うことが多く、人や物がびっしりとそろって隔たりがないさまをいう。\nマーク・グリーニー／『暗殺者の鎮魂』","id":"35630ed08f34812ab335d932fcd9851a"},{"text":"聞こし召す／きこしめす","author":"「聞く」「食べる」「飲む」などの尊敬語。古語。御酒を召し上がる、御詳しい、などの意で使う。","book":"虚淵玄／『アイゼンフリューゲル』","note":"","id":"35630ed08f34812c8fd9ff90a3af8d89"},{"text":"匪賊／ひぞく","author":"武装した盗賊集団。中国や中央アジアで生じた語。「匪」は「ひ」と読み、悪事をしている者の意。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f34812d96a3eb20b7f9345b"},{"text":"囲繞／いじょう・いにょう","author":"周りを取り囲むこと。「いじょう」「いにょう」両読みあり。法律用語では「囲繞地 (いにょうち)」のように使う。","book":"マーク・グリーニー／『暗殺者の反撃 下』","note":"","id":"35630ed08f34812d9bc9cb156b207e8b"},{"text":"韜晦／とうかい","author":"名詞・サ変動詞。①自分の才能・身分・本心などを包み隠して人目を避けること。②姿をくらますこと。「自己韜晦」のように用いる。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f34812ea351c1466e8f82aa"},{"text":"永訣／えいけつ","author":"","book":"","note":"永久の別れ。二度と会うことのない別れ。死別。\n安里アサト／『８６―エイティシックス―Alter.2』","id":"35630ed08f34812eaaf5d6f3adc1d94c"},{"text":"興趣／きょうしゅ","author":"面白み、趣。事柄に感じられる面白さや魅力。「―をそそる」「―も冷める」のように使う、鮮やかにして起こされるもの。","book":"三田誠／『ロード・エルメロイII世 11 星冠密議3』","note":"","id":"35630ed08f34812fa877e57e5b82a05f"},{"text":"アドレッセンス","author":"思春期。心身の急激な発達による不安定な過渡期。一般に12-18歳頃を指す。心理学・発達心理学用語。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34812fb959d0000f4e9db8"},{"text":"居丈高／いたけだか","author":"","book":"","note":"人を見下し威圧的な態度を取るさま。高圧的。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f348130835acb64630c45c1"},{"text":"瞋恚／しんに","author":"名詞 (仏教用語)。怒り、憤り、激しい嫌悪の心。三毒 (貪・瞋・痴) の一つで、心を乱す根本煩悩とされる。一般に「しんい」とも読む。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f3481309b47d9a20e325943"},{"text":"開豁／かいかつ","author":"名詞・形容動詞。①土地が広々と開けて見通しがきくこと。「開豁地」は地形・軍事用語で広く開けた地。②心が広く闊達なさま。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f3481309d33f2a74b9ecda4"},{"text":"雷霆／らいてい","author":"","book":"","note":"激しい雷。すさまじい雷鳴。「―の如き怒り」のように比喩でも使う。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f348130abbbe969d7340404"},{"text":"周章狼狽／しゅうしょうろうばい","author":"驚きあわててうろたえること。「周章」も「狼狽」も、ともに「あわてる」意。「―して逃げ出す」のように使う四字熟語。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f348130bc6bdff412eab7c4"},{"text":"汎化／はんか","author":"","book":"","note":"機械学習で、訓練データ以外の未知のデータにも適用できるよう、有限のデータから普遍的なルールや法則を獲得すること。\n岡野原大輔／『大規模言語モデルは新たな知能か』","id":"35630ed08f348131915dde2c4d13460f"},{"text":"デトリタス／detritus","author":"生物の遺骸・排泄物・植物の枝葉などが微生物により分解された有機質粒子。水中や土壌で生態系のエネルギー循環を支える。ラテン語 detritus (「摩耗」の意) に由来。","book":"マーク・グリーニー／『暗殺者の飛躍 上』","note":"","id":"35630ed08f34813195fcde3f0d5b5f51"},{"text":"バッカニア","author":"17世紀カリブ海で活動した海賊・私掠船員の総称。海賊史の専門用語。","book":"川北稔／『砂糖の世界史』","note":"","id":"35630ed08f348131abdbc84bbeb2a0a4"},{"text":"紛う／まがう","author":"動詞 (ワ五段)。①似ていて区別がつかない、見分けがつかない。「夜目に紛う」「夢と紛う」。②入り混じる。文語的・雅語的。「紛れる(まぎれる)」と同源。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481339307f75d18b212f2"},{"text":"判事と陪審と死刑執行人を一人で兼ねている","author":"","book":"","note":"「裁き手、裁かれる者、そして処罰を下す者を一人で兼ねる」の意。英語 \"judge, jury, and executioner\"。進手勝手に裁いて処罰もする、不公平なもしくは独裁的な行為を表すイディオム。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f348133bdb9c8992701c539"},{"text":"消長／しょうちょう","author":"","book":"","note":"衰えることと盛んになること。衰退と隆盛。「―を繰り返す」「都市の―」のように使う。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f3481348d88e1857a81291d"},{"text":"遅速／ちそく","author":"","book":"","note":"遅いことと速いこと。物事の進む速度。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f348134abeecb674b094a5e"},{"text":"晦冥／かいめい","author":"","book":"","note":"暗く真っ暗なこと。光のささない状態。「―の闇」のように使う。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f34813598ade4582363dbbd"},{"text":"ア・ラ・コック／à la coque","author":"フランス語で à la coque。卵を殻ごと茶色く類似の器に入れて茂でて作る半熟ゆで卵料理。エッグスタンドとスプーンで中身をすくうて食べる。","book":"マーク・グリーニー／『暗殺者の復讐』","note":"","id":"35630ed08f3481379054cfe01fdb9948"},{"text":"司厨／しちゅう","author":"船・鉄道・軍隊などで調理を担当する係。コック。「―長」「―室」のように使う、海事・軍事系の語。","book":"マーク・グリーニー／『暗殺者の飛躍 上』","note":"","id":"35630ed08f3481389fbfc34dfb98a3f5"},{"text":"行囊／こうのう","author":"","book":"","note":"郵便物や部隊装備を入れて運ぶ袋。「外交―」は外交使節が本国と交わす文書を収める受検査免除の袋。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f3481398680e38e64156184"},{"text":"戦雲／せんうん","author":"戦争が起こりそうな険悪な情勢。転じて、不穏な雰囲気。「―がたちこめる」「―を咼ぐ」のように使う。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f3481398d6cc2c30fada34e"},{"text":"市井／しせい","author":"","book":"","note":"人の多く住む街中。世間。「―の人」「―に身を隠す」のように使う。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f348139ae39eee2c7732075"},{"text":"頽廃／たいはい","author":"名詞・サ変動詞。健全な気風が衰え、退廃的な状態に陥ること。倫理・文化・建造物などの腐朽・衰微。「退廃」の異体表記。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f34813c9097d3ee20d2d434"},{"text":"太湖石／たいこせき","author":"中国蘇州の太湖から産出する石灰岩。穴が多く奇怪な形状で、中国庭園で愛玩される。古来文人趣味の象徴。","book":"折輝真透／『蒼の上海』","note":"","id":"35630ed08f34813c94a5d03f38d06b04"},{"text":"嵌入／かんにゅう","author":"はめ込むこと、はまり込むこと。建築・地質学等で用いる。「―岩」「―地形」のように使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34813c9e9cc6ab50f92b46"},{"text":"静心／しずごころ","author":"古語。落ち着いた心、静かな心。古今集の「久方の光のどけき春の日にしづ心なく花の散るらむ」(紀友則)で知られる。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f34813c9fecd9f3da61350b"},{"text":"軋轢／あつれき","author":"","book":"","note":"人や物事が亲しめずに交わること。摩擦、対立。「―が生じる」「―を生む」のように使う。\n福井晴敏／『機動戦士ガンダムUC9 虹の彼方に 上』","id":"35630ed08f34813cab3ae146c250c264"},{"text":"屋階／おくかい","author":"","book":"","note":"建物の最上階。または、屋根裏部屋。屋上階。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f34813daf9cef167b435cbe"},{"text":"木強漢／ぼっきょうかん","author":"","book":"","note":"飾り気のない頑固で愚直な男。「木強」は本来「ぼっきょう」と読み、たくましく不器用だが誠実な人柄を表す。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f34813ea5c7c29c890b6c11"},{"text":"贖宥／しょくゆう","author":"","book":"","note":"カトリック教会の免罪符制度。罪を犯した者が関所に買うことで罰を免除されるとされた。ルターの宗教改革の単緒。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f34813eb482c00b39adad10"},{"text":"感情の環／かんじょうのわ","author":"Willcox（1982）が提唱した感情を同心円状に配置したチャート。中心に基本感情、外層に詳細感情を配す。心理療法・感情教育で活用。","book":"ジュリー・スミス／『メンタルマネジメント大全』","note":"","id":"35630ed08f34813f88becd43823eca33"},{"text":"洟も引っ掛けない／はなもひっかけない","author":"全く相手にしない、無視する。「洟」は鼻水。「鼻水もかけてやらない」ほど軽視する意。否定形で慣用的に使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34813f8e22e858c81ae26f"},{"text":"桎梏／しっこく","author":"手かせ・足かせ。転じて、人の行動を厳しく制限し自由を束縛するもの。「―から逃れる」「―となる」のように使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34813fb95bc620e0ffbfbe"},{"text":"切断部の異所性バンキング／せつだんぶのいしょせいバンキング","author":"手足切断時に、切断部の組織を別部位に一時的に移植・保存し、後で再接続を試みる医療手順。","book":"シカゴ・メッド","note":"","id":"35630ed08f3481408547fdc96ca59bb5"},{"text":"草莽／そうもう","author":"草むら。転じて、民間・在野。「―の臣」「―より起こる」のように使う。市井の人々を指す古風な表現。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481409848fc4e147dc328"},{"text":"面体／めんてい","author":"顔つき、容貌。「―を進める」「―を隠す」のように、古い表現や犯罪者の顔を隠す誇張表現で使う。","book":"マーク・グリーニー／『暗殺者の復讐』","note":"","id":"35630ed08f348140a8f3f4f84a624df7"},{"text":"情報エントロピー／じょうほうエントロピー","author":"","book":"","note":"情報量を測る数学的尺度。ある情報がどれだけ予想していない驚くべき情報かを測る指標で、起こりにくい事象が起こったことを示す情報ほど情報量が大きい。クロード・シャノンが1948年の論文で導入した。エントロピーとも。\n岡野原大輔／『大規模言語モデルは新たな知能か』","id":"35630ed08f3481418876d60e869c40ea"},{"text":"アウム","author":"サンスクリットの根源音「ॐ」。宇宙の始まりの振動を表す聖音。ヒンドゥー教・仏教の瞑想・マントラで宇宙との合一の象徴として用いる。","book":"ジョーゼフ・キャンベル＆ビル・モイヤーズ／『神話の力』","note":"","id":"35630ed08f3481419206d51599feaebb"},{"text":"奏効／そうこう","author":"","book":"","note":"こうこう。効果を奉すること。どんな手段・計画・薬などが期待したとおりの効き目を現すこと。\nフランク・ハーバート／『デューン 砂漠の救世主 上』","id":"35630ed08f348144aa15d2149722aa29"},{"text":"仰天／ぎょうてん","author":"","book":"","note":"予期せぬ出来事に非常に驚くこと。天を仰ぐほど驚くこと。\n長月達平／『Vivy prototype 1巻』","id":"35630ed08f348144ae8bde11d2961f4a"},{"text":"悠揚迫らざる／ゆうようせまらざる","author":"慣用表現 (連体修飾)。ゆったりと落ち着き払い、せかせかしない様子。「悠揚迫らざる態度」のように用いる。「悠揚」は落ち着いてゆったりしたさま、「迫らざる」は慌てない・追い詰められないの意。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481459bdac44c63069871"},{"text":"拮抗的多面発現性／きっこうてきためんはつげんせい","author":"","book":"","note":"ある遺伝子が若年期に有利に働く一方、老年期にマイナス効果を発揮する性質。老化の進化的説明の一つ。\nアンドリュー・スティール／『AGELESS（エイジレス）』","id":"35630ed08f348145a13af48939366796"},{"text":"地下鉄道／Underground Railroad","author":"","book":"","note":"19 世紀のアメリカで、南部の奏隷システムから黒人奋隷を脱出させ、自由州やカナダへ送り届けた秘密ネットワーク。計 10 万人以上の黒人を解放したとされる。名前と違い、実際の鉄道ではなく、キリスト教徒や奋隷废止論者による人的ネットワーク。\n黒崎真／『マーティン・ルーサー・キング―非暴力の闘士』","id":"35630ed08f3481469188e46294c4b8fd"},{"text":"檣灯／しょうとう","author":"帆船のマストの頂部につける航法灯。遠くから船の位置・進行方向を示す。「檣」はマスト・帆柱。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f348146a23fc4bc1442a7e6"},{"text":"静物／せいぶつ","author":"動かないもの。果物・器、花、魚介類や野菜などを表現する絵画ジャンル。","book":"マーク・グリーニー／『暗殺者の復讐』","note":"","id":"35630ed08f3481478297dc4c6548e2c1"},{"text":"はしこい","author":"形容詞。動きがすばやい、機敏である。「すばしこい」と同源で、口語的・古風な響きをもつ。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481479d07f4f765a5729a"},{"text":"シネクドキ・提喩／しねくどき・ていゆ","author":"synecdoche。修辞法の一つで、上位概念と下位概念を言い替え合う表現技法。「花見」で「桜の花見」を意味する等、提喩とも言う。","book":"読書猿／『独学大全』","note":"","id":"35630ed08f3481479f8cefe1868a7c30"},{"text":"ポランニーのパラドックス","author":"人間の知識の大部分は無意識下で制御されており、明示的に説明できない暗黙知が存在するという指摘。ハンガリー出身の科学者マイケル・ポランニーが「我々は語れる以上のことを知っている」と表現したことに由来する。","book":"岡野原大輔／『大規模言語モデルは新たな知能か』","note":"","id":"35630ed08f348147aa9fc023678d5f09"},{"text":"眇める／すがめる","author":"動詞 (マ下一段)。片目を細める、目をすぼめて見る。物を狙うとき、眩しいとき、不快感や疑念を示すときの所作。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f348147bb1eeda5abe2158a"},{"text":"嚆矢／こうし","author":"人や物事のはじめ。最初。物事の起こり。古代中国で開戦の合図に音を立てる矢（嚆矢）を放ったことに由来する。「近代小説の―」のように使う。","book":"長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","note":"","id":"35630ed08f348148b661f8f398366ec9"},{"text":"ハイブラウ","author":"知識人、教養人。転じて、教養をひけらかす者への軽蔑語。highbrowville はボストンの俗称として使われた。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34814981f4f2c8dae2a2d8"},{"text":"はかばかしい／捗々しい","author":"","book":"","note":"うまく進んでいるさま。順調。仕事や体調がよい状態。漢字表記は「捗々しい」。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f34814986cfecc14ed23329"},{"text":"紛う方ない／まごうかたない","author":"","book":"","note":"他のものと取り違えようがない、確かにそうである、というさま。「紛う」は混同する意。「―事実」のように使う。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f348149b7b9d2bb2c07223d"},{"text":"弁える／わきまえる","author":"","book":"","note":"物事の道理を知って善悪を判断する。心得る。「礼儀を弁える」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34814ab158f7c953c69899"},{"text":"舵輪／だりん","author":"船舶・船㏴・航空機などの操縦輪。車のハンドルを含めて言うこともある。","book":"マーク・グリーニー／『暗殺者の飛躍 上』","note":"","id":"35630ed08f34814e83c1ea192d098a93"},{"text":"危地／きち","author":"","book":"","note":"危険な場所、状況。「―に陥る」「―を脱する」のように使う。「危」は危険の意、「地」は場所を示す。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f34814fa042de29ae4ccee4"},{"text":"管足／かんそく","author":"ヒトデやウニなど棘皮動物の体表に多数ある、内部に水を含んだ細長い管状の足。水管系の伸縮で動かし、移動・呼吸・摂食などに使う。","book":"長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","note":"","id":"35630ed08f34814faa2bd82b8a3bc1f3"},{"text":"しょうとう（船のマスト灯火）／しょうとう","author":"","book":"","note":"船のマストに掲げる灯火。夜間航行で他船に位置を示すための記号灯。「檣」はマストを意味する。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f3481509478c1b8ab81aa8c"},{"text":"騒擾／そうじょう","author":"","book":"","note":"集団的な騒ぎで社会の秩序を乱すこと。騒動、暴動。「―事件」「―状態」のように使う。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f34815287fbc7a09040019c"},{"text":"護国卿／ごこくきょう","author":"","book":"","note":"イギリスでピューリタン革命末期の1653年成立した独裁政権における最高官職名。クロムウェルが議会を解散し就任。1660年王政復古により廃止。","id":"35630ed08f3481529f83dcf2ed55a003"},{"text":"恰好／かっこう","author":"名詞・形容動詞。①姿形、見てくれ。②ちょうどよいこと、ぴったりとしていること。「恰好の餌食」「恰好の獲物」のように使う。「格好」と並び用いられる。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 下』","note":"","id":"35630ed08f34815390c0f4de540c71ba"},{"text":"ピーコート／pea coat","author":"厚めのウール生地で作られたダブルブレストのショートコート。双列全6の金ボタンとコンパクトな長さが特徴。元は海軍水兵用。語源はオランダ語「pij (粗いウール)」。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f34815398d3e0ccee042724"},{"text":"急派／きゅうは","author":"","book":"","note":"急いで人や部隊を派遣すること。「援軍を―する」「特使を―する」のように、軍事や外交の文脈で使う。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f348153992adfe45d47a99f"},{"text":"マルチミリオネア／multimillionaire","author":"","book":"","note":"数百万長者。複数の百万を越える資産を持つ者。ミリオネア (millionaire) より一梵上の富裕層を指す。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f348153a931c9ec2c7859e0"},{"text":"糸遊／いとゆう","author":"陰炎。かげろう。春や夏の晴れた日に、地面付近の空気が揚げて踊るように見える現象。「さやひ」とも読む。古語的表現。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481558e6ee11266190a42"},{"text":"空頼み／そらだのみ","author":"","book":"","note":"実現の見込みのない期待。当てにならない望み。「―に終わる」「―をかける」のように使う。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f348155aca2fcbdd61127d3"},{"text":"浮沈／ふちん","author":"","book":"","note":"うきしずみ。水面に浮いたり沈んだりすること。転じて、栄えることと衰えること。勝ちと負け。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f348156b282d3d9a44db8bd"},{"text":"赫怒／かくど","author":"","book":"","note":"顔を赤くして激しく怒ること。赫怒とも書く。\n長月達平、梅原英司／『Vivy prototype 1巻』","id":"35630ed08f348157a74ec08cf7544774"},{"text":"事前指示書／じぜんしじしょ","author":"終末期医療に関する個人の意思を事前に記録した文書。生命維持拒否や代理人指名等を含む。米では法的拘束力あり、日本では弱い。Advance Directiveとも言う。","book":"シカゴ・メッド","note":"","id":"35630ed08f348157b25ff3a2d0d7aa0e"},{"text":"蔬菜／そさい","author":"","book":"","note":"野菜の総称。あおもの。「―園」「―類」のように使う。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f348158915ed0c7e21951c7"},{"text":"杞憂／きゆう","author":"取り越し苦労。あれこれと無用の心配をすること。古代中国の杞の国の人が天が落ちてくることを心配した故事に由来。","book":"成田良悟／『Fate/strange Fake(8)』","note":"","id":"35630ed08f34815893a2c346815decdc"},{"text":"爪牙／そうが","author":"名詞。①爪と牙。獣の武器。②転じて、武器・道具・手段。③主君に仕えて手足となって働く者、腹心。漢籍由来の文語。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f3481589709d4c2ccb04a8a"},{"text":"眼閃／がんせん","author":"眼球を強く打った時や圧迫した時に見える光の感覚。網膜への機械的刺激による視覚現象。","book":"紺野大地・池谷裕二／『脳と人工知能をつないだら』","note":"","id":"35630ed08f3481589db9ccf4fb40705b"},{"text":"万古不易／ばんこふえき","author":"四字熟語。永遠に変わらないこと。長い時を経ても変化しない普遍の理。万古不抜とも。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f348158afdae007bb6bf344"},{"text":"野点／のだて","author":"","book":"","note":"屋外で茶を点てること。野外で行う茶会。庭園・河畔・山中などで催される風雅な茶事。\n三田誠／『ロード・エルメロイII世の冒険 11 星冠密議(３)』","id":"35630ed08f3481598995eb75ad144d14"},{"text":"千変万化／せんぺんばんか","author":"様々に変化すること。状況や姿が次々と変わって定まらないさま。","book":"冲方丁／『生き残る作家、生き残れない作家』","note":"","id":"35630ed08f3481599533f46f84cfe697"},{"text":"過学習／かがくしゅう","author":"","book":"","note":"機械学習で、訓練データに特化しすぎて未知データへの予測能力（汎化能力）が落ちる現象。\n岡野原大輔／『大規模言語モデルは新たな知能か』","id":"35630ed08f348159a1a2d66e7f0f579f"},{"text":"迫真／はくしん","author":"","book":"","note":"真に迫ること。さも真実であるかのように思わせること。\n冲方丁／『生き残る作家、生き残れない作家』","id":"35630ed08f348159a6b4ca1eaafc7e1d"},{"text":"赫怒／かくど","author":"","book":"","note":"顔を赤くして激しく怒ること。\n長月達平／『Vivy prototype 1巻』","id":"35630ed08f348159b621f57161e206c7"},{"text":"変哲／へんてつ","author":"","book":"","note":"へんてつ。他と異なる点。不思議な、さまのわった点。「―もない」の形で何の特色もない、ありふれた、の意で使われることが多い。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f348159b8b2fda812add8b9"},{"text":"推敲／すいこう","author":"","book":"","note":"詩文や文章の字句をよくしようと、何度も練り直すこと。\n冲方丁／『生き残る作家、生き残れない作家』","id":"35630ed08f34815a8e62d245eccbbea4"},{"text":"空無／くうむ","author":"","book":"","note":"仏教用語。一切の存在に固有の実体がなく、空であること。何もないこと、虚無。\nフランク・ハーバート／『デューン 砂丘の子供たち 下』","id":"35630ed08f34815b9864d0d224682283"},{"text":"奈辺・那辺／なへん","author":"どのあたり、どこのへん。「―にあるのか」「―に求めるべきか」のように使うやや古風な言い回し。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34815b9bbfea41a04cfde3"},{"text":"稚気／ちき","author":"","book":"","note":"子供っぽい気持ちや言動。あどけなく無邪気な気質。「―に富む」「―をのこす」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34815caa70d196cbffc371"},{"text":"襲歩／しゅうほ","author":"馬の最も速い走らせ方。ギャロップ。騎手・競馬・騎兵の術語。「―で駆ける」のように使う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f34815cb2adfdee0d264a10"},{"text":"橈骨／とうこつ","author":"前腕の親指側の骨。尺骨と対をなす。","book":"蒔田陽平／『ナイト・ドクター 上』","note":"","id":"35630ed08f34815d9441e4a902ca7470"},{"text":"遠陬／えんすう","author":"","book":"","note":"都から遠く離れた土地。僻遠の地。「陬」は「すみ」「しば」を表す漢字。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f34815da6a2e7325da5d797"},{"text":"輔弼／ほひつ","author":"","book":"","note":"君主を補佐して政務を行うこと。旧大日本帝国憲法下で御兏者・大臣のもった限定的な補佐権。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f34815dacd2fe69e60cec85"},{"text":"興趣／きょうしゅ","author":"面白み。興味。心が引きつけられる味わい・趣。","book":"三田誠／『ロード・エルメロイII世の冒険 11 星冠密議(３)』","note":"","id":"35630ed08f34815e9981f77bdc13c8df"},{"text":"クロスセクション分析","author":"","book":"","note":"ある一時点における集団全体のデータを横断的に収集・分析する研究手法。社会調査・経済学・疫学等で広く用いられる。","id":"35630ed08f34815ea235c6d85fedc094"},{"text":"鬼哭啾々／きこくしゅうしゅう","author":"四字熟語。鬼(死霊・亡霊)が啜り泣くような不気味な音や凄惨な情景。「啾々」は虫や鬼の細く悲しげな鳴き声を表す擬音語。戦場跡や荒涼とした地の形容に用いる。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f34815eac04d39c4b588edf"},{"text":"沓摺り／くつずり","author":"","book":"","note":"出入口の下枠。戸の敷居の部分で、ドアが擦れ合う部位。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f34815eb7eaca8ad55ac31e"},{"text":"技倆／ぎりょう","author":"腕前。手腕。能力。「技量」に同じ。「倆」は「うでまえ」の意を含む古語的表記。","book":"マーク・グリーニー／『暗殺者の飛躍 上』","note":"","id":"35630ed08f34815f80e6d22034dec38c"},{"text":"昵懇／じっこん","author":"","book":"","note":"親しい交わり。懇意。親しく交際していること。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f34815f8555c6fdf477e7a0"},{"text":"ミンネ","author":"ドイツ中世の宮廷愛・恋愛詩の中心概念。ミンネゼンガー（ミンネ歌人）が歌う。","book":"ジョーゼフ・キャンベル・ビル・モイヤーズ／『神話の力』","note":"","id":"35630ed08f3481608b71e5eeb6b9fcff"},{"text":"ボタンダウン／button-down","author":"","book":"","note":"襲の両端をボタンで身頃にスナップしてとめる襲スタイル。古いポロシャツで襲が鳥骨にあたらないようにとりつけたのが起源とされる。\nマーク・グリーニー／『暗殺者の鎮魂』","id":"35630ed08f348162b4eae3a6c4b00706"},{"text":"見得／みえ","author":"","book":"","note":"名詞。①外見の体裁、見栄(両者混用される)。②歌舞伎で動きを止めて目を大きく見開き、表情・姿勢を強調する演出。「見得を切る」のように用いる。\nフランク・ハーバート／『デューン 砂丘の子供たち 上』","id":"35630ed08f348162bf31dde620093be1"},{"text":"けだし／蓋し","author":"思うに。たぶん。確かに。「蓋し」と表記される古語的副詞。推量・断定を表すときに使う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f348166b237e9219c051c07"},{"text":"内訌／ないこう","author":"名詞。内輪もめ。組織や仲間内での争い・紛争。「内紛」とほぼ同義の文語的表現。","book":"ヘンリー・キッシンジャー／『国際秩序 上』","note":"","id":"35630ed08f348166b8fbd9078a8a8aa9"},{"text":"空言／そらごと","author":"","book":"","note":"事実でない言葉。うそ。実体のない言。「―を吐く」のように使う。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f3481678994e7eaa3504951"},{"text":"舵輪／だりん","author":"船の舵を操作するための輪状の取っ手。ステアリングホイール。船舶用語。","book":"マーク・グリーニー／『暗殺者の飛躍 上』","note":"","id":"35630ed08f348167a133c772d20ae044"},{"text":"黙許／もっきょ","author":"名詞・サ変動詞。暗黙のうちに許すこと、知っていながら見過ごして咎めないこと。「黙認」とほぼ同義の文語的表現。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 上』","note":"","id":"35630ed08f348167a32ad2382e56c58c"},{"text":"外交行囊／がいこうこうのう","author":"","book":"","note":"外交使節が本国との間でやりとりする封印された郵袋。ウィーン条約で不可侵性が認められ、接受国の検査を受けない。Diplomatic pouch / bag の訳。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f34816884e3e8d9bab7d710"},{"text":"琥珀色／こはくいろ","author":"琥珀のような透き通った黄褐色。","book":"長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","note":"","id":"35630ed08f3481698646de35fcffd554"},{"text":"宝の持ち腐れ","author":"慣用句。せっかくの貴重な物や能力を所有していながら、それを活用せずにいること。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f348169a475f7dae131c6f8"},{"text":"立錐の余地もない／りっすいのよちもない","author":"","book":"","note":"錐を立てるせまい場所さえない。人や物がびっしりと詰まっているさまのたとえ。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f348169ba85dd1fa61c2414"},{"text":"狂瀾／きょうらん","author":"","book":"","note":"荒れ狂う大波。激しい逆巻く波濤。「―怒涛」のように使う。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f34816cbbadc3b9b0b71ace"},{"text":"反芻／はんすう","author":"","book":"","note":"一度のみ込んだ食物を口に戻して再び噂むこと。転じて、一つの事柄を繰り返し思い考えること。\n冲方丁／『生き残る作家、生き残れない作家』","id":"35630ed08f34816f98e9f8257c86fbb0"},{"text":"アルビ派／アルビは","author":"12-13世紀南仏ラングドック地方で隆盛したキリスト教異端カタリ派の別称。アルビジョア十字軍で討伐された。","book":"ジョーゼフ・キャンベル・ビル・モイヤーズ／『神話の力』","note":"","id":"35630ed08f3481719027f2af69e2e407"},{"text":"パウチ／pouch","author":"","book":"","note":"軽量の小袋・密閉容器。軟らかいプラスチックやアルミトレート、布製で作られる。軍事・アウトドア用途で装備を収納する袋も指す。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f348171a169caa48e2ecfec"},{"text":"変哲／へんてつ","author":"","book":"","note":"普通と違ったところ。変わったところ。多く「変哲もない」の形で使う。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f348171b566c2d22bd3078a"},{"text":"まなじりを決する／まなじりをけっする","author":"目尻を見開いて怒り・態度を以て見据えること。「眦」はまなじり（目と目ぶたの間の端）。「―て詰め寄る」と使う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481739162ec653e724909"},{"text":"籐椅子／とういす","author":"","book":"","note":"籐ツルの茎で編んで作った椅子。通気性がよく夏用に適する。「籐」はラタンを表す漢字。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f348173b76cce66a4eda43b"},{"text":"ミクリ／実栗","author":"","book":"","note":"ミクリ科の多年草。水辺・湿地に生える。果実がリコザのわただに似て鮮やか。「実栗」と表記される。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f348173be70f0ba10a614a0"},{"text":"左見右見／とみこうみ","author":"","book":"","note":"右を見たり左を見たりすること。「とみこうみ」と読む。定めりがつかず迷うさまを表すこともある。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f3481749a95ff8bd51d5c6f"},{"text":"ハリエット・タブマン／Harriet Tubman","author":"1822 頃–1913。アメリカの奋隷废止運動家。自ら南部奋隷を脱出後、地下鉄道 (Underground Railroad) の「車掌」となって何十人もの奋隷をカナダ・自由州へ脱出させた。「女モーゼ」と呼ばれた。南北戦争中は北軍のスパイとしても活躍。2024 年よりアメリカ 20 ドル紙幣の胖像予定者。","book":"黒崎真／『マーティン・ルーサー・キング―非暴力の闘士』","note":"","id":"35630ed08f348174bc09d1dcf8129f59"},{"text":"政治将校／せいじしょうこう","author":"","book":"","note":"ソ連軍などの共産主義国家の軍隊に置かれた政治担当将校。コミッサール（commissar）とも。職業軍人の指揮官と並んで部隊に配属され、思想教育・党路線の徹底・指揮官の監視を任務とした。独ソ戦初期の混乱の一因とされ、戦況悪化を受けて権限が制限された。\nユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 上』","id":"35630ed08f3481758282ce1d5801cbc1"},{"text":"不定愁訴／ふていしゅうそ","author":"","book":"","note":"とりとめた原因が見出しづらいのに、体調不良・頭痛・めまい・肊こりなど多様な不定の身体的訴えを訴えるさま。\n帚木蓬生／『ネガティブ・ケイパビリティ』","id":"35630ed08f348175850cd024322d0a91"},{"text":"蚕食／さんしょく","author":"","book":"","note":"蠶が桑を食うように、他国・他領を少しずつ侵略していくこと。「―を受ける」「―される」のように使う。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f3481759a22dd0b8739c27a"},{"text":"按手礼／あんしゅれい","author":"キリスト教における聖職任命の儀礼。叩首者に手をかざして祉福し、御職を授ける。「按」は手をかざす意。","book":"黒崎真／『マーティン・ルーサー・キング 非暴力の闘士』","note":"","id":"35630ed08f3481769048f71e50cb062b"},{"text":"ドナー交換腎移植／ドナーこうかんじんいしょく","author":"複数のドナー-レシピエントペア間で交叉提供し、各ペアでは免疫適合不成立だったケースを成立させる腎移植システム。Paired Kidney Exchange、PKE。","book":"シカゴ・メッド","note":"","id":"35630ed08f348176a258dc4529922094"},{"text":"プランジャー／plunger","author":"","book":"","note":"押し棒。トイレや洗面台の詰まりを取るためのゴム製カップ付き棒。意味は「ピストン」のように押し込むもの。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f3481778381d63f0c1154b8"},{"text":"迸る／ほとばしる","author":"動詞 (ラ五段)。液体や気体・感情などが勢いよく流れ出る、噴出する。「血が迸る」「情熱が迸る」「閃光が迸る」。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f34817793e4fd606ecfc2d8"},{"text":"精神医学における「善意の嘘」／せいしんいがくにおけるぜんいのうそ","author":"患者の保護や治療効果のために、医療者が意図的に行う偽の説明・告知。個人の意思決定権とのんの訓練論争の対象。","book":"シカゴ・メッド","note":"","id":"35630ed08f348177a2dcd6e112dfc023"},{"text":"閉口／へいこう","author":"","book":"","note":"なすすべを知らず困り果てること。受け答えに詰まって口を閉ざすこと。\n長月達平／『Vivy prototype 1巻』","id":"35630ed08f3481789f29f45b978d1a8e"},{"text":"山勘／やまかん","author":"","book":"","note":"確かな根拠なしに、運に任せて見当をつけること。あてずっぽう。「―で答える」「―が当たる」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f348178bd36c619267a27fa"},{"text":"三十六計逃げるに如かず","author":"三十六計、逃げるに如かず。さんじゅうろっけいにげるにしかず。中国古代の兵法书『三十六計』に由来。計画や計略が多くあるが、追い詰められたときは逃げるのが一番良い策だということ。","book":"カレー沢薰／『ひきこもり処世術』","note":"","id":"35630ed08f34817a8017efbd636cfdc1"},{"text":"パラビオーシス","author":"二個体の血流を物理的に繋いで共有させる実験技法。語源は「寄り添って生きる」。老化研究で若い血液の効果を調べるのに用いる。","book":"アンドリュー・スティール／『AGELESS（エイジレス）』","note":"","id":"35630ed08f34817a976edf335b31763c"},{"text":"尾筒／おとう","author":"","book":"","note":"銃器の銃尾部。作動部を収める部品で、銃身と肩付けをつなぐ。レシーバー (receiver) の訳語。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f34817aaf37e0304ffaab64"},{"text":"黄禍論／こうかろん","author":"","book":"","note":"黄色人種が世界、特に西洋にとって脅威となるとした人種差別論。明治末期にドイツ皇帝ヴィルヘルム2世らが階揚。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f34817abc0ec8a3da5bd44e"},{"text":"過学習／かがくしゅう","author":"","book":"","note":"機械学習で、訓練データに特化しすぎて未知のデータに対する予測精度が低下する現象。オーバーフィッティング。\n岡野原大輔／『大規模言語モデルは新たな知能か』","id":"35630ed08f34817b935acc8ad444ab81"},{"text":"狂飆／きょうひょう","author":"","book":"","note":"狂ったように吹き荒れる暴風。猛烈な疾風。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f34817bab61c0ef78227ef3"},{"text":"峻厳／しゅんげん","author":"名詞・形容動詞。①地勢が険しく厳しいこと。②態度・規律などがいかめしく、厳格なこと。「峻厳な父」「峻厳たる態度」。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f34817badfefd00c9c7d30d"},{"text":"足背動脈／そくはいどうみゃく","author":"足の甲を走る動脈。脈拍触知部位。","book":"蒔田陽平／『ナイト・ドクター 上』","note":"","id":"35630ed08f34817bbb0be09188d2af5b"},{"text":"唐花文様／からはなもんよう","author":"唐風の架空の花を様式化した日本の伝統文様。正倉院・寺院装飾等に多用。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f34817bbed8f8f2d80032ad"},{"text":"すだく","author":"虫などが群れて騒ぎ鳴く。大勢の者が集まってぶつぶつ言う。古語的や文学表現。「そばえ」とも。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f34817bbfb6d8d379cb82a1"},{"text":"噴飯／ふんぱん","author":"おかしくて思わず食べているご飯を噴き出してしまうほどであること。「噴飯もの」。","book":"長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","note":"","id":"35630ed08f34817c8ba1fc2a8f859fa3"},{"text":"威し／おどし","author":"名詞。相手を恐れさせて服従させようとする行為や言葉。脅迫。古来は「脅し」と並び用いられ、中世の鎧では札を糸でつづり合わせる技法を指す用法もある。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f34817d914cd5057d694065"},{"text":"稚気／ちき","author":"","book":"","note":"子供っぽい気分や心持ち。あどけなさ。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34817d9de6f36d9aea9e9a"},{"text":"名残りの一杯","author":"","book":"","note":"別れ際に飲む最後の一杯。名残り惜しみに飲む一杯。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f34817d9ea7d07a5ccf7437"},{"text":"アガペー","author":"agape。キリスト教における神の無償・無条件の愛。エロス（情欲愛）・フィリア（友愛）と区別される、最も崇高とされる愛の形。","book":"ジョーゼフ・キャンベル＆ビル・モイヤーズ／『神話の力』","note":"","id":"35630ed08f34817d9f34c2d10e573bd3"},{"text":"半畳を入れる／はんじょうをいれる","author":"芝居小屋で役者に不満な観客が敷いていた半畳を投げつけたことから。転じて、人の話に非難・冷評・野次を入れる。「―を入れる」と使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34817e87fcd6e1016e4de0"},{"text":"マイクロサイト","author":"","book":"","note":"植物生態学で、生育環境内のごく限られた区間に独特の微小環境が形成され、特定生物が集中して生息する状態。","id":"35630ed08f34817e9237e8a3c884d9a0"},{"text":"マンセル値／マンセルち","author":"色相・明度・彩度の三属性で色を体系化したマンセル表色系の数値表現。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f34817fbd3dca537b7df83f"},{"text":"バウロン／bodhrán","author":"アイルランドの伝統的なフレームドラム。豊かな低音・もこもことした音色を出し、ケルト音楽に不可欠。スティックと呼ばれるダブルヘッドの椤で叩く。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481808b50cdcd64cf7941"},{"text":"薄絹／うすぎぬ","author":"","book":"","note":"薄手の絹織物。透けるほど薄い絹布。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f34818091d6e91808f2a23f"},{"text":"指弾／しだん","author":"名詞・サ変動詞。①指先ではじくこと。②転じて、人を非難・排斥すること、つまはじき。「世間から指弾される」のように用いる。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f34818095e7c4dc9db08e46"},{"text":"屋階／おくかい","author":"屋根裏に設けられた階。または屋根の上に小屋根のように設けた部屋。アティック。建築用語。","book":"マーク・グリーニー／『暗殺者の反撃 下』","note":"","id":"35630ed08f3481809b60d9cc3e1a2d56"},{"text":"左見右見／とみこうみ","author":"あちらを見たりこちらを見たり、見回すこと。「そうけんうけん」とも読む。「―しながら進む」のように使う、仁三・仁四と読む。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481809b83df63e31bbd33"},{"text":"ベロア","author":"毛羽を持つ滑らかな光沢感のある生地。ボリュームと柔らかさを同時に表現できる。ドレス・カーテン・装飾用に使う。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f348181861ce7b2d7fae2a1"},{"text":"昵懇／じっこん","author":"","book":"","note":"じっこん。さんざん、亲しく交わること。厚い関係をもって亲しくしているさま。「―な間柄」「―にしている」などと使う。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f3481838ee4fd35e0cd0605"},{"text":"過日／かじつ","author":"","book":"","note":"過ぎ去ったある日。先日。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481848a3dff0fd3e3d7bf"},{"text":"鉄のカーテン／てつのカーテン","author":"第二次世界大戦後、ソ連を中心とする東側諸国を西側から隔てた象徴的な境界線。チャーチルが1946年の演説で用いた表現。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 上』","note":"","id":"35630ed08f348185bb9ddce9637185cf"},{"text":"司厨／しちゅう","author":"","book":"","note":"船舶や軍隊において調理場や乗務員の食事を担当すること。またその役。「司厨長 (シェフ)」「司厨員」などと使う。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481869bf5cdadbf6b912c"},{"text":"襲歩／しゅうほ","author":"","book":"","note":"馬の走り方の一つ。最も速い走らせ方で、ギャロップ (gallop) と同じ。五部進とも呼ばれる。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f348187916cc22bee68e665"},{"text":"膝行／しっこう","author":"","book":"","note":"膝をついたまま膝で進むこと。茶道・能など伝統芸能の作法、あるいは身分高い者の前での礼儀としても使われる。\n野崎透／『アニメーションの脚本術』","id":"35630ed08f348187adb3ccb9cbbcec30"},{"text":"麗々しい／れいれいしい","author":"","book":"","note":"もってりがついた、仮ヅらしい、見えよがしに装われたさま。やや身わた・誇張しているというニュアンスを含む。「―言い立てる」。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f348188a43fe4fd7e6297c4"},{"text":"逡巡／しゅんじゅん","author":"","book":"","note":"決断がつかず、ぐずぐずとためらうこと。「逡巡を許さない」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f348188bb4edae131465ad5"},{"text":"いっかな","author":"副詞。どうしても。決して。「一向」と表記される古語的表現。主に下に打ち消しの語を伴う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f348189b0dad080080d942f"},{"text":"小心翼々／しょうしんよくよく","author":"四字熟語。気が小さく、いつもびくびくと用心深く振る舞うさま。「翼翼」は注意深く慎む様を意味し、『詩経』に出典をもつ。","book":"ヘンリー・キッシンジャー／『国際秩序 上』","note":"","id":"35630ed08f348189b892c8f4bcfe711e"},{"text":"嗤う／わらう","author":"動詞 (ワ五段)。あざ笑う、嘲笑する。「笑う」と書き分けて、嘲りや侮蔑・冷ややかな笑いを含意する。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f34818a98e8f06fe4c42831"},{"text":"暗黙知／あんもくち","author":"言語化や明示的な説明が困難で、経験を通じて身体的に身につけた知識。化学者・哲学者マイケル・ポランニーが提唱した概念。","book":"岡野原大輔／『大規模言語モデルは新たな知能か』","note":"","id":"35630ed08f34818bb5bed1ad3f30b004"},{"text":"急派／きゅうは","author":"","book":"","note":"急いで派遣すること。緊急に人や部隊を送り込むこと。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f34818bb7d4f9ad64dbdf77"},{"text":"後あおり／うしろあおり","author":"","book":"","note":"トラックなどの荷台の後部にある開閉式の扉。荷物の積み下ろしのため上下に動く。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f34818c8f0ee31765eb2f60"},{"text":"写植／しゃしょく","author":"写真植字。文字を写真・画像として用紙に焼き付ける印刷技術。漫画の吹き出し等にも使われた。デジタル化以前の主要組版技術。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34818cb9a1d6d1fb42d276"},{"text":"ドレープ","author":"布を揺らした時に現れる自然なたるみ・流れるようなヒダ。「布で覆う」「衣類を優雅にまとわせる」意。服飾用語。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f34818d874ed72c2efe6747"},{"text":"こんにゃく問答／こんにゃくもんどう","author":"落語の演目から。意味が噛み合わない、とんちんかんな問答のこと。「―に終わる」のように使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f34818da5e7ee37d0be43d8"},{"text":"眦を決する","author":"慣用句。「まなじり」は目の端・目尻。怒り・決意で目を大きく見開くこと。決意を表す表現。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f34818dbb15e06f2bf82808"},{"text":"幽邃／ゆうすい","author":"","book":"","note":"奥深く静かなさま。幽寂。「―な森」「―の境」のように使う。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f34818f94a5f640ef374d06"},{"text":"擱筆／かくひつ","author":"","book":"","note":"筆をいたん置くこと。誌・記事・手紙などを書き終えること。「本稿をここに―する」のように使う。\n帚木蓬生／『ネガティブ・ケイパビリティ』","id":"35630ed08f34818fafa3d081f29942bb"},{"text":"赤軍／せきぐん","author":"","book":"","note":"1918年のロシア革命後に組織されたソビエト連邦の正規軍隊。1946年にソ連軍と改称された。\nユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 上』","id":"35630ed08f3481909af0eee4b39178ba"},{"text":"トランスファークレーン","author":"","book":"","note":"コンテナ埠頭などで使われる、レール上を走行してコンテナを吹象りする門型クレーン。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f3481919810cc9ecbb6fc47"},{"text":"意気阻喪／いきそそう","author":"元気を決し、意気込みを失うこと。四字熟語。「阻」は「そこなわれる」の意。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f348191a9d1e8b18e38ca88"},{"text":"統合情報理論／とうごうじょうほうりろん","author":"","book":"","note":"Integrated Information Theory、IIT。ジュリオ・トノーニが提唱した意識の理論。意識を「統合された情報量（Φ）」として数値化して示そうとする。\n紺野大地・池谷裕二／『脳と人工知能をつないだら、人間の能力はどこまで拡張できるのか』","id":"35630ed08f348191aebdcd89f2d8395a"},{"text":"汎化能力／はんかのうりょく","author":"","book":"","note":"未知のデータに対しても適切に予測・対応できる能力。機械学習で最重視される目標。\n岡野原大輔／『大規模言語モデルは新たな知能か』","id":"35630ed08f348193888ce50186770252"},{"text":"嫣然／えんぜん","author":"形容動詞。にっこりと艶やかに笑うさま、女性が美しく微笑むさま。「嫣然と微笑む」「嫣然たる色を浮かべる」。「嫣」はあでやかなさまを表す。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f348193956bffda794eae3a"},{"text":"微小血栓／びしょうけっせん","author":"毛細血管で形成される顕微鏡レベルの血栓。コロナ後遺症・慢性疲労症候群・糖尿病等との関連で研究が進む。蛍光顕微鏡で観察。","book":"『ナショナル ジオグラフィック』2023年記事","note":"","id":"35630ed08f348193b12ffc0fa52461ea"},{"text":"クロノロジカル","author":"時系列順、年代順に並ぶさま。「―な記述」「―に整理する」のように使う。語源は希臘語「時間」。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481949ebdd83e01d8b74d"},{"text":"大向こうを唸らせる／おおむこうをうならせる","author":"","book":"","note":"歌舞伎の二階上の安い席（大向こう）の見物客にさえ、唸らせる名演技のこと。転じて一般大衆を席巻すること。\n帚木蓬生／『ネガティブ・ケイパビリティ』","id":"35630ed08f3481958326e66b759d939c"},{"text":"悪貨／あっか","author":"質の悪い貨幣。「悪貨は良貨を駆逐する」（Gresham's law）の形でよく使われる、品質低のものが市場で良質を駆逐する経済法則。","book":"成田良悟／『Fate/strange Fake(8)』","note":"","id":"35630ed08f34819583f3e291c88e4836"},{"text":"数多／あまた","author":"数の多いさま。たくさん。古語・文語表現。「ーの星」「ーの民」のように使う。","book":"折輝真透／『蒼の上海』","note":"","id":"35630ed08f348196b81ad2e03446c82a"},{"text":"プラセボ","author":"偽薬。薬理作用を持たないが患者に効果が現れる場合がある。語源はラテン語「私は喜ばす」。","book":"帚木蓬生／『ネガティブ・ケイパビリティ』","note":"","id":"35630ed08f34819893fad351336a06e5"},{"text":"飲鴆止渇／いんちんしかつ","author":"","book":"","note":"鴆（ちん）は毒鳥。その羽を潬けた酒は勧毒とされる。一時の苦しさを逃れるため、将来の大いなる災いを与える手段を選ぶたとえ。\n斧田小夜／『飲鴆止渇』","id":"35630ed08f34819998d5fae575e9920e"},{"text":"嚆矢／こうし","author":"","book":"","note":"物事の始まり。最初。元来は開戦の合図に放たれる鏑矢を指した。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34819a9ba3caf5efe4b739"},{"text":"産業革命／さんぎょうかくめい","author":"","book":"","note":"18世紀後半イギリスで始まった、蒸気機関を中心とする生産技術革新と、それに伴う社会経済構造の根本的変革。資本主義の確立を導いた。","id":"35630ed08f34819bbdd5d5e7c7760b14"},{"text":"生半／なまなか","author":"","book":"","note":"中途半端なさま。生半可。徹底していないこと。「―な気持ちでは続かない」のように使う。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f34819ea09afa6bd319a933"},{"text":"野点／のだて","author":"野外、公園や庭で行う茶会。「点てる」は茶を点てる意。春・秋の行事や詩歌で使われる茶道・野古趣味の語。","book":"三田誠／『ロード・エルメロイII世 11 星冠密議3』","note":"","id":"35630ed08f34819ebba2d676f822bf18"},{"text":"射垜／しゃだ","author":"","book":"","note":"弓を射るときに、的の後方に作る土塁・土手。矢が外れたときの矢止めの役割を果たす。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f3481a1af49db4e86a1f3d2"},{"text":"皓々と／こうこうと","author":"","book":"","note":"明るく輝くさま。白く光り輝くさま。「皓」は白い意。月光や雪原・雪野の描写に多用。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481a2aefde3686d621cf9"},{"text":"エーゲ文明","author":"","book":"","note":"紀元前3000年頃から1300年頃まで、エーゲ海周辺で栄えた古代文明。クレタ島のクレタ文明とギリシャ本土のミケーネ文明を包含する。","id":"35630ed08f3481a2b407c4bb40c4d305"},{"text":"片務的／へんむてき","author":"一方の当事者だけが義務を負うこと。反対語は双務的。契約・財政・貧易などで使う法律・経済用語。","book":"池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","note":"","id":"35630ed08f3481a3af41ce46c455b191"},{"text":"深甚／しんじん","author":"名詞・形容動詞。意味・程度がきわめて深いこと。「深甚なる感謝」「深甚の謝意」のように改まった文脈で用いる。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481a4a807dd5c4c523549"},{"text":"まごうかたのない／紛うかたのない","author":"","book":"","note":"「紛うかたのない」の態言。見間違えることのない、明らかな、間違いようがないさま。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481a5963bf00cba7821eb"},{"text":"ねこ車／ねこぐるま","author":"一輪の手押し車。建設現場や農作業で使用。Wheelbarrow。「猫」の名の由来は諸説あるが、狭い「猫道」を通れることからとされる。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f3481a5b179c989d2cf48f2"},{"text":"乾坤一擲／けんこんいってき","author":"一つのさいころを振って勝負を決めるように、運命をかけて思い切った勝負をすること。「―の勝負」と使う漢詩由来の四字熟語。","book":"三田誠／『ロード・エルメロイII世 11 星冠密議3』","note":"","id":"35630ed08f3481a6806cef0abc8681aa"},{"text":"ボイコット","author":"boycott。不買逵動、不参加運動による抵抗。アイルランドで領地代理人ボイコット大尉を小作人たちが集団絶交した事件（1880年）が語源。","book":"川北稔／『砂糖の世界史』","note":"","id":"35630ed08f3481a6858bc67745502801"},{"text":"ジンポール","author":"","book":"","note":"重量物の据え付けや解体に用いる、垂直に立てた一本の支柱を主体とする起重設備。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f3481a6924df132190dd4cb"},{"text":"花嫁タスキ","author":"","book":"","note":"中南米（ペルー、メキシコ等）の伝統婚礼で花嫁が肩から斜めに掛けるサッシュ。家族・地域の伝統色を表す。Bridal Sash。","id":"35630ed08f3481a69fc4deb8e9f0cee5"},{"text":"潤色／じゅんしょく","author":"話や文章に色や面白みを加え、彩りよく仕立てること。脚色。「事実を―する」「―を加える」のように使う。","book":"マーク・グリーニー／『暗殺者の反撃 下』","note":"","id":"35630ed08f3481a6af03cbc6820ec049"},{"text":"機構長／きこうちょう","author":"","book":"","note":"国際合同プロジェクト・組織の最高責任者の役職名。ITER（国際熱核融合実験炉）等の例。","id":"35630ed08f3481a7a398ed167a890c38"},{"text":"瞞着／まんちゃく","author":"","book":"","note":"たくらしてだますこと。欺くこと。「瞞」は「だます」意。\nマーク・グリーニー／『暗殺者の鎮魂』","id":"35630ed08f3481a8a7d6e043b915cd43"},{"text":"公館／こうかん","author":"","book":"","note":"政府関係の建物。特に外国に設ける大使館・公使館・領事館などの総称。「外交―」「御―」のように使う。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481a8b672f7a7c191b3bf"},{"text":"諧調／かいちょう","author":"音や色などが段階的に変化して調和を作っているさま。グラデーション。「無限の―」のように使う。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f3481a99ec3f636eaeeb72e"},{"text":"訪う／とう・おとなう","author":"動詞 (ワ五段)。①訪ねる、訪問する(「とう」の読み)。②古語「おとなう」とも読み、訪れる・音を立てる・声をかけて尋ねる意。文語・雅語。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 上』","note":"","id":"35630ed08f3481aaa3c5f2286d115b2d"},{"text":"ディレッタント","author":"dilettante。学問・芸術を職業とせず趣味として愛する人。道楽家、好事家。軽蔥なニュアンスを含むこともある。","book":"東崎惟子／『竜殺しのブリュンヒルド』","note":"","id":"35630ed08f3481aab05cd6c6cb1a249b"},{"text":"ジャカード織","author":"1801年フランスのジョセフ・マリー・ジャカールが発明した自動織機。パンチカード仕様を応用し、複雑な柄を織り出す。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f3481ab8f5ee801b964bda7"},{"text":"ショーマンシップ","author":"興行・娯楽を巧みに見せる技術・心構え。エンタメ業界用語。","book":"クリストファー・ボグラー・デイビッド・マッケナ／『面白い物語の法則 下』","note":"","id":"35630ed08f3481aba3bbdd3deb23588d"},{"text":"馬勒／ばろく","author":"馬の頭・顔・口に装着して手綱を取るための革具。轍。「―をつける」「―を操る」のように使う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481adac77eb14c29a8079"},{"text":"遠陬／えんすう","author":"","book":"","note":"都や中央から遠く離れた片田舎の地。辺鄙。「陬」は隅・すみの意。「―の地」のように使う。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f3481ae8f77e3007e64190b"},{"text":"セポイ","author":"インドでイギリス東インド会社等に雇われた現地人傭兵。1857年セポイの反乱で有名。","book":"池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","note":"","id":"35630ed08f3481aebb68f42c1214df10"},{"text":"不羈／ふき","author":"","book":"","note":"何物にも束縛されず自由であるさま。「―独立」「独立―」のように、独立不羈と並べて使われる。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f3481af9710e8febe90a677"},{"text":"墨守／ぼくしゅ","author":"旧来の習慣や意見を頪なに守り通すこと。古代中国の墨子が宋の城を頂恌・長期防衛して落とさなかった故事に由来。","book":"野崎透／『アニメーションの脚本術』","note":"","id":"35630ed08f3481afbbb2cc51cbb854e2"},{"text":"無任所／むにんしょ","author":"","book":"","note":"特定の任務・所管を持たないこと。「―大臣」のように、内閣で特定の省庁を担当しない大臣を指す。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481b082b1e0e56027553b"},{"text":"程標／ていひょう","author":"","book":"","note":"道のりの目印となる標識。道標。転じて、物事の進行における重要な節目。マイルストーン。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f3481b19bb8fe7e23df6249"},{"text":"機縁／きえん","author":"","book":"","note":"ある事柄が起こるきっかけ、縁。「―となる」「―を得て」のように使う。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f3481b19e25fd162f035616"},{"text":"奉拝／ほうはい","author":"","book":"","note":"つつしんで礼拝すること。神仏や貴人を敬って拝むこと。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f3481b2805ad3cec34a421c"},{"text":"平仄／ひょうそく","author":"名詞。①漢詩・漢文における平声(ひょうしょう)と仄声(そくせい)、その配列規則。②転じて、物事の調子・つじつま。「平仄が合う」=辻褄が合う、筋道が通る。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481b2812ccf5c5f1f8a74"},{"text":"一日の長／いちじつのちょう","author":"慎用句。他よりもわずかに勝っていること。わずかな長所や経験があること。","book":"長月達平／『Vivy prototype 1巻』","note":"","id":"35630ed08f3481b2a159c55ab10c09cd"},{"text":"懇請／こんせい","author":"真心を込めて頼むこと、心から請うこと。「懇」は心づかい、「請」は願い求める意。「―の意を表する」のように使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481b2b124cb96ee2679d6"},{"text":"難詰／なんきつ","author":"名詞・サ変動詞。相手の欠点や過失を厳しく非難してなじること。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481b58ee9e28ce33ddb21"},{"text":"次世代型安息日エレベーター","author":"","book":"","note":"ユダヤ教安息日の労働禁止規則（メラカ）に対応して、ボタン操作なく自動的に各階に停止することで利用可能にしたエレベーター。","id":"35630ed08f3481b597c8fd8cd379a1d9"},{"text":"赤い燻製ニシン","author":"ミステリーや論証で読者・聴き手を意図的にミスリードする偽の手がかり。臭いの強い燻製ニシンで猟犬の嗅覚を惑わせた故事から。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481b5ad4cc2ee0c24e9f4"},{"text":"人質詐欺／ひとじちさぎ","author":"","book":"","note":"人質を取ったと偽って、被害者の家族から身代金を引き出す詐欺手口。実際には人質は取られていない場合が多い。","id":"35630ed08f3481b681e7ccd50a3c7c98"},{"text":"ワッチキャップ／watch cap","author":"","book":"","note":"海軍や漁師が見張りや冬季勤務で被るニット帽。深めに被り、耳を覆うように製作される。「watch」は「見張り」の意。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f3481b69db2ef3c3465e6a9"},{"text":"潤色／じゅんしょく","author":"","book":"","note":"事実や文章に手を加えて、おもしろく仕立てたり、より整えたりすること。脚色。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f3481b6a495c98f0e9ed334"},{"text":"信認義務／しんにんぎむ","author":"名詞 (法律・金融用語)。他人の信頼を受けてその利益のために詠意・忠実に事務を処理するべき義務。信託・代理・役員などに課せられる。fiduciary duty の訳語。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 下』","note":"","id":"35630ed08f3481b6ab57c0f1d895f807"},{"text":"衣ずれ／きぬずれ","author":"","book":"","note":"名詞。衣服の生地が擦れ合って立てるかすかな音。動作や所作の余韻として描写されることが多い。\nフランク・ハーバート／『デューン 砂丘の子供たち 下』","id":"35630ed08f3481b78e08f236587c5acd"},{"text":"狭隘浅薄／きょうあいせんぱく","author":"心や見識が狭く浅いこと。「狭隘」がスケールの狭さ、「浅薄」が思考の浅さを示す。","book":"帚木蓬生／『ネガティブ・ケイパビリティ』","note":"","id":"35630ed08f3481b8876fd5c8aa2dfbd2"},{"text":"皓々／こうこう","author":"","book":"","note":"白く光り輝くさま。特に月の光が明るく照らすさまを表すことが多い。「―と照る月」のように使う。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481b8ba28e175f0c1c1cd"},{"text":"言挙げ／ことあげ","author":"ことさら言葉に出して言い立てること。古語的表現。「―せず」「神も―せぬ国」のように、神道的文脈でも使われる。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481b8bbb6eb88ef0d2e66"},{"text":"奥津城／おくつき","author":"古語。墓所、墓のこと。神道では墓を「奥津城」と表記する。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481b99a30d4c13753d722"},{"text":"燭光／しょっこう","author":"","book":"","note":"ともしびや、ろうそくの光。ロウソク 1 本をともしたサイズの光量を示す古い単位としても使われた。現代ではカンデラ (cd) に置換。\nマーク・グリーニー／『暗殺者の鎮魂』","id":"35630ed08f3481b9ad89f0cd26cb5457"},{"text":"危地／きち","author":"","book":"","note":"危険な場所。危険な状況。命の危険にさらされる状態。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481b9bef4e0dc1eac6959"},{"text":"抗弁／こうべん","author":"相手の主張に対して言い返すこと。弁明・反論すること。法律用語としては、被告が原告の主張を認めつつ、それを妨げる別の事実を主張して争うことをもいう。","book":"長月達平、梅原英司／『Vivy prototype 1巻』","note":"","id":"35630ed08f3481ba9be4df7528b99f4d"},{"text":"医療代理権／いりょうだいりけん","author":"個人が医療意思決定不能になった際、別人に代行させる法的権利。アメリカの制度、日本の成年後見制度が類似。Healthcare Proxy / Medical Power of Attorney とも言う。","book":"シカゴ・メッド","note":"","id":"35630ed08f3481baa416d825ead10e33"},{"text":"一義的／いちぎてき","author":"意味が一種類だけ、解釈の余地がないこと。また、根本的・第一義的の意。「―な解釈」「―に重要」のように使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481baba67ddf42179af47"},{"text":"迷走神経／めいそうしんけい","author":"","book":"","note":"第十脳神経。延髄から発し、頸部・胸腔・腹腔の内臓に広く分布する副交感神経系の主幹。心拍・消化・呼吸などの自律機能を制御する。腸と脳をつなぐ情報伝達経路としても重要。\nジム・クウィック／『LIMITLESS 超加速学習』","id":"35630ed08f3481bb8dd7f7f73d11717d"},{"text":"貴石／きせき","author":"価値の高い宝石。ダイヤ・ルビー・サファイア等を指す宝石学の分類用語。「半貴石」と対比される。","book":"安里アサト／『86 Ep.12 ホーリィ・ブルー・ブレット』","note":"","id":"35630ed08f3481bbb039dd7bfb10d1fe"},{"text":"スパンコール","author":"光を反射させるために使用する服飾資材。穴の空いた金属やプラスチックの小片を衣類・ダンス衣装などに縫い付ける。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f3481bc8b0dde7279b625ed"},{"text":"披見／ひけん","author":"","book":"","note":"書状・文書などを開いて目を通すこと。「―に供する」「―のみ」のように、配付ではなく閲覧のみという制限を表すのに使う。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481bca6d9eb4d9b171423"},{"text":"ウシノケグサ／牛の毛草","author":"イネ科の多年草。Festuca 属。牏・餌草として利用される。「牛の毛草」の表記に由来。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f3481bcab72f0148bea9225"},{"text":"枢要／すうよう","author":"","book":"","note":"物事の中心となる重要な部分。肝心かなめ。「組織の―を担う」「―な役割」のように使う。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f3481bcb86aebbcb6d17cf3"},{"text":"ショルダーレングス／shoulder length","author":"肩までの長さ。ヘアスタイルの長さを表す表現。Shoulder length。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481bcb8a2f7e774268c6c"},{"text":"言挙げ／ことあげ","author":"古語。ことさらに言葉に出して言い立てること。古代日本では神に対して言挙げしないことが美徳とされた。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481bd8ae4e8da0ed4e664"},{"text":"エアステア／airstairs","author":"","book":"","note":"飛行機の機体に組み込まれた自走式の昇降階段。空港のタラップを使わずに乗降できる。Air stairs。\nマーク・グリーニー／『暗殺者の反撃 下』","id":"35630ed08f3481bda42ee37b01d76ebe"},{"text":"居丈高／いたけだか","author":"","book":"","note":"人を見下したような、高圧的で威張った態度。「―な物言い」「―に出る」のように使う。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481bdaf28d1256160e436"},{"text":"ソーダパン／soda bread","author":"","book":"","note":"重曹を使って焼いたアイルランド伝統のパン。Soda bread の訳語。イーストを使わず、重曹とばた　やヨーグルトの反応で肨らませる。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481bdb9ded9e5672a3bb8"},{"text":"アシエント","author":"スペイン王室が他国に与えた黒人奴隷の独占供給契約。植民地史の専門用語。","book":"川北稔／『砂糖の世界史』","note":"","id":"35630ed08f3481bdbe1cc3501c9b29ad"},{"text":"沓摺り／くつずり","author":"ドア下端の床に取り付ける部材。または戸の下を擦らないように床に渡す横木のこと。建築・建具用語。","book":"マーク・グリーニー／『暗殺者の反撃 下』","note":"","id":"35630ed08f3481bf8520ecfd753f307a"},{"text":"親昵／しんじつ","author":"","book":"","note":"したしく交わること。親しめばたしかわること。「昵」は「したしむ」意。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f3481c0a943efb0d8054475"},{"text":"逡巡／しゅんじゅん","author":"","book":"","note":"決断できずためらうこと。ぐずぐずすること。「逡巡は一瞬、判断は刹那」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481c18017f312af1e40e8"},{"text":"白眼視／はくがんし","author":"冷たい目つきで人を見ること。冷淡に扱う、または敵意をもって遇すること。「世間から―される」のように使う。晋の阮籍が気に入らない客には白眼で接したという故事に由来。","book":"長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","note":"","id":"35630ed08f3481c19633d39f09a088a6"},{"text":"啓開／けいかい","author":"","book":"","note":"道や進路を切り開くこと。軍事では地雷除去・障害除去で進路を確保する作業をいう。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f3481c1ae4bc857e6af2988"},{"text":"沈香／じんこう","author":"名詞。香木の一種で、ジンチョウゲ科の常緑高木やその樹脂を含んだ材。優れた香りを放ち、香道・仏事・薫物の最上等とされる。「伽羅(きゃら)」は最高級の沈香。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481c2b136eb713148b1c9"},{"text":"遅速／ちそく","author":"","book":"","note":"遅いことと速いこと。遅さと速さ。「動作の―」「進度の―」のように使う。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481c3869ae409c429a3b4"},{"text":"交誼／こうぎ","author":"親しい付き合い、友誼と同義。「―を結ぶ」「―を深める」のように使う雅語。","book":"三田誠／『ロード・エルメロイII世の冒険』","note":"","id":"35630ed08f3481c3926ddc24027ad492"},{"text":"全か無かの思考／ぜんかむかのしこう","author":"物事を「完璧」か「完全な失敗」か極端に判断し、中間的グレーゾーンを認めない認知バイアス。抑鬱・不安障害で特徴的。認知行動療法用語。","book":"ジュリー・スミス／『メンタルマネジメント大全』","note":"","id":"35630ed08f3481c397e0c104be20be94"},{"text":"友誼／ゆうぎ","author":"名詞。友達としての親しみ、よしみ、友情。「友誼を結ぶ」「友誼を深める」のように用いる漢語的表現。「誼(よしみ)」は親しい間柄。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481c3a93cfcb448418883"},{"text":"ヒジャブ","author":"名詞。イスラム教徒の女性が頭や首を覆うスカーフ。アラビア語 hijāb (ヘジャーブ) に由来し、「仕切り」「隔て」を意味する。クルアーンで女性の掛衣が規定されることに由来。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 下』","note":"","id":"35630ed08f3481c4ad15e17cadc42d91"},{"text":"近影／きんえい","author":"","book":"","note":"最近撮った人物の写真。マスコミや出版物に掲載される者の近況写真。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481c587ccf7c976c63cc3"},{"text":"手綱を緩める／たづなをゆるめる","author":"","book":"","note":"警戒や統制を緩めること。締めつけや管理をゆるくすること。\nユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 上』","id":"35630ed08f3481c5b8b8c42c511fd9bc"},{"text":"裃／かみしも","author":"","book":"","note":"武家の礼装。肩衣と袋の上下一揃い。「―を脱ぐ」「―を詰める」と言えば改まった態度の意。\n村上春樹／『職業としての小説家』","id":"35630ed08f3481c6b6abdb8788d7e3a3"},{"text":"無垢／むく","author":"","book":"","note":"心身に汚れや穢れがなく純粋なこと。「無垢な瞳」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481c7879cde7f4bc3efb8"},{"text":"ボス症候群","author":"","book":"","note":"長年のリーダー職により、態度・言動が偉そう・独断的になる状態。組織心理学で論じられる現象。","id":"35630ed08f3481c78ca5d8d052fcd93b"},{"text":"罪障／ざいしょう","author":"仏教用語。罪と、それによる悟りへの障り。「罪障消滅」のように使う。","book":"鴨長明／『方丈記』","note":"","id":"35630ed08f3481c79d99c61553a35b6a"},{"text":"時をつくる","author":"鶏が夜明けを告げて鳴く。慣用句として、時刻が来たことを知らせる意。古語的表現。","book":"マーク・グリーニー／『暗殺者の反撃 下』","note":"","id":"35630ed08f3481c89095fdc681a1b60e"},{"text":"瀉血／しゃけつ","author":"血液を体外へ排出させる古い医学的処置。古代から近代まで万能計とされ、ワシントンもその下に亡くなったとされる。","book":"帚木蓬生／『ネガティブ・ケイパビリティ』","note":"","id":"35630ed08f3481c894fef7b871736c8e"},{"text":"ブラス・ナックル／brass knuckles","author":"金属製の指関節覆い武器。拳を握った手の拳骨部分に装着し、拳打の損傷力を高める。Brass knuckles。名前は真鍮 (brass) 製だったことに由来。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481c8b345e2afc083bbe1"},{"text":"清冽／せいれつ","author":"","book":"","note":"水などが澄んで清らかで冷たいさま。性格や態度がさっぱりしているさま。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f3481c9af2fc01bf0156294"},{"text":"安普請／やすぶしん","author":"安い費用で家を建てること。また、その建てた家、粗末な造りの建築。「―の家」のように使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481cab5fcf407663279e6"},{"text":"溟海／めいかい","author":"暗く広い海。深く果てしない大海。漢詩文や文学的表現で用いる。","book":"成田良悟／『Fate/strange Fake(8)』","note":"","id":"35630ed08f3481cb8f7cd03065a9097d"},{"text":"トルタ／torta","author":"イタリア・スペイン・メキシコなどで「ケーキ」や「タルト」を意味する語。ラテン語「torta (パン)」に由来。メキシコではサンドイッチ類似の軽食。","book":"マーク・グリーニー／『暗殺者の鎮魂』","note":"","id":"35630ed08f3481cbb3a4c9c42fe5274e"},{"text":"颶風／ぐふう","author":"名詞。激しい暴風、つむじ風、台風。古代中国で南方海域の暴風を指した語。「颶」は南方の大風を意味する漢字。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481cda6d7e6ccc89eaa09"},{"text":"武者震い／むしゃぶるい","author":"興奮や緊張で身体が震えること。語源は鎧のプレートを震わせて鬨の声と共に興奮を伝播させた行為から。「―がする」と使う。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481cdb7f4f647e70ce943"},{"text":"悔悟／かいご","author":"","book":"","note":"自分の過ちを後悔して反省すること。悔いて改めようとすること。「―の念にかられる」のように使う。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481ce81f9c57573d1c1b0"},{"text":"プロトプラズム","author":"原形質。細胞内の生命活動を担う原始的物質。19-20世紀生物学用語、現在は使われない。","book":"ジョーゼフ・キャンベル・ビル・モイヤーズ／『神話の力』","note":"","id":"35630ed08f3481ceb7a4ef9b5756c36f"},{"text":"鼓吹／こすい","author":"","book":"","note":"意気や思想を盛んに提唱し、人を鼓舞すること。「独立の気運を―する」のように使う。\n池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","id":"35630ed08f3481cf989bde07c71be0d6"},{"text":"窃視者／せっししゃ","author":"名詞。ひそかに他人の姿を覗き見る者。覗き魔。心理学・性科学で voyeur に対応する語。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481d0bb24d40c6b21d021"},{"text":"風光明媚／ふうこうめいび","author":"自然の景色がとても美しいさま。「―な火看」「―の地」のように使う、例示される四字熟語。","book":"鴨長明／『方丈記』","note":"","id":"35630ed08f3481d2905ae4e18dbfb599"},{"text":"カブリオレ／cabriolet","author":"折りたたみ式の幌を持つオープンカー。フランス語 cabriolet に由来。二马車 (カブリオレ) が語源。","book":"マーク・グリーニー／『暗殺者の復讐』","note":"","id":"35630ed08f3481d292c4f02d33145855"},{"text":"はかばかしい","author":"","book":"","note":"物事が順調に進んでいる、うまく進んでいるさま。「―進捗」「―しい返事」のように、主に否定形「はかばかしくない」で使う。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f3481d29545ebbba8f0c1ae"},{"text":"罪業／ざいごう","author":"仏教用語。罪となる行為。「ごう」はkarmaの訳。「罪業を背負う」「罪業深い」のように使う。","book":"鴨長明／『方丈記』","note":"","id":"35630ed08f3481d2a72edfa14695b904"},{"text":"莫逆の友／ばくぎゃくのとも","author":"逆らうことがないほどに親しい友。原出『荘子』「心に逆らうもの無き友」。心を許し合った親友。","book":"三田誠／『ロード・エルメロイII世 5 錬金術師の遺産 下』","note":"","id":"35630ed08f3481d38a95c35a7412faa7"},{"text":"すだく","author":"古語。　多く集まる、騒ずる、鳴きたてる。「虫たちの―声」「集い―」のように使う、雅語表現。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481d3a19cf40b93748711"},{"text":"実体法／じったいほう","author":"","book":"","note":"名詞。権利・義務などの法律関係の発生・変更・消滅の要件を定めた法。民法・刑法・商法など。手続法（訴訟手続などを定める法）の対義語。\nヘンリー・キッシンジャー／『国際秩序 上』","id":"35630ed08f3481d4ac40fc1319c54f6d"},{"text":"殺ぐ／そぐ","author":"","book":"","note":"そぐ。①刃物などで斜めに切り落とす。先を細くする。②勢いや力、興味などを弱める。鈍らせる。「気勢を—」「興を—」など。\n映島巡／『小説NieR:Automata 長イ話』","id":"35630ed08f3481d58682f376499d680c"},{"text":"わだつみ","author":"海をつかさどる神、そして海そのもの。古語・文語。「海神」と記して「わだつみ」と読むこともある。","book":"帚木蓬生／『ネガティブ・ケイパビリティ』","note":"","id":"35630ed08f3481d58d9be3bf8eb212b1"},{"text":"小水の魚／しょうすいのうお","author":"わずかな水に住む魚。転じて、死期が迫っている状況、余命いくばくもないことのたとえ。仏典由来の表現。","book":"鴨長明／『方丈記』","note":"","id":"35630ed08f3481d58e95f4cec740c332"},{"text":"悔悟／かいご","author":"","book":"","note":"自分の過ちに気付き、深く悔いること。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481d58ff6f57d717709a4"},{"text":"抗弁／こうべん","author":"","book":"","note":"相手の言い分に反論して自説を主張すること。\n長月達平／『Vivy prototype 1巻』","id":"35630ed08f3481d595edc5b64134c994"},{"text":"立錐の余地もない／りっすいのよちもない","author":"","book":"","note":"人やものがびっしりと詰まって、すこしのすきまもないことをいうたとえ。「錐（きり）」は穴をあける道具で、その錐の先を立てるほどの余地もない、の意。\n福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","id":"35630ed08f3481d69ed2f439ff46d5c7"},{"text":"生国／しょうこく","author":"","book":"","note":"生まれた国や土地。故郷。「しょうごく」とも読む。「―を離れる」「―を問われる」のように使う、やや古風な表現。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481d6a891c6d64d21f1e9"},{"text":"ラビオリ／ravioli","author":"イタリア料理の詰め物パスタ。パスタ生地に肉・チーズ・野菜などの具を包んだもの。スープやソースとともに出される。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f3481d7be4bd07ae1fb995f"},{"text":"怯懦／きょうだ","author":"","book":"","note":"臆病で意気地がないこと。気が弱くおじけづくさま。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f3481d891b9fe98c570e4ca"},{"text":"無任所／むにんしょ","author":"","book":"","note":"特定の職務・任務につかないこと。特に、特定の省庁を担当しない閃僚・大臣。\nマーク・グリーニー／『暗殺者の飛躍 上』","id":"35630ed08f3481d8a03cf752548ccc12"},{"text":"百寿者／ひゃくじゅしゃ","author":"","book":"","note":"100歳以上まで生きた人。センテナリアン。長寿研究の主要対象。\nアンドリュー・スティール／『AGELESS（エイジレス）』","id":"35630ed08f3481db8029ceb30f168a02"},{"text":"操／みさお","author":"","book":"","note":"自分の信念や負節を変えずに守り通すこと。「―を守る」「―を捨てる」「―を捻げる」などと使う。\n虚淵玄／『アイゼンフリューゲル』","id":"35630ed08f3481dba0abdac21a4a65d9"},{"text":"面体／めんてい","author":"","book":"","note":"顔つき。顔貌。「顔面体裁」の略として使われることもある。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481dc8809e727563d2afe"},{"text":"融通無礙／ゆうずうむげ","author":"","book":"","note":"考えや行動が何にもとらわれず、自由自在であるさま。「―に応じる」「―の姿勢」などと使う。\n村上春樹／『職業としての小説家』","id":"35630ed08f3481dc9fa3c5d11d9e8c45"},{"text":"冥途／めいど","author":"","book":"","note":"死後に魂が赴くとされる世界。黄泉、あの世。「―へ旅立つ」「―の旅」のように使う。\n鴨長明／『方丈記』","id":"35630ed08f3481dcaa88d12fd5515943"},{"text":"行跡／こうせき","author":"名詞。人の行いのあと。日頃の行状、品行。「不行跡」のように評価対象として用いられることが多い。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 下』","note":"","id":"35630ed08f3481ddafc4f456b417a54d"},{"text":"生国／しょうこく","author":"","book":"","note":"生まれた国。本国。故郷の国。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481ddb053dddc07eeca1f"},{"text":"ダイアローグ","author":"対話。複数人物のセリフのやり取り。","book":"野崎透／『アニメーションの脚本術』","note":"","id":"35630ed08f3481de8967c4628a4326d1"},{"text":"シュールレアリズム","author":"超現実主義。フランスで誕生した芸術・文学運動。意識下・夢・不合理を積極的に表現した。ダリ、マグリット等が代表。","book":"三田誠／『ロード・エルメロイII世の冒険』","note":"","id":"35630ed08f3481df8954cf6582347bd7"},{"text":"戦雲／せんうん","author":"戦争が起こりそうな険悪な情勢。戦乱の雰囲気。比喩的に人生・社会における不穏の陰り。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f3481df8c26d87196983e5c"},{"text":"奏効／そうこう","author":"","book":"","note":"効果が現れること。見込みどおりの効を奏すること。\nフランク・ハーバート／『デューン 砂漠の救世主 上』","id":"35630ed08f3481df929ccd8d0cd9f715"},{"text":"小揺るぎ／こゆるぎ","author":"","book":"","note":"ほんの少しだけ揺れ動くこと。わずかな動揺。「―もしない」のように、否定形で「微動だにしない」の意で使うことが多い。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481dfb246c03aa7a0f743"},{"text":"麗々しい／れいれいしい","author":"","book":"","note":"うわべだけで中身が伴わないさま。もってまわった、誇張したさま。見せかけの、聖々しいさま。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f3481dfbe28e60de04de88a"},{"text":"鴨居玲／かもいれい","author":"1928-1985。日本の洋画家。暗い色調と表現主義的なタッチで孤独や狂気を描いた。代表作『教師』『他人』など。","book":"俵万智／『かぜのてのひら』","note":"","id":"35630ed08f3481e091aac722706292da"},{"text":"メディシンマン","author":"北米先住民等の伝統的呪医・霊的指導者。文化人類学用語。","book":"帚木蓬生／『ネガティブ・ケイパビリティ』","note":"","id":"35630ed08f3481e096d4d47efde2fd80"},{"text":"いっかな","author":"いかにしても、どうしても。下に打ち消しを伴う「――ない」の形で使い、「―それを認めない」のように使う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481e0a7f5dba76470df32"},{"text":"俗塵／ぞくじん","author":"","book":"","note":"俗世間のさまざまな煙たい事や、身をたいしなみ下げたもののこと。「―を避ける」「―にまみれる」のように使う。\n鴨長明／『方丈記』","id":"35630ed08f3481e0bec7ce5dd1f0d06c"},{"text":"親昵／しんじつ","author":"親しくなじむこと、親密であること。「昵」はなじむ意。「―の間柄」「―を重ねる」のように使う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481e18d1df49cb8230a6e"},{"text":"相好／そうごう","author":"","book":"","note":"顔つき。表情。「―を崩す」で笑顔になる、ほころんだ顔をするの意。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f3481e19cc7c407b3836116"},{"text":"夜討ち朝駆け／ようちあさがけ","author":"","book":"","note":"夜中や早朝の不意をついて攻めること。不意打ち。「―の取材」「―で押しかける」のように使う。\n福井晴敏／『機動戦士ガンダムUC9 虹の彼方に 上』","id":"35630ed08f3481e1aa15f4c6adf6b2ce"},{"text":"寄る辺／よるべ","author":"頼りとする所、または頼りとする人。「―ない身」「―をなくす」のように使う、文語寄りの表現。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f3481e1b229dda8db78b231"},{"text":"傭兵／ようへい","author":"金銭契約により雇われて戦闘に従事する兵士。コモンだが歴史用語として基本。","book":"池上俊一／『ヨーロッパ史入門 市民革命から現代へ』","note":"","id":"35630ed08f3481e28864c767e488cb3e"},{"text":"刹那／せつな","author":"","book":"","note":"極めて短い時間。瞬間。仏教では時間の最小単位。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481e28e9bd496118bb03e"},{"text":"ソノラン砂漠／Sonoran Desert","author":"","book":"","note":"アメリカ合衆国アリゾナ州・カリフォルニア州とメキシコソノラ州にまたがる砂漠。世界で最も多様な生態系を持つ砂漠とされる。サボテン、ジャボテンサボテンや多類の剣山サボテンが生息。\nマーク・グリーニー／『暗殺者の鎮魂』","id":"35630ed08f3481e2ba4ff288148b9aa9"},{"text":"豁然／かつぜん","author":"形容動詞。①視界が広々と開けているさま。②心のもやもやや迷いが急に晴れて悟るさま。「豁然と霧が晴れる」「豁然大悟」。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481e38233dd9cdecf69da"},{"text":"禾穀／かこく","author":"","book":"","note":"稲・麦・粟などの穀物の総称。穀類。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f3481e385bbd4f3ea65079f"},{"text":"ドネガルウール／Donegal wool","author":"アイルランド、ドネガル地方で伝統的に生産される手紡ぎ・草木染めのウール。不揃いな色と色スピッチ (Nepps) が特徴のツイード生地。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481e399d8e666e217c16b"},{"text":"喊声／かんせい","author":"名詞。大勢が一度に上げる叫び声、鬨(とき)の声。戦場や群衆が発する大声。「鯨波」「ときの声」と同義の漢語。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 上』","note":"","id":"35630ed08f3481e3b161d9447463213b"},{"text":"けだし","author":"思うに、おそらくは、もちろん。「蓋し」と書いて推量を追加する副詞。「―名言というべきだろう」のように使う。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481e5860ad03138025450"},{"text":"尾羽打ち枯らす／おはうちからす","author":"ゾウやタカなどの尾と羽が損なわれることから、奉公人や舗主が耳鬥たる姿になることをいう成句。","book":"福井晴敏／『機動戦士ガンダムUC9 虹の彼方に 上』","note":"","id":"35630ed08f3481e5961eeff9d5ea1971"},{"text":"毛氈／もうせん","author":"獣毛で織られたフェルト、厚手の敷物。茶席や隆重な場面に敷かれる。「赤―」「緋―」のように使う。","book":"三田誠／『ロード・エルメロイII世の冒険』","note":"","id":"35630ed08f3481e59fa5f98980cc0089"},{"text":"ルイセンコ学説／ルイセンコがくせつ","author":"1930年代後半から1960年代半ばまでソ連で支配的だった農業生物学の擬似科学的学説。トロフィム・ルイセンコが提唱し、メンデル遺伝学を否定して獲得形質の遺伝を主張。スターリンの後ろ盾を得て、反対する遺伝学者は弾圧・処刑された。ソ連農業の停滞と科学界全体の長期的損失をもたらした事例として知られる。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 上』","note":"","id":"35630ed08f3481e69005d3845d9c4348"},{"text":"地下鉄道／ちかてつどう","author":"Underground Railroad。19世紀アメリカで黒人奴隷が自由州・カナダへ逃亡するを助けた援助ネットワーク。実際の鉄道ではない。","book":"黒崎真／『マーティン・ルーサー・キング 非暴力の闘士』","note":"","id":"35630ed08f3481e69d9bede577b37f0b"},{"text":"無為／むい","author":"作為を加えず自然のままに任せること。老荘思想の根本概念。「―自然」、「―にして化す」とも言う。","book":"大澤真幸ほか／『私たちはAIを信頼できるか』","note":"","id":"35630ed08f3481e79a33ee924afcc45b"},{"text":"答礼／とうれい","author":"","book":"","note":"相手の礼に対して礼を返すこと。返礼。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 下』","id":"35630ed08f3481e898b9dedc4b374345"},{"text":"凜冽／りんれつ","author":"形容動詞。①寒気が鋭く身に染みるさま。②気高く清冽なさま、毅然として侵しがたいさま。「凜冽な空気」「凜冽たる気品」。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f3481e8b8b9fe5aee05993a"},{"text":"逐う／おう","author":"動詞 (ワ五段)。①追いかける。追跡する。②追い払う、追い出す。受身「逐われる」は職や場所から立ち退かされる意で用いる。文語的・古語的響き。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f3481e99677fbbcf827f7e6"},{"text":"ペンネ・アラ・ヴォッカ","author":"ペンネ (シリンダー状パスタ) をウォッカ (ロシア製蒸留酒) とトマトクリームソースで和えたイタリア料理。Penne alla vodka。","book":"マーク・グリーニー／『暗殺者の反撃 上』","note":"","id":"35630ed08f3481e9b938f4adde4fd153"},{"text":"掻き毟る／かきむしる","author":"","book":"","note":"爪を立てて荒々しく掻く。激しい感情で胸などを掻きたてる。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481e9bcb3c4a41c57d08a"},{"text":"吝か／やぶさか","author":"","book":"","note":"未練がましい、ためらうさま。「―でない」の形で「快く・進んで~する」の意となる。「協力するに―でない」。\n成田良悟／『Fate/strange Fake(8)』","id":"35630ed08f3481eba688dc28684d3fb0"},{"text":"慙愧／ざんき","author":"","book":"","note":"自分の行いを深く恥じ入ること。「慙愧に堪えない」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481ebaa23c1ea7a7c1001"},{"text":"ジンポール","author":"クレーン状の単柱支持具。船舶・建設現場で重量物吊り上げに使う工学用語。辞書掲載は弱いが業界用語として確立。","book":"福井晴敏／『機動戦士ガンダムUC10 虹の彼方に 下』","note":"","id":"35630ed08f3481ec8b60d18b1524f14a"},{"text":"喝破／かっぱ","author":"名詞・サ変動詞。①大声で叱り言い聞かせること。②物事の本質を見抜いて鋭く言い当てること。「世の歪みを喝破する」のように用いる。","book":"三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","note":"","id":"35630ed08f3481edb32ac0eaf422281c"},{"text":"B＆B／bed and breakfast","author":"","book":"","note":"Bed and Breakfast の略。朝食付きの小規模宿泊施設。イギリス・アイルランド発祥の宿スタイル。個人家や小規模館を改装してオーナーとその家族が住み込み、朋友の家に泊めてもらうような雰囲気を提供する。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481ee8057d0a67507be5c"},{"text":"中枢神経系／ちゅうすうしんけいけい","author":"脳と脊髄から構成される神経系の中心部分。末梢神経系から送られてきた情報を統合・処理し、運動指令や自律機能の制御を司る。CNS (Central Nervous System)。","book":"ジム・クウィック／『LIMITLESS 超加速学習』","note":"","id":"35630ed08f3481eebb22edea7a60d60f"},{"text":"出色／しゅっしょく","author":"他より腕肉を一つ拜んでいること。特に優れていること。補足: 「出色の出来」「出色の踊り」などの表現。","book":"安里アサト／『８６―エイティシックス―Alter.2』","note":"","id":"35630ed08f3481f08882ec679eb669b0"},{"text":"辰砂／しんしゃ","author":"名詞。鉱物名。硫化水銀(II)の天然鉱物で、鮮赤色を呈する。古来から朱色顔料・水銀の原料として珍重された。「丹砂」「朱砂」とも。","book":"安里アサト／『86―エイティシックス―Ep.14』","note":"","id":"35630ed08f3481f1b3f8cb83db8758ea"},{"text":"錯綜／さくそう","author":"名詞・サ変動詞。複数の事柄・要素が入り組み、反身して混乱していること。「利害が錯綜する」「錯綜した事情」。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 下』","note":"","id":"35630ed08f3481f293eef6d6b1967979"},{"text":"フィット・アンド・フレア","author":"トップスを体型にピッタリとあわせてウエストを絞り、ボトムスをスカート裾の広がりでボリュームをもたせるシルエット。","book":"笹原千波／『風になるにはまだ』","note":"","id":"35630ed08f3481f3a5eac138daac9bf0"},{"text":"箭／や","author":"名詞。矢。特に竹で作った矢。「光の箭」「陽光の箭」のように、放たれた光線を比喩する文語的表現にも用いる。「矢」と異字同義。","book":"フランク・ハーバート／『デューン 砂丘の子供たち 上』","note":"","id":"35630ed08f3481f3b19df4b4f4273fcf"},{"text":"モノローグ","author":"独白。一人の登場人物が観客に向けて独り語る形式。","book":"野崎透／『アニメーションの脚本術』","note":"","id":"35630ed08f3481f580b0fb7797c10bd0"},{"text":"現代版「悪の四騎士」／げんだいばんあくのよんきし","author":"","book":"","note":"ヨハネの黙示録第6章に登場する戦争・飢饉・疫病・死を象徴する四騎士を、現代社会の脅威（気候変動・パンデミック・紛争・経済崩壊等）に置き換えた解釈。","id":"35630ed08f3481f58b42f8f38fe33737"},{"text":"グノーシス派／グノーシスは","author":"Gnosticism。古代ギリシア「グノーシス（認識）」に由来。物質世界を悪、霊的認識による救済を説いた古代キリスト教異端派。","book":"ジョーゼフ・キャンベル＆ビル・モイヤーズ／『神話の力』","note":"","id":"35630ed08f3481f58fd5cb0c99afaa9c"},{"text":"生半／なまなか","author":"","book":"","note":"中途半端なさま。いい加減。「生半な覚悟」。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481f69a6ecacf611b6114"},{"text":"暴漢／ぼうかん","author":"","book":"","note":"凶暴な悪人。暴力をふるう男。\n長月達平／『Vivy prototype 1巻』","id":"35630ed08f3481f6afe6ceaf7b4df673"},{"text":"物故／ぶっこ","author":"","book":"","note":"人が亡くなること。「―した作家」と言えば、その作家が亡くなっているの意になる。間接的、婉曲的な言い回し。\n福井晴敏／『機動戦士ガンダムUC9 虹の彼方に 上』","id":"35630ed08f3481f7bcc7f0a540b935ac"},{"text":"干戈／かんか","author":"「干」は盾、「戈」はほこ、それぞれ武器の代表。転じて戦争や武力衡突。「―を交える」で戦う意。","book":"池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","note":"","id":"35630ed08f3481f8848aca170360c6a9"},{"text":"誤謬／ごびゅう","author":"名詞。論理や推論の誤り。一見それらしく見えても実は論理的に破綻している議論・主張。「談軒の誤謬」「単一原因の誤謬」「その誤謬を犯す」。","book":"ユヴァル・ノア・ハラリ／『NEXUS 情報の人類史 下』","note":"","id":"35630ed08f3481f8bbbbc8ee1cf3f17f"},{"text":"姦しい／かしましい","author":"","book":"","note":"声や音が騒がしい。やかましい。うるさい。「女三人寄れば―」のように使う。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481f9a9e2d65b0392dc00"},{"text":"管足／かんそく","author":"ヒトデ・ウニ・ナマコなど棘皮動物に見られる、水管系から伸びて運動・呼吸・摂食などに用いる管状の器官。","book":"長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","note":"","id":"35630ed08f3481fa88f7e47c5b61c799"},{"text":"ジャーゴン","author":"特殊用語、専門用語。転じて、部外者にとってはちんぷんかんぷんな言葉。職業集団・業界内のみ通じる隠語的言語。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481faaebceacdadc54ebe"},{"text":"淵源／えんげん","author":"","book":"","note":"もともとの起源、みなもと。「思想の―」「―をたどる」のように使う。\n池上俊一／『ヨーロッパ史入門 原形から近代への胎動』","id":"35630ed08f3481fab1e1f51f02fcc460"},{"text":"他我／たが","author":"哲学用語。自分以外の他者の自我。「いないけれど、いる他者」。フッサールの現象学等で論じられる重要概念。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481fab1e5c64154e6f2f4"},{"text":"媚態／びたい","author":"","book":"","note":"名詞。①媚びる態度、なまめかしいしぐさ。②女性の艶めかしい色気、男に取り入ろうとするしな。「媚態を示す」「媚態を含んだ目」。\n三田誠／『ロード・エルメロイII世の冒険 10 星冠密議(2)』","id":"35630ed08f3481fb8288d1c253257631"},{"text":"公館／こうかん","author":"","book":"","note":"政府の公的な建物・施設。大使館・公邸・職員住宅などに使う建物。\nマーク・グリーニー／『暗殺者の復讐』","id":"35630ed08f3481fb9234c3a27cf41fa7"},{"text":"アルファ雌／アルファめす","author":"動物の群れにおけるリーダー的地位の雌個体。ミーアキャット、クジラ、ボノボ等の社会性動物で見られる。","book":"ナショナル ジオグラフィック電子版2026年1月号","note":"","id":"35630ed08f3481fbb5f5e2780af56e3f"},{"text":"白い肌の報酬／wages of whiteness","author":"W. E. B. デュボイスや D. R. ローディガーらのアメリカ社会学・歴史学における概念。白人にとって「白い肌」であること自体が社会的地位・心理的優位・労働市場での優遇などの「報酬」をもたらしたとし、人種隔離・差別の社会システムを実質的に支えてきたとする考え。Wages of whiteness。","book":"黒崎真／『マーティン・ルーサー・キング―非暴力の闘士』","note":"","id":"35630ed08f3481fd82cfc2e48d5aba0a"},{"text":"水入り／みずいり","author":"名詞。①相撲で、長引いた取組を一時中断して力士に水を飲ませる休憩。再開後を「水入り後」という。②転じて、勝負がつかず一時中断・引き分けに終わること。","book":"中島リュウ／『砂の海のレイメイ 3』","note":"","id":"35630ed08f3481fdb07cc1e4b31fc36c"},{"text":"馬勒／ばろく","author":"","book":"","note":"馬を制御するために頭部に取り付ける馬具の総称。頭絡 (とうらく) とも言い、口を縛るハミや手綱をつなぐもの。\nマーク・グリーニー／『暗殺者の正義』","id":"35630ed08f3481fdbb40cc54b4058340"},{"text":"周章狼狽／しゅうしょうろうばい","author":"大いにあわててうろたえるさま。ひどく慌ててしまうさま。四字熟語。","book":"マーク・グリーニー／『暗殺者の正義』","note":"","id":"35630ed08f3481fe802be9d81a77c535"},{"text":"一日の長／いちじつのちょう","author":"他のものよりもやや優れていること。ちょっとその道に詳しいこと。『論語』「並び動けば必ず我に一日の長あり」に由来。","book":"長月達平、梅原英司／『Vivy prototype 1巻』","note":"","id":"35630ed08f3481fe900fddb465d0899b"},{"text":"木強漢／ぼっきょうかん","author":"","book":"","note":"律義者。正直で頗固な男。「木強」は「こわばり」で、不器用だが人柄の複雑さを持たず一途なさま。\nマーク・グリーニー／『暗殺者の反撃 上』","id":"35630ed08f3481fe9106d7fc9bea69fe"},{"text":"夜郎自大／やろうじだい","author":"四字熟語。自分の力量を知らずに威張ること。古代中国・夜郎国の王が漢の大きさを知らず大国を自称した故事から。","book":"内田樹／『街場の文体論』","note":"","id":"35630ed08f3481fe91b6fd2644b7b4ec"},{"text":"マイケル・ポランニー","author":"Michael Polanyi。ハンガリー出身の物理化学者・科学哲学者（1891–1976）。明示できない暗黙知（tacit knowledge）の存在を論じ、「ポランニーのパラドックス」として知られる。","book":"岡野原大輔／『大規模言語モデルは新たな知能か』","note":"","id":"35630ed08f3481fea45bf066c09d2ced"},{"text":"山勘／やまかん","author":"","book":"","note":"経験や勘に基づくあてずっぽう。あて推量。山師の勘。\n長月達平／『戦翼のシグルドリーヴァ Rusalka 上』","id":"35630ed08f3481ff8735f022aae8daaf"},{"text":"国なき民のアーカイブ","author":"","book":"","note":"国家を持たない民族・離散民族の言語・文化・記憶を保存する記録装置・プロジェクト。デジタル人文学の領域。","id":"35630ed08f3481ffbc5bcc39f27d8a2b"},{"text":"たとえ世界が闇に包まれたとしても、闇から救い出すものたちが現れる。","author":"カール・マンフレッド","b function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 旧 BudouX 統合は削除済み (2026-05-06)。文節分割は CSS の word-break: auto-phrase に一本化。
// 関数は名前互換のため残置 — 単に escapeHtml を実行する thin wrapper。
function wrapWithBudoux(text) {
  if (!text) return '';
  return escapeHtml(text);
}

// Adaptive interval: base 5s, +0.07s per char above 30, capped at 10s
function intervalFor(quote) {
  const len = (quote && quote.text) ? quote.text.length : 30;
  const ms = 5000 + Math.max(0, len - 30) * 70;
  return Math.min(10000, Math.max(5000, ms));
}
