ている人はこの病気になりにくいといった情報から、まだわかっていない原理や法則を導き出す。データ主導のアプローチといってもよい。","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f34818485d5f4fa6f984b36"},{"text":"常日頃から、これは貴族に求められる代償だと考えている。統治を行なうには、自分の権力を代行してふるう者たちについて、正確かつ的確に判断しておくことが肝要だ。配下のミスや暴走で失脚した統治者は、けっしてひとりではない。","author":"フランク・ハーバート","book":"デューン 砂丘の子供たち 下","id":"35030ed08f3481fd9363cad10ad4f4f3"},{"text":"平和な人間関係に近づくことです。それが聖杯の本質的な意味。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481c38bfdd1b990ea343d"},{"text":"平和は解決策を求めるものだが、われわれは臨機応変の生きた解決策を見いだせていない。ただ解決策を追い求めるのみ。お定まりの解決策は、定義上からも、死んだ解決策でしかない。平和は成果を奨揚しないくせに、過ちがあればここぞと糾弾する。それが平和のやっかいなところだ。","author":"フランク・ハーバート","book":"デューン 砂丘の子供たち 下","id":"35030ed08f3481beaca9d161e035df5e"},{"text":"平均寿命が延びているおかげで、ひと晩寡ればその大半を取り戻せる。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f348155b3a0ce45eec00451"},{"text":"幸せな思い出がないと、悲惨な経験しか蘇ってこない","author":"","book":"","id":"5c430ed08f348285b86b813002422149"},{"text":"幹細胞のテロメアが短くなりすぎると、もうメラニン細胞は作られず、髪は「自然な」色──真っ白に戻る","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34810d8196caa40d53c89f"},{"text":"座るもののいなくなった空席は、後を継ぐものたちが埋めるしかない。","author":"長月達平","book":"戦翼のシグルドリーヴァ Rusalka 上","id":"35030ed08f348156b12fca98a2e2ecc1"},{"text":"引き受けるべき責任は、ひとりひとりの中にあるはず","author":"福井晴敏","book":"機動戦士ガンダムＵＣ９ 虹の彼方に 上","id":"35030ed08f34811aaa89f66929a76f2f"},{"text":"強く、シンは言葉をかぶせた。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f348105932ed34ff413eebd"},{"text":"強くなければ善良でも、正しくもいられないなら。せめて。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"ed230ed08f34827c82720155ed780371"},{"text":"強力な自己修正メカニズムを持つ制度や機関を構築するという、困難でかなり平凡な仕事に熱心に取り組まなければならない","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f348165bf4cd3cc238fe4ed"},{"text":"彼女は頰と唇に笑みのかたちをとらせた。","author":"笹原 千波","book":"風になるにはまだ","id":"35130ed08f34818e94b7f3b90db30892"},{"text":"彼女を生かすための薪となるのなら。","author":"長月達平","book":"戦翼のシグルドリーヴァ Rusalka 下","id":"35030ed08f3481fab2d6ea5118fe312f"},{"text":"心理学の立場から言えば、指導者とは、なにを成し遂げられるかを見抜いて、それを実行した人間。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348100b1d3f7c002dd08c3"},{"text":"心臓が体内にないものだから、魔法使いは死なない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34810b9662f2eb5c8e6a63"},{"text":"心臓発作が起きていることに患者本人が気づかないことさえ","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34816da8a5fcac4979dd3e"},{"text":"必要とあらば灰化層の中にまで飛び込む技師であっても、人の命まではどうにもできない。","author":"畑リンタロウ","book":"プロジェクト・ニル2","id":"35030ed08f34816ab07fdc0041e80e74"},{"text":"必要なのは世界に生命をもたらすこと、そのためのただひとつの道は、自分自身にとっての生命のありかを見つけ、自分がいきいきと生きること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481539f99d9659888bc29"},{"text":"必要な物を指折り数えていたら、すぐに指が足りなくなった。","author":"桐山なると","book":"超かぐや姫！","id":"35030ed08f348142ab1bca129ce3350f"},{"text":"忘れているといけないからいうが、おれはめったに的をはずさない。","author":"マーク・グリーニー","book":"暗殺者の反撃 下","id":"35030ed08f34817ebe33c584ef07b3b8"},{"text":"思いやり（compassion）とは、元来「共に苦しむ」ということ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34810495ecddab7f6c3c77"},{"text":"性別を決める。その人物が男であるか女であるかについてはきちんとした理由がないとダメ。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f348125bf96cc971683965e"},{"text":"恐ろしい龍には、そのうろこの一枚一枚に、「なんじ……すべし」が刻まれている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481fb935dc1ecd7105a6d"},{"text":"患者の意識が近い将来に回復しそうかどうかを統合情報理論で予測できる","author":"紺野大地、池谷裕二","book":"脳と人工知能をつないだら、人間の能力はどこまで拡張できるのか","id":"35030ed08f3481eab022c6ff651d132e"},{"text":"悪い当事者を殺せば、悪い当事者が悪行にいそしむのを、まちがいなく終わらせることができる。","author":"マーク・グリーニー","book":"暗殺者の正義","id":"35030ed08f3481368dfccc74882b2d58"},{"text":"悲しんでいる美しい女に触れるすべを知らなかったからだ。","author":"マーク・グリーニー","book":"暗殺者の鎮魂","id":"35030ed08f3481d28881fbf2035a6b02"},{"text":"情報とは一体何なのだろうか。この問いに答えたのが、二〇世紀を代表する科学者であるクロード・シャノン","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f3481d295c0d01d671d7017"},{"text":"情報は真実ではない。情報の主な仕事は事実を表すことではなく、人々をつなげること","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481d9ac18ca15e7134bb2"},{"text":"情報は真実ではなく、情報革命は真実を明らかにはしない","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481228aedd0918663322f"},{"text":"情報は素朴な見方とは裏腹に、真実を発見するためではなく秩序を生み出すために使われることが多い。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481efbd2ec3e9558d7ff2"},{"text":"情報システムは、真実はほんのわずかでも秩序がたっぷりあれば、多くを達成することができる。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f3481dcb1aed8bd90e60f97"},{"text":"情報ネットワークはあまりに複雑化し、不透明なアルゴリズムによる決定とコンピューター間の存在にあまりに依存しているため、人間には政治にかかわる疑問のうちでもごく基本的なもの、すなわち、なぜ私たちは相争っているのかという疑問にさえ答えるのがひどく難しくなってしまった。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f34818f8096ee715a2d3015"},{"text":"情欲がえさで、死が釣り針。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34814c8684d3d9864e0e62"},{"text":"意識の外にあるアイデアを掴むためには、未知の領域に地図もなく歩み出すような行為が必要になってきます。","author":"兎野卵","book":"創作に悩んだ時のための33の質問 スランプ編","id":"35030ed08f34810ea930fe2167498b79"},{"text":"意識転送技術の大前提だ。早い話が、意識は転送できてもコピーはできない。脳内のナノマシンによってスキャンされた神経活動データが統一性を獲得した――つまり、ひとつのクローン意識として再構成された――時点で、オリジナルは消失する。同一の意識が同時に存在することは不可能だからだ。オルタナへと意識を転送すれば、肉体の側は意識のない完全な欠落体になる。","author":"松樹 凛","book":"射手座の香る夏","id":"35130ed08f348192a3fff9a2b7f39198"},{"text":"愚かさを理由に思考を放棄し、弱さを免罪符に身勝手を撒き散らすことを己に許した。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"08630ed08f3482fe964a812cc893b204"},{"text":"愛するのがどういうことか、自分にわかっているのだろうか。","author":"マーク・グリーニー","book":"暗殺者の鎮魂","id":"35030ed08f3481c7904ac8dbcff2358c"},{"text":"愛はたくさんの機能のうちのひとつです。本来なら全体の秩序に奉仕すべきひとつの機能がシステム全体を支配すると、物事は狂ってくる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34816b9c16ca30dcd82a08"},{"text":"愛は生の燃え上りです。そして、人生のすべては悲しみに満ちており、愛もまたしかり。愛が強ければ強いほど、苦痛も増していく。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481b98d47fe659ba26338"},{"text":"愛は目と目を通して心に入る。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481ecb127cd210fed3963"},{"text":"愛は社会秩序とは無関係。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481858360cda1e010a750"},{"text":"愛は神の訪れであり、それゆえに結婚よりも崇高なもの。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481238e1df0a952ce69ee"},{"text":"感傷は暴力のエコーにすぎない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34811e89e1f757c08e4366"},{"text":"感情は確かに現実に存在するが、事実ではない。感情は推測であり、選択肢の一つだ。わたしたちの必要を満たし生存を支えるために世界を意味づけしようとする脳の試みなのだ。","author":"ジュリー・スミス","book":"一番大切なのに誰も教えてくれない　メンタルマネジメント大全","id":"27430ed08f34829db1ae0153f545010d"},{"text":"成功した報酬として楽しさがあるのではなく、「楽しそう」を連鎖させて行った先に、ふと「成功しそうなアイデア」が出現する。","author":"兎野卵","book":"楽しさについて考える","id":"35030ed08f3481a3a699fcc72c95e1cf"},{"text":"成功像に目を奪われた瞬間、自分の心のささやかな欲求の声は聞こえなくなる","author":"兎野卵","book":"創作はメモから始まる","id":"35030ed08f3481de85e7e8fe54e05aaa"},{"text":"成功欲求は自分を惑わす罠でもあります。これは自覚しておいたほうがいいでしょう。さもないと、「楽しい選択肢」を自ら切り捨てて、「楽しくない」道をひた走ってしまう可能性があります。","author":"兎野卵","book":"楽しさについて考える","id":"35030ed08f3481cda2f9f7e4eb6fd800"},{"text":"我ら、世界に誇る正義たらん。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f3481fabb60f23835345eae"},{"text":"戦い抜くと、生き抜くと。──幸福になると決めたのだからそのとおりに。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f348175bea2d438b093068f"},{"text":"戦争が人を疲弊させた先にあるもの","author":"ウィリアム・H・マクレイヴン","book":"THE HERO CODE (Japanese Edition)","id":"e4b30ed08f34831f8588810abc8f5f50"},{"text":"戦争というまったく非自然で非人間的な災害","author":"トニーレドモンド","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"33030ed08f348256817781299d6c9475"},{"text":"戦人の女王として峻厳と。途方もない難局に、なおも臆さず対峙する女王のように凜冽と。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f3481f6bbc2c6050a4b1204"},{"text":"戦場では死は、誰にも平等に、唐突に、当たり前みたいな顔で訪れる。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f3481e7bf36c4aff868a0ee"},{"text":"戦場に戦帝が不在の今こそ──鮮血の女王が立たぬわけにはいかないのだから。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f34813eb492e07a88e393b7"},{"text":"戦場も死もあらゆるものを白く美しく、覆い隠す雪ではなく、降り積もるなりみっともなく溶けて、泥を生み黒く汚れるみぞれが降っている。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"35e30ed08f3482009bf101d058e02f8f"},{"text":"手という下僕、足という乗り物は、我が心の思うように動いてくれる。","author":"鴨 長明","book":"方丈記","id":"35130ed08f34818f9c57db43e81a34ee"},{"text":"批判と受け止められる意見は、簡単に誤解され、増幅され、悪用される恐れがある","author":"トニーレドモンド","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"b5330ed08f348244b34281bf3e59098d"},{"text":"技術上の必然性のせいではなく、新しいテクノロジーを人間が賢く規制しそこねた結果である可能性が高いだろう。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481cab4b6d84de757a7d6"},{"text":"技術的には、自動車を運転するよりも結婚式を執り行なうほうが、ロボットにとってははるかに簡単だ。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481bf9f01f032a0f2181e"},{"text":"捕食者を獲物に変えるのは、いたって簡単だ","author":"マーク・グリーニー","book":"暗殺者の反撃 下","id":"35030ed08f34817ca0adee7cd14642e4"},{"text":"接続性の時代において、無知は所与ではなく選択肢の１つとなる。","author":"ジム・クウィック","book":"ＬＩＭＩＴＬＥＳＳ 超加速学習","id":"35030ed08f3481c18cb7ddb5372d0e29"},{"text":"描きたいものが漠然として何をしたらいいか分からない時は、だいたい「how」のことしか語っていないことが多い","author":"兎野卵","book":"創作はメモから始まる","id":"35030ed08f348158a0e7fa3673af615b"},{"text":"描くだけなら絶対に現実を超えられません。作品そのものが「現実」だという高み。","author":"帚木 蓬生","book":"ネガティブ・ケイパビリティ 答えの出ない事態に耐える力","id":"35030ed08f3481bfb783e98c53f61a26"},{"text":"支援とは、先方から要請があり、きちんと招待されたときに行なわれるべきものである。","author":"善意からであっても、招かれざる人道支援は負担を増やしかねない。","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"acb30ed08f3483f5835581c1472a5d10"},{"text":"政府は謎めいた法則で動くものだ","author":"イギリス政府高官ジャック・ジョーンズの言葉。","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"f3230ed08f34838a88e801f2ece3f1fe"},{"text":"政権は何年にもわたって国民を威嚇し、自発性や個性を罰し、従順さと服従を奨励した。そのせいで兵士たちのやる気が失われた。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f348189949dfbf034bb8f02"},{"text":"政治における主要な情念は貪欲。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348136ba55f1154e9adeb4"},{"text":"救いの手にはなれるが、決して救い主にはなれない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481db83d9f42679beaa8a"},{"text":"教師は、どんな場合にもまずきちんと話をして、それから多少の大まかな手がかりを与えるべき。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34818c8c69e514982d5e48"},{"text":"教師は灯台みたいなもの。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348112a2b1c1d6ae85f9e4"},{"text":"教育とは、問題を早急に解決する能力の開発だと信じられ、実行されてきた証拠。","author":"帚木 蓬生","book":"ネガティブ・ケイパビリティ 答えの出ない事態に耐える力","id":"35030ed08f34811fb32bfe44997bf902"},{"text":"敵の目のなかにあるおが屑を取るのではなく、自分自身の目のなかにある丸太を取り除くこと。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348139aad4d59b92ec3cbc"},{"text":"文学は読む人の記憶の素材からイメージを構築させるから、その人固有の物語イメージとなって、読む人を物語に深く誘い込む。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f3481ddb69fdc91ed6e4655"},{"text":"新しいアイデアや刺激でふくらんだ人の心は、元の大きさに戻ることはない","author":"ジム・クウィック","book":"ＬＩＭＩＴＬＥＳＳ 超加速学習","id":"35030ed08f34814eaa6bfdccf6db3d85"},{"text":"新しいシリコンのカーテンは、民主主義政権と全体主義政権を隔てる代わりに、全人類を、人知を超えたアルゴリズムという支配者と隔てるかもしれない。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f3481cd9551c2c3d951c9c1"},{"text":"新しい種類の神々を世に送り出している","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481a69a94c37d0fa5f943"},{"text":"新しい行動の創造こそ、知的な行動。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f3481e08f1af98fd99545d9"},{"text":"旅に出て、目的地がどんどん遠のいていくのを経験すると、ほんとうの目的は旅そのものであったことに気付く。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34817db60ff7d521a8bb92"},{"text":"日付が物語の支柱となり、時間のサイクルの基盤となる。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f34819ba7fbde127c8c5d50"},{"text":"旧暦の七夕です。その日は手持ちの鏡の裏に、自分の願い事を書いた紙を貼って下さい。そして鏡には、自分の一番良い笑顔を映すのです。その笑顔がそのまま神様に届き、願い事がかないます。","author":"帚木 蓬生","book":"ネガティブ・ケイパビリティ 答えの出ない事態に耐える力","id":"35030ed08f348150a5d6d8cdb64e174d"},{"text":"映画脚本家は、環境的な手がかりを脚本に埋め込み、一緒に映画を創る芸術家の仲間たちに与えることで、自分が最初にイメージした作品の三次元的な世界へと導く。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f3481d0a485e802b6cd0e63"},{"text":"時には神でさえ、少しばかりのリニューアルが必要となる","author":"","book":"","id":"2fc30ed08f34800ebad8d5d11b36f1f4"},{"text":"時空が追い付いた","author":"","book":"","id":"24730ed08f348220bbd801910c7427f3"},{"text":"時間が存在すれば、苦しみが存在する。過去がなければ未来はない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481679915cf3098f4728d"},{"text":"時間の断片を通して原初の存在の完全な力を見る。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348166a784f84e3bacc294"},{"text":"普段から状況を思い浮かべながら書く訓練をしている脚本とそうでない脚本とでは、実際に映像となった時に大きな違いが出てくる。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f348117a92fe648d0e38462"},{"text":"暗い冬の間、白魔の暴虐を免れ得ない。","author":"","book":"安里アサト.８６―エイティシックス―Ep.13　─ディア・ハンター─(電撃文庫)(p.17).株式会社ＫＡＤＯＫＡＷＡ","id":"4a530ed08f348333837081e72d4f9677"},{"text":"暗い青い闇","author":"安里アサト","book":"86―エイティシックス Ep.12 ホーリィ・ブルー・ブレット","id":"35030ed08f3481cc8154c6c8c739ef9b"},{"text":"暗部の人間は不思議なことに堅気の人間よりも信頼関係を大事にする傾向にあった。それはきっと裏切った際に受ける制裁が、光の世界以上に残酷だから","author":"東崎惟子","book":"竜の姫ブリュンヒルド","id":"35030ed08f34813690ecccec347dfbe3"},{"text":"暗闇のなかへ降りて行く。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481599346e2f27f0c952e"},{"text":"書きかけの作品があれば、最初のページを見なおしてみよ。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f3481259e3ef9efca6abc8e"},{"text":"書物は書き手と読み手をつなぐネクサスだ。それは、多くの人の心を結びつけるリンクであり、読まれてこそ存在する。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481d48e20e1c6be7e2019"},{"text":"最初は自分のことだけを考えていた主人公が、より大きな責任を背負い、時には自分を犠牲にしても、社会に必要なもっと重要なものに尽くすようになる。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f3481b68c64cfeb9ceb6046"},{"text":"最善のものは思考を超えているから語ることはできません。次善のものは誤解される。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348174a6bec505c0dd2d49"},{"text":"最後はみな墓場だからといって、人生が空しいとは言えません。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f34817fab07e9554cf4225b"},{"text":"最適化問題とは目標を設定し、その目標をできるだけ達成できる解を求めるという種類の問題","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f34814b9677c1ee67292eb8"},{"text":"月によみがえりや不死の飲料があるという神話は世界に多くみられ","author":"沖田瑞穂","book":"世界の神話","id":"35030ed08f348106a918e65cd2b84b8b"},{"text":"有意義な活動に集中し、他者と自分自身の時間を節約するイメージを大切にする。これを北極星のような指針とすべし。","author":"ジム・バンデハイ; マイク・アレン; ロイ・シュウォーツ","book":"Simple 「簡潔さ」は最強の戦略である","id":"1c230ed08f34828fb9cf81ffbc3f67f6"},{"text":"朝、死ぬ人がいるかと思うと、夕方、生まれる人がいる。","author":"鴨 長明","book":"方丈記","id":"35130ed08f3481f19cb3c90d4d5ca1b9"},{"text":"未来にユートピアが到来すると強く信じていたら、現在に恐ろしい苦痛をいくらでも引き起こしてかまわないことになってしまう","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481608e45ffa957ce8100"},{"text":"未知のデータでもうまく予測できるようになることを汎化とよび、汎化ができる能力を汎化能力とよぶ。機械学習の最大の目標は、汎化能力を獲得することにある。有限のデータから無限のデータに適用可能なルールや法則を獲得するのである。","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f34810d993ef7ccf5383bcc"},{"text":"本当の家族っていうのは、苦しみを分け合う人たちのことだ。幸せじゃなくて、苦しさで繫がる。","author":"松樹 凛","book":"射手座の香る夏","id":"35130ed08f348145abeec41049c2819b"},{"text":"机を飛び越した長身が、棒立ちのエステラを正面から抱きしめ、仰天させる。その勢いにエステラはとっさに、暴漢を無力化する際のプログラムを立ち上げかけ──、至近のアッシュの笑顔、それが初めて会ったときのそれと同じものと気付き、動きが止まる。","author":"長月達平","book":"Vivy prototype 1","id":"35030ed08f348150a16ac0784588d02f"},{"text":"条項が現在の実体法のように細かく定められることなく、手続きのみが定められていたことが功を奏した","author":"ヘンリー・キッシンジャー","book":"国際秩序 上","id":"35030ed08f3481e4adbde43d386a5db7"},{"text":"根本的に異質の誤りを抑制できる制度や機関を構築する必要がある。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481c1b6a5d516e556e63a"},{"text":"植物状態は脳死とは違う。大脳が損傷しているせいで意識はないけれど、小脳や脳幹はちゃんと生きて、動いている。だったら、他のところから意識を持ってくればいい。たとえそれが、別の人間のものであっても。","author":"松樹 凛","book":"射手座の香る夏","id":"35130ed08f34817a8912fa413323247a"},{"text":"楽しくない時、人は「否定」に支配されています。過去を恨むのも、未来を恐れるのも、自己嫌悪も他者への憎悪も、全ては「否定」の感情です。でも、本当は否定したくない。 誰一人として、自分を否定したい人はいない。本当は他者のことも否定したくないし、世界を否定したくもない。この「否定を拒絶する」本能、それこそが「楽しさ」を求める衝動の正体なのでしょう。","author":"兎野卵","book":"楽しさについて考える","id":"35030ed08f34818e9251e2ae58126147"},{"text":"構造論にはまってしまうと、我々の住んでいる現実とは違う人工的な世界を見ることが目的化してしまう。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481c7bccbdc51d7855b44"},{"text":"権勢のある者は欲深くて、心が満たされるということがない。","author":"鴨 長明","book":"方丈記","id":"35130ed08f3481cc9245fd786057c0bb"},{"text":"正常ではない環境で活動し、ときに困難や危険をともなう場合であっても、プロフェッショナルな水準の支援を提供すべき","author":"ボランティア活動においてこそ、心掛けるべきこと。","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"6a730ed08f3482ef9b858140113de03c"},{"text":"正直さは、誠実さの礎であり、人格のあらゆる側面が構築される土台となるもの","author":"ウィリアム・H・マクレイヴン","book":"THE HERO CODE (Japanese Edition)","id":"00330ed08f348379b36c0156922d9ff0"},{"text":"歳をとったり、過敏性腸症候群、糖尿病、結腸がん、認知症といった慢性疾患を抱えたりすると、腸内はより少数派で攻撃的な微生物に支配されてしまう","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481708652d74dfda520dc"},{"text":"歴史は人間が変化することを許さなかった厳密なカースト制度で満ちあふれているが、人間を粘土のように成形しようとした独裁者だらけでもある。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f348150af61c076d2e40138"},{"text":"歴史や価値観について（よそよそしい関係を除けば）たがいになんの結びつきもない、おびただしい数の統一体（国家）が、もっぱらみずからの戦闘能力の限界を、自分たちを測る尺度にしているのだから、秩序よりも紛争が起きる可能性のほうが高い。","author":"ヘンリー・キッシンジャー","book":"国際秩序 上","id":"35030ed08f348165ba61f830bcf60833"},{"text":"歴史上のどの情報ネットワークも、人間の神話作者と官僚に頼って機能してきた。粘土板やパピルスの巻物、印刷機、ラジオは、広範に及ぶ影響を歴史に与えたが、あらゆる文書を作成し、それを解釈し、誰を魔女として火あぶりにしたり、誰をクラークとして奴隷にしたりするかを決めるのは、つねに人間の仕事だった。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f3481229891f20b7d8a8127"},{"text":"死ぬためじゃない。命を拾うために、行かなきゃ","author":"虚淵玄","book":"アイゼンフリューゲル2","id":"35030ed08f34811b9445e1860435c641"},{"text":"死ぬべき運命と、あなたのなかにある死を超越したものとの関係——それを理解するのは容易なことではありません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34811cb4dfc2ad3905ba0f"},{"text":"死亡率は毎年だいたい１〜２％。対照的にヒトの場合、８年ごとに死亡率は２倍になる","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481ecbe1fe08834f6ea4d"},{"text":"死者を想うことができるのは生者だけ","author":"","book":"進撃の巨人","id":"bcf30ed08f34826f88be01135ca758b6"},{"text":"残りわずかな今日という夜","author":"長月達平","book":"戦翼のシグルドリーヴァ Rusalka 上","id":"35030ed08f348104b8f9c86fd1910be9"},{"text":"母親は子供の本性（nature）を産む。そして父親はいわば子供の社会性を、社会的な役割を産む。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481be9f48df63110121ed"},{"text":"民主主義の理想に従って生き、より多くの人や集団を公の場での話し合いに含めるようにというプレッシャーによって、社会秩序が損なわれ、民主制が機能不全になりそうに見えた。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f34810db1f2f6008859d743"},{"text":"民主主義は保証されたものではなく、守るには闘いと犠牲が必要だが、喜びや進歩も伴う。","author":"池上彰","book":"池上彰の世界の見方 アメリカ2","id":"35030ed08f348166a784d112d2840922"},{"text":"民主主義は状態ではなく、行動である。","author":"池上彰","book":"池上彰の世界の見方 アメリカ2","id":"35030ed08f3481a6bf58de6da8e9df98"},{"text":"民主主義政権は現代の情報テクノロジーを使って情報の流れをより多くの機関や個人の間で分散化し、真実の自由な追求を奨励する。その結果、砕け散る危険と闘う羽目になる。しだいに多くの惑星がしだいに速く公転していく惑星系のようなもので、中央は依然として体制を維持できるのか、それとも体制はばらばらになって無政府状態に陥るのか？","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f348125b612d66e1cc1cb9a"},{"text":"永遠とは、いついつまでも存在するというようなものではない。それはまさに、いま、ここにある。この地上であなたが他者と関わり合う、その経験のなかにある。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481e59146d11d58f45a14"},{"text":"永遠は時間を超越している。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481648b85f19eef0e046e"},{"text":"永遠を知りつつ、しかもみずから進んで時間のかけらである現世に身を置き、積極的に、喜びをもって、この世の悲しみに参与する者。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348103bd2fc8e14fbbfa7b"},{"text":"決め台詞には状況をリセットできるという利点もあるが、それを使うことによってマイナスの印象を与えてしまう。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f34810eba88fa45cc525451"},{"text":"治療上大切なのは、今生じていることを手を加えずに持ちこたえること。","author":"帚木 蓬生","book":"ネガティブ・ケイパビリティ 答えの出ない事態に耐える力","id":"35030ed08f3481deb662e766d35d0626"},{"text":"流行りの絵が描ける自分ではなく「推せる自分」になっていただきたい","author":"カレー沢薫","book":"オタクのたのしい創作論","id":"35030ed08f348117b178feca8cf67e89"},{"text":"消えていくんなら消えていく理由が必要で、そういうところを無視して書くと単なるお祭り騒ぎになってしまって、観終わっても何も残りません。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481fd843ad3b78ade815b"},{"text":"深い話が、いつかAIによって科学的に否定されてしまうのではないか。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f3481638c23ed8b99104c3f"},{"text":"深くシミュレートできるのは、文字という表現手段がほどよく物事を抽象化してくれるから。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f3481028948f20b511ea8a1"},{"text":"温暖化が進むなか、野生動物の多くが「順応か死か」の選択を迫られている。","author":"","book":"","id":"d7630ed08f3483f5b3c8819c418e7ab0"},{"text":"滅びに通じる門は広いが、命に通じる門はなんと狭く、その道も細いことか。それを見いだす者は少ない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34816d8e21d09e735cab19"},{"text":"演出家が何を根拠に演出するかを分かった上で脚本を書くか、それとも文学として書くか。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481f3a888f53a91d3b0bf"},{"text":"演繹的なアプローチは、基本となる公理や普遍的な事実、法則をもとに、それを具体化していく。例えば、ニュートンの法則から流体力学が導出され、目の前の液体がどう流れるのかを予測できる、といったアプローチである。","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f3481f89511c1ae0ce83eeb"},{"text":"無上の喜びがどこにあるかを直感する。それをつかまえることです。その先がどうなるかは、だれにもわからない。自分のことは自分で見極めるよう努力する。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f34816e8ee5d8c7e0d86dd5"},{"text":"物語とは、こうした「バイアス」の乗り越えによって生じる、全てのものごと","author":"冲方丁","book":"生き残る作家、生き残れない作家","id":"35030ed08f348145b1a1f40f78c0b68c"},{"text":"物語に自然に入って、現実に自然に帰ってこられるように、小説では、行きも帰りも親切に用意されている。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f348150a6d8e90e61091421"},{"text":"物語のモチーフは色んなところに用意されていて、そういった予めあるものを持ってきて一つの流れにはめ込むということを繰り返している。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481d49852fbac1e30d6b8"},{"text":"物語は、われわれが人生と世界に与えるプロット。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481288ea3caff38cbf17d"},{"text":"特にアニメーションの場合は想像で物を描いてしまっている気がします。そこにあるのは、空想でも面白いものを作れる、自分の中から空想で引っ張り出してきたものの方が面白いという発想なのですが、実は、そんなことあるわけないじゃないですか。限界があるでしょう。その限界の外側にこそ膨大な世界が拡がっている。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481489b84d5b0212bcb2e"},{"text":"犬が人を噛んでもどうってことはないが、人が犬を噛んだら、これは事件。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34813989a2f1f5d452c4c0"},{"text":"狩猟民は農耕民にはとてもまねができないほど個人主義的。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34815a8cabd23c485dda71"},{"text":"猿でなく、野人でなく、ヒトはいまヒトとして此処に在る。","author":"虚淵玄（ニトロプラス）","book":"アイゼンフリューゲル2 アイゼンフリューゲル（イラスト完全版）","id":"54530ed08f34822bbafc0195f8b53d34"},{"text":"王国の暗部に生きていた彼には、これこそが本分だ。","author":"東崎惟子","book":"竜の姫ブリュンヒルド","id":"35030ed08f3481da9549cef53fa21b16"},{"text":"現世の犯罪は、未来の救済という約束によって、あまりに簡単に赦すことができてしまう。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481e08291e92455e31807"},{"text":"現在のものから過去を推測することは可能ですが、危険なやり方。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f34812e9120e0f86503e86d"},{"text":"現在の人間の世代が誇る繁栄は、感覚を持つ他の生物と未来の人間の世代に恐ろしいつけを回すことで実現しているのだ。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481e48aa9f64031a9e5fb"},{"text":"現在南アメリカ諸国が、ほとんどスペイン語とポルトガル語圏なのは、この植民地時代の名残。","author":"池上彰","book":"池上彰の世界の見方 アメリカ","id":"35030ed08f3481f7ae65faa0b5195c41"},{"text":"現象論的には意味を理解しているという見方が適切だろう。","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f348110a21feba6a0a36654"},{"text":"理想の一翼を全うし続ける","author":"","book":"TOKYO MER","id":"cbf30ed08f3483488eb501bb4281d7fa"},{"text":"理想通りの目的地に到達するためには、まだ遠い場所にいる段階で舵を切ることが重要","author":"兎野卵","book":"創作に悩んだ時のための33の質問 スランプ編","id":"35030ed08f3481dfa354e9fc52604e62"},{"text":"甘く落ち葉の香りがした。","author":"笹原 千波","book":"風になるにはまだ","id":"35130ed08f34819ca838e6129bf4a5d7"},{"text":"生きた肉体の感覚が早くも恋しいのに、戻ってくると奇妙に安らぐ。","author":"笹原 千波","book":"風になるにはまだ","id":"35130ed08f3481ffa7e7ceec726aef72"},{"text":"生きているうちにできるだけの幸福を経験するべきだ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481799fded335559fd6c4"},{"text":"生き延びた者に興味がある","author":"心理学者の関心。生還者が専門。","book":"エージェント・オブ・シールド","id":"20e30ed08f34821787da01e53ed57635"},{"text":"生まれつき６本の指を持つ人は、６本目の指に対応する脳領域が発達することが知られています。","author":"紺野大地、池谷裕二","book":"脳と人工知能をつないだら、人間の能力はどこまで拡張できるのか","id":"35030ed08f3481bb8325de1a16ac0228"},{"text":"生命はそうやって熱力学的な老化の義務から逃れているのだ","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34810eacadfbdf36a7c56a"},{"text":"生涯で数光年の長さのＤＮＡを生み出す","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481a28916ed574152bd25"},{"text":"生物学（と神話）では、不死にはかならず代償がある","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34816eb0d3d21a4ae8821a"},{"text":"病気の早期発見には複雑な効果がある。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481baa116f0928be522a8"},{"text":"痛みに対する「経験的開放性」を養うと、痛みを予期し脅威を感じることが少なくなり、それに伴う不安と恐怖が低減すると示唆される","author":"モンティ・ライマン","book":"痛み、人間のすべてにつながる","id":"35030ed08f3481729895cea830e03a52"},{"text":"痛みは医者であり、教師であり、ボディーガードでもある。","author":"モンティ・ライマン","book":"痛み、人間のすべてにつながる","id":"35030ed08f3481ab9b8fed9c2b77aaa8"},{"text":"痛みは私たちを愛に導くものでなくてはならない。","author":"モンティ・ライマン","book":"痛み、人間のすべてにつながる","id":"35030ed08f3481e7b7d7e0dcbe96f307"},{"text":"痛みを感じる神経はなく、恐怖を感じる心はなく、足を止める命令もない。","author":"長月達平","book":"Vivy prototype 1","id":"35030ed08f3481389734ea3db9fdd626"},{"text":"痛みを抱える誰かをケアする機会を得た人は皆、信頼を培い、不必要に不安をあおるような言葉遣いをやめ、ポジティブな結びつきを強くし、現実的ながらはっきりと前向きな姿勢を求める状況をつくり出すよう努力しなければならない。","author":"モンティ・ライマン","book":"痛み、人間のすべてにつながる","id":"35030ed08f34814c96f2e8b00c9a1c0a"},{"text":"白髪の彼の人生の歩みを感じさせる。","author":"アサウラ","book":"リコリス・リコイル Recovery days","id":"35030ed08f348160b426e628e029fcd5"},{"text":"盗聴していたのは、彼の血だったのだ。","author":"斧田 小夜","book":"飲鴆止渇","id":"35030ed08f348184b220d6214d3f4f8b"},{"text":"目の前の事象に、拙速に理解の帳尻りを合わせず、宙ぶらりんの解決できない状況を、不思議だと思う気持を忘れずに、持ちこたえていく力。","author":"帚木 蓬生","book":"ネガティブ・ケイパビリティ 答えの出ない事態に耐える力","id":"35030ed08f34812983f6f15a99dc019c"},{"text":"省庁間の合意を得るには何ヶ月もかかるが、アメリカ合衆国大統領の決断には、ほんの数分しかかからない。","author":"ウィリアムＨマクレイヴン","book":"ネイビーシールズ　特殊作戦に捧げた人生(Japanese Edition)(p.245)","id":"6b830ed08f3482d495e781736108bdc1"},{"text":"真実の結婚は、相手と一体になったという自覚。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348197b479fbd60609b728"},{"text":"真実はつねに最善の応答とは限らない。","author":"ウィリアムＨマクレイヴン","book":"ネイビーシールズ　特殊作戦に捧げた人生(Japanese Edition)(p.367)","id":"03930ed08f348391a93881acf81c9556"},{"text":"真理を求めてはいない。わかりやすい解答を求めて","author":"福井晴敏","book":"機動戦士ガンダムＵＣ９ 虹の彼方に 上","id":"35030ed08f3481318aacc311d7f01615"},{"text":"瞑想とは、あるテーマを絶えず思考しつづけること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481709e40d431fbe92194"},{"text":"知性の本質は、世界（環境）と自分の間に一つの循環を作ること。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f34817ea2e9e0ebc03d9e30"},{"text":"砂糖製のモスク（イスラム教の寺院）がつくられ、祭礼の終わりにはそれを壊して貧民に分け与えた。","author":"川北 稔","book":"砂糖の世界史","id":"35030ed08f3481638dc0f5dc718d8fca"},{"text":"確率の性質（確率の連鎖律とよぶ）を使えば、ある文の出現確率は、これまで出現した単語列から次の単語が出現するであろうと予測した確率を、すべての単語について掛けあわせて求めることができる。","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f3481168d59fe29b6982b7e"},{"text":"祈りをかたちに出してしまうと祈禱師や宗教家と同じになるので、ひたすら胸の内で祈るのみ。","author":"帚木 蓬生","book":"ネガティブ・ケイパビリティ 答えの出ない事態に耐える力","id":"35030ed08f348155ae7bdab422ac130a"},{"text":"神が創造そのものであり、自分が被造物であると思う。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f3481cbae34e2a79bb687c2"},{"text":"神に選ばれにいったモノ","author":"長月達平","book":"戦翼のシグルドリーヴァ Rusalka 上","id":"35030ed08f3481cd8dd1dd99a2834944"},{"text":"神は人間の最も基本的な理念。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34810ca35cc4fea5ea6027"},{"text":"神は文字どおりそこにいる、神の考えは文字どおりこれである、あなたが神と正しい関係を結ぶためにしなければならないことはこうである。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481139d9ac35db9d21354"},{"text":"神を崇めることができるのは神だけ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34819693dcd2f3917d1da7"},{"text":"神性が世界と万物のなかにみなぎっている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348160b8bbfed524c21b1a"},{"text":"神様だか、運命だか知らないけれど。お前の慈悲など乞う言葉は今も、これからも。救われることばかり願っていては、助けてもらえなかったと嘆いて生きることになる。奇跡なんて当てにしていれば、無視されてばかりだと恨んで生きることになる。そんな生き方をしてたまるか。私は──恨んで嘆いて、救いを待って立ち尽くすような生き方なんかしない。世界も神も運命も、恨んでなどやるものか。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"b5530ed08f3483e4a3cc81b99f9c7d74"},{"text":"神様の青い馬","author":"安里アサト","book":"86―エイティシックス Ep.12 ホーリィ・ブルー・ブレット","id":"35030ed08f34817c8252f47f3aadafc2"},{"text":"神話は私たちに、苦しみにどう立ち向かい、どう耐えるか、また苦しみをどのように考えるかを教える。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348163990cf5eb1bcac52f"},{"text":"神話は詩。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481a49d40d6f97ca95825"},{"text":"神話を現代に伝えるのは芸術家。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f348196b2afe822a626554c"},{"text":"神話的にものを考えることは、あなたがこの「涙の谷」において避けられない悲嘆や困苦と、折り合いをつけて生きるのを助けてくれる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348136b6ecd5c3f03b1500"},{"text":"祭りと戦争が同時に行われているようだ。","author":"蒔田陽平、大北はるか","book":"ナイト・ドクター 上","id":"35130ed08f3481069bcbc798409f94d8"},{"text":"私がやるべきことは決まっている。決まっているが、何であるかはわからない。そこで私は、あたかもやるべきことが決まっているかのように行動しようとするわけだ。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f34811dac9ce9e0c20c2518"},{"text":"私が彼らといっしょにいた瞬間は無限性を持っていて、いまもそれが私と共にある。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348108a7b5f902d6f45802"},{"text":"私たちが死なせることを選んだ人々","author":"トニーレドモンド","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"b5b30ed08f3483f1b88981c2d2f1ef18"},{"text":"私たちが死ぬときには病気など何かの原因がある。心臓病や認知症が引き起こす深刻な障害も原因になりうる。逆もまた真なりで、死なないなら原因がないということだ。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481dc8ff5f19333b603c7"},{"text":"私たちが理解しなければならないのは、痛みは傷害がないところにも確かに生じ得るし、過剰な防護は往々にして慢性の持続痛の根本的原因となるということだ。","author":"モンティ・ライマン","book":"痛み、人間のすべてにつながる","id":"35030ed08f3481e68085fb5f92e17264"},{"text":"私たちの人生はひとつの受精卵から始まる。大いなる女家長である受精卵を頂点に、細胞系譜は枝葉を広げ、あらゆる種類の細胞に分かれていく。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f348114a1a4c5e9b8c764c6"},{"text":"私たちは何でもできるが、そのとき、必要ないことを「無視」して、「何もしない」ことを選んでいる。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f348190aec3d34f2411a95f"},{"text":"私たちは理解してもらうことを切望するが、他の人間は私たちがどう感じているのかを理解しそこねることが多い。なぜなら、誰もが自分自身の感情で頭がいっぱいだからだ。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f348181862bca0b8310566d"},{"text":"私たちは痛みのおかげで危険から遠ざかることができるが、持続痛は私たちを生きることから遠ざけてしまう。","author":"モンティ・ライマン","book":"痛み、人間のすべてにつながる","id":"35030ed08f3481779e76fc9ec2fa6a58"},{"text":"私たち医者は、郵便受けから玄関マットに落とされる弁護士の手紙に脅えながら生活している","author":"トニーレドモンド","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"01f30ed08f3482e2a93301d0b8362fd7"},{"text":"私は光を運ぶ電球なのか、それとも、電球を単なる道具として使っている光そのものか。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348106a268f6492eb2bc9e"},{"text":"私は自分の活動と関係のほとんどをオンラインに移行させることで、自分を有機的な世界の制約から解き放ち、人を弱らせる重力や堕落した身体から脱し、デジタル世界の無限の可能性を楽しむことができるようになった、と。そのデジタル世界は生物学の法則からも、物理学の法則からさえも自由になる可能性を持っている。私は、はるかに広大で、より刺激的な空間を自由に動き回り、自分のアイデンティティの新たな面を探ることができる。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481b084b5dab68b966864"},{"text":"秩序が強すぎる光は人を蝕む。","author":"フランク・ハーバート","book":"デューン 砂丘の子供たち 下","id":"35030ed08f34814f8854fe03b525619d"},{"text":"秩序は育てられるものでなければならない。押しつけることはできない。瞬時のコミュニケーションと革命的な政治流動の時代では、ことにそれが欠かせない。世界秩序のいかなるシステムも、持続可能であるには、公正であるとして──指導者ばかりではなく市民にも──受け入れられなければならない。それはふたつの真実を反映していなければならない。","author":"ヘンリー・キッシンジャー","book":"国際秩序 上","id":"35030ed08f34814e828df35ed5a21c8e"},{"text":"空の一番高いところの、初めて会った時から綺麗な色だと思った瞳。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"23130ed08f3483daae4101995e44abfa"},{"text":"突然、殺気が夜を貫いた。","author":"松樹 凛","book":"射手座の香る夏","id":"35130ed08f34812d9131ec9cfe950dc0"},{"text":"笑まない目","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"e2430ed08f348350a12e018dee9a6ff2"},{"text":"第一に、脚本を読むことで、自分がマスターしたい形式がわかってくる。第二に、脚本の構成要素を分解することで、それぞれの要素がどう機能しているかを学ぶことができる。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f34811a9782d7000085df79"},{"text":"第二次世界大戦とその結果の歴史をより幅広く考えると、じつはスターリン主義はこれまで考案されたうちでも指折りの成功を収めた政治制度であることがはっきりする。ただし、「成功」を純粋に秩序と力の観点から定義し、倫理や人間の健全性についての考察をすべて無視すれば、だが。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f3481b48b69e6273ab5121f"},{"text":"純粋に人の命を救う政治／命を最優先する政治","author":"","book":"TOKYO MER","id":"9c330ed08f3482aea26f01911e5c9a77"},{"text":"紗月にはそれが、時の軋む音に聞こえた。","author":"松樹 凛","book":"射手座の香る夏","id":"35130ed08f34814c9c3bf52f68559e24"},{"text":"紙一枚に物語をまとめるときは、それ自体が「作品」だと思って書いてください。","author":"兎野卵","book":"意識低めの創作論","id":"35030ed08f34817cb6ebcc81645d6e96"},{"text":"細胞はリサイクルの名人","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34815586cbdb6166d78606"},{"text":"組み合わされることの多い二つのよく知られた生物学のドラマ、すなわち「私たちｖｓ．彼ら」と「清浄ｖｓ．不浄」というドラマが混じり合ったものだ。歴史上、ほぼすべての人間社会が、この生物学的ドラマの何らかのバージョンを演じてきた。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f34817186bbeffe241d8999"},{"text":"経験が心臓の中心に達して、他人や他の動物に対する慈愛の念が目覚め、自分と相手とがある意味では同じ生命を共有している存在だと自覚する。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481fcad42d99e53a6cbcc"},{"text":"経験や知識や洞察にもとづいて内省し、推論し、結論を導き出す能力。私たちを人間にしたもので、私たちが意思疎通し、創造し、構築し、進歩し、文明を持つことを可能にしたもの。","author":"ジム・クウィック","book":"ＬＩＭＩＴＬＥＳＳ 超加速学習","id":"35030ed08f34814998a3e0710a9827e4"},{"text":"結局、私達には「どんな作品を作るか」なんて選択肢はないのかもしれません。今作れるものを、今作るしか無い。逆に言えば、「とにかく、これは今の自分にしか書けないものなんだ。評価されるかどうかは知らないけど、それだけは確かだ」と思えたなら、それは「最後の作品」にふさわしいでしょう。そういう作品を書けたらきっと、自分が次にどんな作品を生み出すか、未来に向かってワクワクできるはずです。","author":"兎野卵","book":"創作に悩んだ時のための33の質問 スランプ編","id":"35030ed08f34817ab9bcfcc5c2a3a00d"},{"text":"統治者は一方の手に武器を、太いこん棒を、もう一方の手に協力の歌の平和な調べを持つべき。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34812ea036d2d80d7f8152"},{"text":"絶対に必要な条件がありました。やさしい心を持たなければならない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34819ab8e8fc279b8dc507"},{"text":"緊張のなごりをとどめた右手の人差し指がわずかに震えた。","author":"笹原 千波","book":"風になるにはまだ","id":"35130ed08f34819d8c38c97e2e45aec6"},{"text":"縁とは、知り得るものと、決して発見できないものとの接点。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f3481acb9e3d7f3181cb64f"},{"text":"美的体験は対象を批判したり拒絶したりする気を起こさせない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481a0a10af444244d548b"},{"text":"群選択には「不安定な休戦状態」が必要だ","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f348156bd7bfcb04a1a2c1a"},{"text":"羽振りのいい政治家になるためにはどんな代償を支払うべきかという教訓。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481d48edeffaeb74f4ae0"},{"text":"老いた動物は「栄養物の消費者であるから……後継者にとって害になる」","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481479689c9c05e927fd8"},{"text":"老化によるゴミのカタストロフィ","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34815c84e5c7024cf14e01"},{"text":"老化のリプログラミングは種としてのもっとも偊大な業績と","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481a7ad0bd5e48321e3dc"},{"text":"老化の状態を保つのは、生と死という相反する力の絶え間ない争い","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481d5b4cefdd275391329"},{"text":"老化は進化の手抜きだ。老齢で悪い影響を及ぼすが、進化が排除できなかった変異の蓄積、若いころに生殖を最大限成功させるが、その後意図せざる不幸な展開を見せる拮抗的多面発現性、使い捨ての体細胞を維持するより子をもうけることを優先させるメカニズム、これらすべての結果である。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481fd9842d577e423879d"},{"text":"老化細胞に制がん作用があるのは結果論なのかもしれない。もとは生物の成長をうながしていた細胞が、加齢によるがんのリスクも減らせるように進化してきた可能性もある。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34814cb6a3c0b82d6cd76f"},{"text":"老化細胞の自殺を抑制する力を抑制する薬を見つけ、状況を打破して死に向かわせることはできるのか？","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f34815b9834e30e55dcef64"},{"text":"老化細胞は、まわりに悪影響を与える腐ったリンゴ以外の役割も持っているから","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481a8a94af8a87efff9e9"},{"text":"老化細胞は加齢とともに体の組織にゆっくりとたまっていく。その名のとおり歳をとった細胞だ。ＤＮＡがひどく傷つくか、壊滅的レベルの細胞ストレスにさらされ、テロメアが短くなりすぎた細胞は老化し、安全上の理由から急ブレーキをかけて、分裂をやめる。がん化という選択肢よりはましかもしれないが、老化は無害とはほど遠い。細胞は慢性炎症を起こす分子を体じゅうに送りこみ、近くにいる細胞を老化させたり、皮肉なことに、がん化させたりする。ただちに免疫システムによって取り除かなければ、老化細胞はまわりの環境も、体全体の健康状態も悪化させてしまう。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481e58777ed650c4ebab3"},{"text":"老化細胞は炎症性分子を分泌し、警報を出して自分の存在を免疫システムに知らせ、除去してほしいと頼む。すると、老化細胞を探して破壊する任務を負った免疫細胞は、大騒ぎする分子に惹きつけられ、老化細胞を覆いつくして、体の問題を取り除く。このように分子が旗を振って体を守る仕組みをＳＡＳＰ、「細胞老化関連分泌現象」という。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481d4ae52dc0a0a5e7cb1"},{"text":"聖人は、争い合う二派のいずれとも利害関係にない「よそ者」だったゆえに、正しい判断ができるとされた。","author":"池上 俊一","book":"ヨーロッパ史入門 原形から近代への胎動","id":"35030ed08f34813d9e4cd70856760e90"},{"text":"聖書は、口を利けない文書であったにもかかわらず、何十億もの人に重大な影響を与えてきた。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f348121bd57f77940cc22e3"},{"text":"職歴もそれを反映して４０〜５０代まで地位が着実に上がり、そこからはペースダウンする。この時期の長さと性質も最適化されているわけではなく、たんに歴史上の偶然で決まっている。２０世紀前半に、深刻な健康障害が始まる年として「引退年齢」が定着したから","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f3481978b41d47b889c4251"},{"text":"肝心なのは犯罪じゃなくて、それを隠蔽すること","author":"マーク・グリーニー","book":"暗殺者の反撃 下","id":"35030ed08f348114bbafd33b72aa5212"},{"text":"胎児が育つとき、ＥＮＳとＣＮＳは同じ組織から発生し、迷走神経を通じて連絡を取り続ける。","author":"ジム・クウィック","book":"ＬＩＭＩＴＬＥＳＳ 超加速学習","id":"35030ed08f348109b070d3f8841dc2c9"},{"text":"胸を圧迫して、停止した心臓を復活させる心肺蘇生法は、いまやテレビドラマで見飽きるほどだが、これすら発明されていなかった","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f348102b3c2ccf451539d92"},{"text":"脚本というのは、結局、企画案で提示された作品のコンセプトをシーンの形で具体化したもの。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481008c24e2196fddc533"},{"text":"脚本にとって物語とはシーンの位置関係を決めるためのものであり、それが可視化されるのはシーンの関連性を通してだけなのである。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481db9583e8ce0e12aa3d"},{"text":"脚本は一番美味しいところから書き始めて、前後を広げて、尺が満ちたら終わる。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f34813da829fc525d88563a"},{"text":"脚本は左脳側、絵コンテは右脳側。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481bab8f2d39a372f3a84"},{"text":"脚本や小説に織り込む要素の選択は、つねにクライマックスを意識しながらおこなわなければならない。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f3481a6b7b4c257cb704b0f"},{"text":"脚本家を目指す人は最初から〝しっかりした物語を書く〟ことを目指すのではなく、まずは自分の好きなシーンを書き、それを繋いで一本の脚本にすることから始めた方がいい。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481b2b851ed1a5bc3d8d9"},{"text":"自らの歪さを受け入れること。その歪さは世界の産物なのだから、それを補うものもまた世界の中にきっとある。","author":"兎野卵","book":"マイナスのススメ","id":"35030ed08f3481239408feb4389d1fa5"},{"text":"自作品に美しさを感じることが出来なければ、創作活動はつらくなっていきます。","author":"兎野卵","book":"作家が企画を通すための33の質問 リテイク編","id":"35030ed08f34811285d1ff291a850ad3"},{"text":"自分が正しい軌道に乗っているか、そこからはずれているかを知る能力。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481d7874fd83910328426"},{"text":"自分が生き延びられる確率は、六〇パーセントだろうと判断した。とはいえ……世界最高の暗殺者に撃ち殺される確率が四〇パーセントもあるから、ハンリーの気は休まらなかった。","author":"マーク・グリーニー","book":"暗殺者の反撃 上","id":"35030ed08f3481f1a8f7c42d4cc9012f"},{"text":"自分たちの食用となる植物は、犠牲にされた神または先祖の、切り刻まれて埋められた体から生えたものだというモチーフ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348121be91ea13c12c2d76"},{"text":"自分で自分の創作物に興味を持つこと。そして、完成の充実感を味わうこと。","author":"兎野卵","book":"創作に悩んだ時のための33の質問 スランプ編","id":"35030ed08f34813ba380d1063a762d2b"},{"text":"自分とは違うという、あらゆる人間に共通するただ一点を以て誰も彼もを放りこんでしまえる便利なカテゴリに、他人をまとめて放りこんだ上で敵や邪悪や、害毒として括る。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"4ae30ed08f348246a38c01b17f56a150"},{"text":"自分なりのイデオロギー、自分のちっぽけな思考形態に固執していると、神についてのより大きな経験が近づいてきたとき——自分がそれを受けるだけの心備えがないほど大きな経験がやってきたとき——に、自分の心のなかのイメージにしがみつくことによって、それから逃げてしまう。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481d0b30ee77c1e3d0248"},{"text":"自分にしかないものを提示する","author":"冲方丁","book":"生き残る作家、生き残れない作家","id":"35030ed08f348137b971d2159441c9e6"},{"text":"自分にとって好ましい収穫物を増やしたいなら、どんなインプットによってそういう収穫物が増える傾向にあるのか、どんな切り口で収穫すべきか、そもそも自分はどんな収穫物を求めているのか、しっかり把握する必要がある。","author":"兎野卵","book":"偶然が創作を支配する","id":"35030ed08f3481909bfcf01609ab7edb"},{"text":"自分にとって本当に価値のあるものは、他人にとっては逆に無価値。だから、自分が大切にしているものを他人に認めてもらう必要はない。他人には理解できなくて当たり前なのだ。","author":"兎野卵","book":"マイナスのススメ","id":"35030ed08f348111b3e0c13b71451878"},{"text":"自分のためには頑張れない。でも、誰かのためなら頑張れる。","author":"蒔田陽平、大北はるか","book":"ナイト・ドクター 上","id":"35130ed08f3481d89b7ccb560c6f5971"},{"text":"自分のなかにいる神が相手のなかにいる神を認める。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481218a16f348cb96f2ad"},{"text":"自分の人生はひとつしかないんです。ほかの大勢があなたと違うからといって、そっちに合わせる必要はない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34814f981ffb8edc8ebe72"},{"text":"自分の仕事に関する一連の機械的な部分や、細かい決まりきった作業をも、すべてよく理解している","author":"ボブ・トマス","book":"ウォルト・ディズニー 創造と冒険の生涯","id":"35030ed08f34819d99eef8d478b4d41c"},{"text":"自分の円環を宇宙の円環に調和させる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481848001ddaf7f1ae337"},{"text":"自分の命でロシアンルーレットをするならともかく、子どもの命でする権利はない","author":"トニーレドモンド","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"f4f30ed08f3482609a7e81676fe46b79"},{"text":"自分の心の中にある「可能性への喪失感」と向き合ってみると、良いアイデアが見つかるかも","author":"兎野卵","book":"続・創作に悩んだ時のための33の質問 アイデア編","id":"35030ed08f34811da256db2ff8ba14ab"},{"text":"自分の生活のなかに神の言が意味するものを持ち込む人は、みなイエスと並びうる人。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348137b359f0646336dcd3"},{"text":"自分の置かれた時代に人間らしく生きるすべを学ぶこと。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481068348dbe8c54a3a14"},{"text":"自分の趣味にこだわらずに謙虚に作品作りをしたほうが、案外「自分」を再発見出来るかもしれません。","author":"兎野卵","book":"意識低めの創作論","id":"35030ed08f3481ff9abdcf4e1e97e495"},{"text":"自分の道を歩んでいるのであって、パパやママの道を歩いているのではない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481908b20e066ca80d27b"},{"text":"自分や世にとって今最も書くべきものを抽出できる","author":"冲方丁","book":"生き残る作家、生き残れない作家","id":"35030ed08f348184939ef161040dfd56"},{"text":"自分を楽しませることを考えろ、と。特に趣味や創作の分野ではそれが重要だと考えています。なぜかといえば、成功への執着の根底には、往々にして歪んだ承認欲求があるからです。そんな状態で努力を続けても、あまり幸せな結果にはならないでしょう。","author":"兎野卵","book":"楽しさについて考える","id":"35030ed08f3481689c69e9bd7bd166b2"},{"text":"自分自身についての知識を探究するとき、その目標が達成されるのは、自己の燃焼点に達したとき。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348146a46cd82cf22957ca"},{"text":"自我や自己保存を第一に考えるのをやめたとき、私たちは、真に英雄的な意識変革を遂げる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34811a8923f8e3bafaaadc"},{"text":"至福はいまここに。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481dfadccd39ee3525737"},{"text":"至福はいまここにある。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f3481da8757eca012ceef38"},{"text":"興奮状態の体は血流を脳に優先していて、後回しにされて働いていない胃は空腹すら感じない。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"54c30ed08f3483b898bc81f032dd809a"},{"text":"良い政府はけっして法律に頼らない。統治する者の個人的資質に頼る。政治機構はつねに、その機構を牛耳る者らにしたがうものである。政治にとってもっとも重要な要素とは、したがって、指導者を選ぶ方法である。","author":"フランク・ハーバート","book":"デューン 砂丘の子供たち 上","id":"35030ed08f3481cb89cdd730257a3e9e"},{"text":"花粉の道は中心への道。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481ba8db6c96eb40b0605"},{"text":"芸術とは自然に向けて掲げられた鏡。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34812480bfe0d90c4364e6"},{"text":"芸術を一番楽しむことができない人種は、実は美術史学者である。なぜなら彼らは知りすぎているからだ。","author":"","book":"","id":"bd030ed08f3483289cb4010f58c11588"},{"text":"苦しみはたとえどこにあろうとも、緩和されなければならない。","author":"トニーレドモンド","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"30030ed08f3482ec8a1b01ed956410a9"},{"text":"苦境でも笑うこと。悪意を笑い飛ばすこと。そして知らせること。自分たちについて。自分たちは、ただの人間だと。笑うし楽しむし好きな料理もあれば下手な物事もある、どこにでもいるただの人間なのだと。化物なんかじゃない、化物と無闇に恐れ忌み嫌われればそれに傷つき、悲しむ心がある人間なのだと。だから化物扱いして爪弾きにする、お前たちのその行いは過ちなのだと。そう、怒りではなく笑いに交えて──示してやるための。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f3481dab04de3b331be3ff8"},{"text":"英雄で成り立つ軍などあってはならない。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","id":"35030ed08f34810c872bd1a8722992f0"},{"text":"英雄とは、自分自身よりも大きな何物かに自分の命を捧げた人間。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f348188967fccabbfd9c873"},{"text":"英雄は、奪った命の意味を背負わねばならない","author":"虚淵玄","book":"アイゼンフリューゲル","id":"35030ed08f34816a93cddc9faab20d63"},{"text":"英雄は、奪った命の意味を背負わねばならない。","author":"","book":"アイゼンフリューゲル","id":"19030ed08f348386a32e012a1d255f62"},{"text":"虚しさは「期待できる結果とのズレを教えてくれる感情」だ","author":"兎野卵","book":"つまらなさとはなにか？","id":"35030ed08f348110a6dfeac8571c6cfd"},{"text":"虚無を見つめるな。虚無は見返すこともしない。ただ吞み込むだけ","author":"福井晴敏","book":"機動戦士ガンダムＵＣ９ 虹の彼方に 上","id":"35030ed08f34817a9005f9753874f4a8"},{"text":"行く手を阻む迷路が、同時に永遠の生命への道。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f34814182dad6d3e4c03dfa"},{"text":"衣ずれの音がレトの意識に火花を散らした。","author":"フランク・ハーバート","book":"デューン 砂丘の子供たち 下","id":"35030ed08f348125abb0ee7f51d77896"},{"text":"被害者／Victimではなく、勝者／Victorになれ","author":"ウィリアム・H・マクレイヴン","book":"THE HERO CODE (Japanese Edition)","id":"88130ed08f3483e797f081a7e0c8a551"},{"text":"見える次元を支えている見えざる次元が存在している。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f34812cba60ef17641d6109"},{"text":"言葉も、願いも、祈りも、感情も、およそ人が人に向けるものはどれもが呪いだ。進む足を縛る。先行きを捻じ曲げる。選ぶ道を誤らせ、その者の魂の形さえも時に、決定的に変えてしまう。それでもなお受けいれられた呪いを、せめて、愛と呼ぶのだろう。","author":"安里アサト","book":"８６―エイティシックス―Ep.13　─ディア・ハンター─","id":"cf430ed08f3483b4849101087c02d1a6"},{"text":"言語のかなたに本質をかいま見せる働き。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481bbb0f2e854ce168bc1"},{"text":"言語モデルとは「どんな単語の列のあとにどんな単語が現れるのか」という確率を計算するためのモデル。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f3481998a65fb9b544f8fd4"},{"text":"言語モデルは、前の単語列から次の単語を予測できるように学習したモデルである。言語モデルは意味を捨て、確率という構造の中で言語を扱う。意味を捨てたが、次の単語を予測できるように学習すると、文章の中から予測に役立つ情報を扱えるようになる必要にかられ、結果として文を理解できるモデルができる。","author":"岡野原大輔","book":"大規模言語モデルは新たな知能か","id":"35030ed08f3481088a6ad80bf42cbb65"},{"text":"詩は通り抜けられる言語。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f34813daa08cff5eb29ee22"},{"text":"詩人とは、自分の至福に触れることを、職業ともライフスタイルともしている人。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","id":"35130ed08f3481a5b45bed51df6ac03a"},{"text":"語る主体のAIを賢くしていくためには、ユーザーの理解がより必要。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f34818c9b14dcefb41ac18d"},{"text":"説明的ではなくてこれを表現するためにはどういう響きの言葉がいいのかという言葉の面白さ、いわゆる音声劇。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f348153a38ee31ee0cbb973"},{"text":"読者になんらかのメリットをもたらすものでなくてはいけない","author":"兎野卵","book":"作家が企画を通すための33の質問 リテイク編","id":"35030ed08f3481b4952cebdf8523bbc6"},{"text":"読者には、カッコつけるより親切であれ","author":"ジム・バンデハイ; マイク・アレン; ロイ・シュウォーツ","book":"Simple 「簡潔さ」は最強の戦略である","id":"3fa30ed08f348378934581de0e836f7a"},{"text":"読者の心を動かすためには、まず浮かせるのが大事。浮かせて、ガードを解かせて、その上で揺さぶる","author":"兎野卵","book":"「好き」を言語化する フィクション編","id":"35030ed08f3481eb8ff0e613e39d0a92"},{"text":"読者は短い読書体験の中で、ある人間の一生を（あるいはその人生のハイライト部分を）濃密に経験し、追体験したい","author":"兎野卵","book":"続・創作に悩んだ時のための33の質問 アイデア編","id":"35030ed08f3481dfa5dcd59571fd2fd6"},{"text":"誰かの心理状態をネガティブなほうに操ると、脳の中にある〝不安の音量ボタン〟が作動して不安が大きくなることがわかった。痛みの経験とは結局何であるかを考えれば納得できるだろう。それは本質的には自分の身体を危険や脅威から守ることに尽きる。不安や心配があったり、恐怖を感じていたりすると、私たちの脳はこの警報の出力を増幅させようとするわけだ。痛みが火だとすれば、こういった情動はそこに注がれる油ということになる。","author":"モンティ・ライマン","book":"痛み、人間のすべてにつながる","id":"35030ed08f348136b8aefc25b9d0c5e5"},{"text":"誰とも関わらない孤独な者は、後ろ盾がないことから軽んじられる。","author":"鴨 長明","book":"方丈記","id":"35130ed08f3481a1b876dc2f5cbe0e32"},{"text":"誰にでも避けられない失敗や努力不足はあるものだが、芸術家はつねに自分を磨き、観客をさらに喜ばせる努力をしなくてはならない。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f34811d93e5cd9f68cf167b"},{"text":"誰にも、神の歩みを妨げることはできないのだ。","author":"長月達平","book":"戦翼のシグルドリーヴァ Rusalka 下","id":"35030ed08f3481e5bf91c457f830a6eb"},{"text":"誰にもなじみのある政治的環境に、わざとあいまいな形で物語を置く。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f3481209f43fee50342f784"},{"text":"誰の責任か厳密に考えるべきだ、自分の責任と思えないときはそんなことを簡単に言うもんじゃない","author":"鈴木敏夫","book":"仕事道楽　新版スタジオジブリの現場","id":"c8930ed08f34827fba1481a205d5235c"},{"text":"誰もが遅かれ早かれ、シーソーのような権力闘争のどちらにつくかを選択しなければならないものだ。中立でいたくても、実力を発揮したいのなら、それは不可能だ。物語の主人公がいつもそうであるように。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f348179b0acc5ef2381ca07"},{"text":"警戒し続けるのは降りた理由にならない","author":"諜報員の心と体の二律背反。","book":"エージェント・オブ・シールド","id":"e5430ed08f3483059614819c24b32c5a"},{"text":"議会や市庁舎から新聞社やラジオ局まで、これまでにそのような話し合いが行なわれた場所はすべて、規制を必要とした。これは、人間のものとは異質の形態の知能が話し合いを支配する恐れがある時代にあっては、なおさらよく当てはまる。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","id":"35030ed08f3481d696dce563afecffe8"},{"text":"貧困は人々を拘束し、必要最小限の機会を奪う──生きる機会さえも。","author":"トニーレドモンド","book":"野戦のドクター　戦争、災害、感染症と闘いつづけた不屈の医師の全記録(Japanese Edition)","id":"87630ed08f3482a3bcff8146ae2dff8b"},{"text":"資本主義は終末を無限に先送りしていくシステム。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","id":"35130ed08f3481b798c1c8b3f4a3300c"},{"text":"賢明な物語作家は、時間枠をいいかげんに選んだりはしない。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","id":"35130ed08f348126a340e8b1405aecc4"},{"text":"質問が王を癒し、社会を癒す。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f348169b2acfcb562874e74"},{"text":"赤軍とソ連の指導陣は一年目の大苦戦から得た教訓を消化し、モスクワの政治中枢は手綱を緩めた。政治将校の力が制限される一方、職業軍人の将校は以前より大きな責任を引き受け、より自発的に行動するように促された。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 上","id":"35030ed08f348175b932cf0b58981b4d"},{"text":"超自然を、なにか自然を超えて、自然の上にあるようなものと見なすのは荒廃を招く思想。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","id":"35130ed08f3481a9b98afd3cf99d90ba"},{"text":"身体障害の可能性がかなり低いが、老齢になるとそれが急速に高まる。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","id":"35030ed08f348137a9dad1ac65dfadaf"},{"text":"軍事関連や歴史、科学といった知識が脚本家を目指す人にとって武器にもなる。","author":"野崎 透","book":"アニメーションの脚本術","id":"35130ed08f3481339e47f84c2286c2ee"},{"text":"迷い // BudouX 日本語文節パーサ (CDN 読み込み失敗時は null のまま — auto-phrase にフォールバック)
let __budouxParser = null;
try {
  if (typeof loadDefaultJapaneseParser === 'function') {
    __budouxParser = loadDefaultJapaneseParser();
  }
} catch (e) { __budouxParser = null; }

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 文節分割して <wbr> 区切りの HTML を返す。BudouX 不在時はエスケープのみ。
function wrapWithBudoux(text) {
  if (!text) return '';
  if (!__budouxParser) return escapeHtml(text);
  try {
    const phrases = __budouxParser.parse(text);
    return phrases.map(escapeHtml).join('<wbr>');
  } catch (e) {
    return escapeHtml(text);
  }
}

const STORAGE_FAV = 'phrases.favorites.v1';
const STORAGE_HISTORY = 'phrases.history.v1';

const STORAGE_UI = 'phrases.ui.v1';
const HISTORY_AVOID = Math.min(5, QUOTES.length - 1);

// Adaptive interval: base 5s, +0.07s per char above 30, capped at 10s
function intervalFor(quote) {
  const len = (quote && quote.text) ? quote.text.length : 30;
  const ms = 5000 + Math.max(0, len - 30) * 70;
  return Math.min(10000, Math.max(5000, ms));
}

  let t = null;
  if (ls) try { t = ls.getItem(STORAGE_THEME); } catch {}
  // theme-auto-default v1 (Group 9): default dark unless user explicitly selected light
  if (!t) t = 'dark';
  applyTheme(t);
}

function detectCompact() {
  try {
    const url = new URL(window.location.href);
    const param = url.searchParams.get('compact');
    if (param === '1') return true;
    if (param === '0') return false;
  } catch {}
  try {
    if (window.parent !== window) {
      if (window.innerHeight < 600 || window.innerWidth < 600) return true;
    }
  } catch {}
  return false;
}

function detectUIHidden() {
  try {
    const url = new URL(window.location.href);
    const param = url.searchParams.get('ui');
    if (param === '0') return true;
    if (param === '1') return false;
  } catch {}
  if (ls) try { return ls.getItem(STORAGE_UI) === '0'; } catch {}
  return false;
}

function setUIHidden(hidden, persist) {
  if (hidden) document.body.classList.add('ui-hidden');
  else document.body.classList.remove('ui-hidden');
  if (persist && ls) try { ls.setItem(STORAGE_UI, hidden ? '0' : '1'); } catch {}
  // Stage height changed — refit text in next frame.
  if (typeof fitQuoteText === 'function') setTimeout(fitQuoteText, 0);
}

function pickNextIndex() {
  if (QUOTES.length === 1) return 0;
  const recent = new Set(history.slice(-HISTORY_AVOID));
  let pool = QUOTES.map((_, i) => i).filter(i => !recent.has(i) && i !== currentIdx);
  if (pool.length === 0) pool = QUOTES.map((_, i) => i).filter(i => i !== currentIdx);
  return pool[Math.floor(Math.random() * pool.length)];
}

function fitQuoteText() {
  const textEl = document.querySelector('.quote-text');
  const stage = document.getElementById('stage');
  const attributionEl = document.querySelector('.attribution');
  if (!textEl || !stage) return;

  const isCompact = document.body.classList.contains('compact');

  // Group 11: text-length adaptive maxSize (root fix for long-quote overflow)
  // Previously a single maxSize (80/38) caused 200+ char quotes to overflow even after binary search,
  // because textEl.scrollHeight excludes margin-bottom (56px) and text-wrap:balance introduces
  // small layout drift. Tying maxSize to length pre-empts the problem instead of fighting it.
  const textLen = (textEl.textContent || '').length;
  let maxSize;
  if (isCompact) {
    if (textLen <= 30) maxSize = 38;
    else if (textLen <= 80) maxSize = 30;
    else if (textLen <= 150) maxSize = 24;
    else maxSize = 20;
  } else {
    if (textLen <= 30) maxSize = 80;
    else if (textLen <= 80) maxSize = 60;
    else if (textLen <= 150) maxSize = 44;
    else maxSize = 32;
  }
  const floorSize = isCompact ? 14 : 16;
  const targetMin = isCompact ? Math.min(26, maxSize - 4) : Math.min(36, maxSize - 4);

  const cs = getComputedStyle(stage);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const availW = stage.clientWidth - padX;

  // Group 11: include textEl's margin-bottom in reserved space
  // (scrollHeight excludes margin, so without this the 56px below the text overflows the stage)
  const textCS = getComputedStyle(textEl);
  const textMarginBottom = parseFloat(textCS.marginBottom) || 0;

  // Group 9: measure actual attribution height (handles multi-line authors)
  // Group 11: safety margin 32→48 to absorb line-height/text-wrap:balance drift
  let reserved;
  if (attributionEl) {
    const attrRect = attributionEl.getBoundingClientRect();
    if (attrRect.height > 0) {
      reserved = Math.ceil(attrRect.height) + (isCompact ? 24 : 48) + textMarginBottom;
    } else {
      reserved = (isCompact ? 70 : 140) + textMarginBottom;
    }
  } else {
    reserved = (isCompact ? 70 : 140) + textMarginBottom;
  }

  const availH = stage.clientHeight - padY - reserved;
  if (availW <= 0 || availH <= 0) return;

  // Binary search helper using getBoundingClientRect for reliable layout measurement
  // (scrollHeight can desynchronize from actual paint when text-wrap:balance is active)
  const fit = (lo, hi) => {
    let best = null;
    for (let i = 0; i < 20 && hi - lo > 0.4; i++) {
      const mid = (lo + hi) / 2;
      textEl.style.fontSize = mid + 'px';
      const rect = textEl.getBoundingClientRect();
      if (rect.width <= availW && rect.height <= availH) {
        best = mid;
        lo = mid;
      } else {
        hi = mid;
      }
    }
    return best;
  };

  let best = fit(targetMin, maxSize);
  if (best === null) {
    best = fit(floorSize, targetMin);
  }
  if (best === null) best = floorSize;

  textEl.style.fontSize = best + 'px';

  // Group 11: dynamically size progress bar to match text width
  // (short words → narrow bar, long quotes → wide bar; visually anchors bar to content)
  const bar = document.getElementById('progressBar');
  if (bar) {
    const finalRect = textEl.getBoundingClientRect();
    const target = Math.max(180, Math.min(finalRect.width, availW - 40));
    bar.style.width = target + 'px';
  }
}

function renderQuote(idx, withFade) {
  const q = QUOTES[idx];
  const wrap = document.getElementById('quoteWrap');
  const update = () => {
    // Group 9: defensive render — clear placeholder FIRST so "…" never sticks
    // (handles edge cases: bad index, empty text, BudouX exception, etc.)
    const textEl = document.getElementById('quoteText');
    const authorEl = document.getElementById('quoteAuthor');
    const bookEl = document.getElementById('quoteBook');
    const favMark = document.getElementById('favMark');

    try {
      if (!q || typeof q.text !== 'string' || !q.text.trim()) {
        // Bad/empty quote: render unobtrusive fallback instead of "…"
        textEl.textContent = '\u00a0';
        authorEl.textContent = '';
        authorEl.style.display = 'none';
        bookEl.textContent = '';
        favMark.classList.remove('shown');
        fitQuoteText();
        return;
      }
      textEl.innerHTML = wrapWithBudoux(q.text);
      authorEl.textContent = q.author || '';
      authorEl.style.display = q.author ? '' : 'none';
      bookEl.textContent = q.book ? `『${q.book}』` : '';
      // bottom-buttons-removal v1: btnFav class toggle removed (button no longer exists)
      if (favorites.has(q.id)) {
        favMark.classList.add('shown');
      } else {
        favMark.classList.remove('shown');
      }
      fitQuoteText();
    } catch (e) {
      // Last-resort: log and recover with empty render so "…" is never visible
      console.error('renderQuote update failed:', e, q);
      textEl.textContent = '\u00a0';
      authorEl.textContent = '';
      authorEl.style.display = 'none';
      bookEl.textContent = '';
      favMark.classList.remove('shown');
    }
  };
  if (withFade) {
    wrap.classList.add('fading');
    setTimeout(() => {
      update();
      requestAnimationFrame(() => wrap.classList.remove('fading'));
    }, 380);
  } else {
    update();
  }
}

function nextQuote() {
  const idx = pickNextIndex();
  history.push(idx);
  saveHistory();
  currentIdx = idx;
  renderQuote(idx, true);
  scheduleAuto();
}

function scheduleAuto() {
  clearAutoTimer();
  if (!autoEnabled || currentIdx < 0) return;
  const fadeBuffer = 380; // wait for fade-in to complete before counting
  const reading = intervalFor(QUOTES[currentIdx]);
  const total = fadeBuffer + reading;
  // Group 10: start bar AFTER fade-in (so rise-up phase is visible on the NEW card, not lost during fade)
  __barStartTimer = setTimeout(() => {
    if (autoEnabled && currentIdx >= 0 && !document.hidden) {
      startProgressBar(reading);
    }
  }, fadeBuffer);
  autoTimer = setTimeout(() => {
    if (!autoEnabled) return;
    if (document.hidden) return; // safety
    nextQuote();
  }, total);
}

function clearAutoTimer() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  stopProgressBar();
}

// Group 10: WAAPI-based bar control (replaces CSS class toggle, fixes WebView2 reset failures)
let __barAnim = null;
let __barStartTimer = null;

function startProgressBar(durationMs) {
  const bar = document.getElementById('progressBar');
  if (!bar) return;
  // Cancel any in-flight animation deterministically (CSS class remove/add was unreliable)
  if (__barAnim) {
    try { __barAnim.cancel(); } catch {}
    __barAnim = null;
  }
  // WAAPI keyframes mirror the old CSS @keyframes barLifecycle
  __barAnim = bar.animate([
    { transform: 'scaleX(0)',    opacity: 0,    offset: 0 },
    { transform: 'scaleX(0)',    opacity: 0,    offset: 0.03 },
    { transform: 'scaleX(1)',    opacity: 0.65, offset: 0.09 },
    { transform: 'scaleX(1)',    opacity: 0.65, offset: 0.15 },
    { transform: 'scaleX(0.18)', opacity: 0.65, offset: 0.82, easing: 'cubic-bezier(0.55, 0, 0.7, 0.2)' },
    { transform: 'scaleX(0)',    opacity: 0,    offset: 1 }
  ], {
    duration: durationMs,
    easing: 'linear',
    fill: 'forwards'
  });
}

function stopProgressBar() {
  const bar = document.getElementById('progressBar');
  if (!bar) return;
  if (__barAnim) {
    try { __barAnim.cancel(); } catch {}
    __barAnim = null;
  }
  if (__barStartTimer) {
    clearTimeout(__barStartTimer);
    __barStartTimer = null;
  }
  // Reset to initial state
  bar.style.transform = 'scaleX(0)';
  bar.style.opacity = '0';
}

function setAutoEnabled(on, persist) {
  autoEnabled = !!on;
  const btn = document.getElementById('autoToggle');
  if (autoEnabled) btn.classList.add('active');
  else btn.classList.remove('active');
  btn.setAttribute('aria-pressed', autoEnabled ? 'true' : 'false');
  if (persist && ls) try { ls.setItem(STORAGE_AUTO, autoEnabled ? '1' : '0'); } catch {}
  if (autoEnabled) scheduleAuto();
  else clearAutoTimer();
}

let toastTimeout = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('shown');
  if (toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('shown'), 1800);
}

document.getElementById('themeToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
});

document.getElementById('autoToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  setAutoEnabled(!autoEnabled, true);
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearAutoTimer();
  else if (autoEnabled) scheduleAuto();
});

// bottom-buttons-removal v1: btnNext/btnFav/btnCopy click handlers removed
// (buttons no longer exist in DOM; favorites/copy still accessible via stage tap and keyboard)

// Stage tap = next (gaze-friendly bonus area)
document.getElementById('stage').addEventListener('click', (e) => {
  if (e.target.closest('.btn')) return;
  if (e.target.closest('.theme-toggle')) return;
  nextQuote();
});

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'Enter') { e.preventDefault(); nextQuote(); }
  // bottom-buttons-removal v1: f/F (favorite) and c/C (copy) shortcuts removed
  else if (e.key === 't' || e.key === 'T') { document.getElementById('themeToggle').click(); }
  else if (e.key === 'u' || e.key === 'U') { setUIHidden(!document.body.classList.contains('ui-hidden'), true); }
});

function initAutoFromQuery() {
  let url;
  try { url = new URL(window.location.href); } catch { return null; }
  const p = url.searchParams.get('auto');
  if (p === null) return null;
  if (p === '0') return false;
  return true; // any other value = enabled (1, 5, true, etc.)
}

if (detectCompact()) document.body.classList.add('compact');
if (detectUIHidden()) document.body.classList.add('ui-hidden');
loadState();
loadTheme();
nextQuote();

let __resizeTimer = null;
window.addEventListener('resize', () => {
  if (__resizeTimer) clearTimeout(__resizeTimer);
  __resizeTimer = setTimeout(fitQuoteText, 120);
});

// Auto: URL param > saved state > default ON (Group 9: enables progress bar by default)
const queryAuto = initAutoFromQuery();
let initialAuto = true;  // default ON (was: false)
if (queryAuto !== null) {
  initialAuto = queryAuto;
} else if (ls) {
  try {
    const saved = ls.getItem(STORAGE_AUTO);
    if (saved === '1') initialAuto = true;
    else if (saved === '0') initialAuto = false;
    // saved === null: keep default true (fresh deploy / first run)
  } catch {}
}
if (initialAuto) setAutoEnabled(true, false);

document.getElementById('uiHideToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  setUIHidden(false, true);
});
</script>
</body>
</html>
