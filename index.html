ら、世界に誇る正義たらん。","author":"安里アサト","book":"86―エイティシックス Ep.14 ペイント・イット・ブラック","note":"","id":"35030ed08f3481fabb60f23835345eae"},{"text":"アウトプットや決定は、微細なシグナルの、不透明でとんでもなく錯綜した連鎖に基づいている","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","note":"","id":"35030ed08f3481fabc6dc38804dea389"},{"text":"一方で、「良くも悪くも予想外なことが起きてくれた方が有り難い」という姿勢を持っている人は、成功する可能性が高い。なぜなら、予想外なことは必ず起きるからだ。予想外なことが起これば起こるほど得をするので、イレギュラーを恐れる必要がない。むしろ歓迎する。結果として積極的にリスクを取るようになり、その行動がまた偶然の恩恵をもたらしてくれる。","author":"兎野卵","book":"偶然が創作を支配する","note":"","id":"35030ed08f3481fb8e6de3a2ca96c881"},{"text":"ヴリトラはインドラをつかまえて口の中にのみこんでしまいました。するとインドラはヴリトラにあくびをさせて外に飛び出しました。それ以来、呼吸するものはあくびをするようになったといい","author":"沖田瑞穂","book":"世界の神話","note":"","id":"35030ed08f3481fba592e43e410d33e5"},{"text":"人々がもうこの世界を理解することができず、消化し切れない厖大な情報に圧倒されているように感じるときには、陰謀論の恰好の餌食になり、自分に理解できるもの、すなわち人間に救いを求める。","author":"ユヴァル・ノア・ハラリ","book":"NEXUS 情報の人類史 下","note":"","id":"35030ed08f3481fbbf7cd65b8a8f5570"},{"text":"常日頃から、これは貴族に求められる代償だと考えている。統治を行なうには、自分の権力を代行してふるう者たちについて、正確かつ的確に判断しておくことが肝要だ。配下のミスや暴走で失脚した統治者は、けっしてひとりではない。","author":"フランク・ハーバート","book":"デューン 砂丘の子供たち 下","note":"","id":"35030ed08f3481fd9363cad10ad4f4f3"},{"text":"老化は進化の手抜きだ。老齢で悪い影響を及ぼすが、進化が排除できなかった変異の蓄積、若いころに生殖を最大限成功させるが、その後意図せざる不幸な展開を見せる拮抗的多面発現性、使い捨ての体細胞を維持するより子をもうけることを優先させるメカニズム、これらすべての結果である。","author":"アンドリュー・スティール","book":"AGELESS 「老いない」科学の最前線","note":"","id":"35030ed08f3481fd9842d577e423879d"},{"text":"一度白鍵に触れた指先は、草原に放たれた鹿のように鍵盤を駆け回る。","author":"桐山なると","book":"超かぐや姫！","note":"","id":"35030ed08f3481fea8c8d5727b95b36f"},{"text":"自分の趣味にこだわらずに謙虚に作品作りをしたほうが、案外「自分」を再発見出来るかもしれません。","author":"兎野卵","book":"意識低めの創作論","note":"","id":"35030ed08f3481ff9abdcf4e1e97e495"},{"text":"まずは自分が何に感動したのか、メモしてみてください。その後、メモを分析し、自分が感動したポイントをより詳しく分析し直します。","author":"兎野卵","book":"創作はメモから始まる","note":"","id":"35030ed08f3481ffaaf1c64b4bab4c9f"},{"text":"脚本というのは、結局、企画案で提示された作品のコンセプトをシーンの形で具体化したもの。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481008c24e2196fddc533"},{"text":"心理学の立場から言えば、指導者とは、なにを成し遂げられるかを見抜いて、それを実行した人間。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348100b1d3f7c002dd08c3"},{"text":"すべての世代は、次の世代の到来を可能にするために死なねばならない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34810199b0d754277074e5"},{"text":"深くシミュレートできるのは、文字という表現手段がほどよく物事を抽象化してくれるから。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481028948f20b511ea8a1"},{"text":"ショーペンハウエルの答えはこうです。このような心理的危機は、ある形而上学的な認識——すなわち、私と他者とは一体である、私と他者とはひとつの生命の二つの外見であって、別々に見えるのは、空間と時間の条件下でしか形を経験できないという知能の限界の反映に過ぎない、という認識——が飛び出してきた結果なのです。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348102adcfdca5c4b06ca1"},{"text":"受難（passion）を、共に苦しむこと（compassion）へと変容させた瞬間。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348102bfa7fb02e6f5ee00"},{"text":"永遠を知りつつ、しかもみずから進んで時間のかけらである現世に身を置き、積極的に、喜びをもって、この世の悲しみに参与する者。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348103bd2fc8e14fbbfa7b"},{"text":"思いやり（compassion）とは、元来「共に苦しむ」ということ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34810495ecddab7f6c3c77"},{"text":"今日、この地球上に、もはやアウト・グループというものはありません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34810498d6d9774d7a0840"},{"text":"他人が重要だと言ってるから興味を向けるなんて、賢明なこととは思えません。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348104bf30d1f89231f140"},{"text":"あらゆるものが他のあらゆるものとの相互関係を結んで成り立っているから、どんなことがあっても他人のせいだといって非難することはできない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481059d35ebc9693b29b6"},{"text":"自分の置かれた時代に人間らしく生きるすべを学ぶこと。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481068348dbe8c54a3a14"},{"text":"祭りと戦争が同時に行われているようだ。","author":"蒔田陽平、大北はるか","book":"ナイト・ドクター 上","note":"","id":"35130ed08f3481069bcbc798409f94d8"},{"text":"私は光を運ぶ電球なのか、それとも、電球を単なる道具として使っている光そのものか。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348106a268f6492eb2bc9e"},{"text":"ユーザーにとってベストな物語を分岐させていく、世界そのものを変えていく方法。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f348108a76df5f2ec329dd1"},{"text":"私が彼らといっしょにいた瞬間は無限性を持っていて、いまもそれが私と共にある。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348108a7b5f902d6f45802"},{"text":"ひとつの状態を去り、より豊かな、より成熟した状態に達するために生命の源泉を探す。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34810a9e2dd5fb20efb1ce"},{"text":"売れているものを読もう。もしこの世界で金と名声を得たいのなら、客がどんなものを買うのかはよく知っておくべき。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f34810ab965e538fd24b6da"},{"text":"心臓が体内にないものだから、魔法使いは死なない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34810b9662f2eb5c8e6a63"},{"text":"神は人間の最も基本的な理念。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34810ca35cc4fea5ea6027"},{"text":"みんなでカバーし合っていると言えば聞こえはいいかもしれませんが、実際は一人一人が責任を負っていない。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34810d82c5c1eb09d4eb1b"},{"text":"決め台詞には状況をリセットできるという利点もあるが、それを使うことによってマイナスの印象を与えてしまう。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34810eba88fa45cc525451"},{"text":"教師は灯台みたいなもの。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348112a2b1c1d6ae85f9e4"},{"text":"宗教は、神の経験に対する防衛。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34811398a4e7e28d29bbf6"},{"text":"神は文字どおりそこにいる、神の考えは文字どおりこれである、あなたが神と正しい関係を結ぶためにしなければならないことはこうである。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481139d9ac35db9d21354"},{"text":"モノローグで語らせると観客はそれを真実だと思って観てしまう。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348113a49bedcdecc48535"},{"text":"人はパンだけで生きるものではなく、神の口から出るひとつひとつの言葉で生きる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481148d49c5d514d3e86f"},{"text":"ヘビは水のように流れるから水のように冷たいけれども、その舌は絶えず炎を吐いている。だから、ヘビのなかには一組の対立物が共存する。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348114a9b7c20c28a6b07c"},{"text":"メディアとして長い年月を経ないと、帰り道がつくれない。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f348115af53d0612d9bdbbd"},{"text":"他人が俗塵の中を走り回っていることが気の毒。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f348115b8c8c3d127c54f69"},{"text":"基本的な狩猟神話は、動物世界と人間世界との契約。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348116b637e13638404384"},{"text":"普段から状況を思い浮かべながら書く訓練をしている脚本とそうでない脚本とでは、実際に映像となった時に大きな違いが出てくる。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348117a92fe648d0e38462"},{"text":"自我や自己保存を第一に考えるのをやめたとき、私たちは、真に英雄的な意識変革を遂げる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34811a8923f8e3bafaaadc"},{"text":"第一に、脚本を読むことで、自分がマスターしたい形式がわかってくる。第二に、脚本の構成要素を分解することで、それぞれの要素がどう機能しているかを学ぶことができる。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f34811a9782d7000085df79"},{"text":"不滅性を肉体の不老長寿だと誤解すると、こっけいなものになってしまう。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34811a9cc8c9b0ee240d01"},{"text":"どんなことがあろうと、ほんとうにやりたいことをやり続ける根性がもしあるなら、がんばってやってみたまえ。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34811b9e68d66153b25dbd"},{"text":"死ぬべき運命と、あなたのなかにある死を超越したものとの関係——それを理解するのは容易なことではありません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34811cb4dfc2ad3905ba0f"},{"text":"誰にでも避けられない失敗や努力不足はあるものだが、芸術家はつねに自分を磨き、観客をさらに喜ばせる努力をしなくてはならない。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f34811d93e5cd9f68cf167b"},{"text":"私がやるべきことは決まっている。決まっているが、何であるかはわからない。そこで私は、あたかもやるべきことが決まっているかのように行動しようとするわけだ。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34811dac9ce9e0c20c2518"},{"text":"感傷は暴力のエコーにすぎない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34811e89e1f757c08e4366"},{"text":"さまざまな機会を逃しては、つくづくと自分には運がないのだと、自然に知るようになった。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f34811e93bdf0933741af60"},{"text":"基本的な狩猟神話は、動物世界と人間世界との契約。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481208918d9b8b8a02da2"},{"text":"誰にもなじみのある政治的環境に、わざとあいまいな形で物語を置く。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481209f43fee50342f784"},{"text":"非常に不思議なことですね。まず電撃的なことが起き、そのあと苦悩が来る。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348120b321c5c29ed44788"},{"text":"人間の知っていることなんてたかが知れたもので、想像ではそれ以上のものはできない。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481218622cd4c71d64f0a"},{"text":"自分のなかにいる神が相手のなかにいる神を認める。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481218a16f348cb96f2ad"},{"text":"自分たちの食用となる植物は、犠牲にされた神または先祖の、切り刻まれて埋められた体から生えたものだというモチーフ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348121be91ea13c12c2d76"},{"text":"われわれの人生は、たったひとりの人間が見ているひとつの巨大な夢のさまざまな様相のようなもの。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481228f0ce7ca30df5b7b"},{"text":"愛は神の訪れであり、それゆえに結婚よりも崇高なもの。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481238e1df0a952ce69ee"},{"text":"芸術とは自然に向けて掲げられた鏡。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812480bfe0d90c4364e6"},{"text":"サンタクロースはただ、子供たちが人間関係を大事にするきっかけを与えるための手段に過ぎません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812496ffc174d77c34b9"},{"text":"書きかけの作品があれば、最初のページを見なおしてみよ。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481259e3ef9efca6abc8e"},{"text":"性別を決める。その人物が男であるか女であるかについてはきちんとした理由がないとダメ。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348125bf96cc971683965e"},{"text":"賢明な物語作家は、時間枠をいいかげんに選んだりはしない。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f348126a340e8b1405aecc4"},{"text":"物語は、われわれが人生と世界に与えるプロット。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481288ea3caff38cbf17d"},{"text":"人は物語を読んだり映画や芝居を観たりしながら、そこで何が起きているのか、次に何が起きるのかを推測しようとしている。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f348128b678d4b42f740ebe"},{"text":"家の主の命は、はかないもの。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f34812a8867d6c57f229305"},{"text":"問題については実に膨大な情報があるのですが、これから先は情報がなくなるという時点がある。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812aabade714a58857b6"},{"text":"不滅性とは、いまのあなたのなかにある永遠的なものとの同一性の自覚。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812baa54cdfd9a8317e0"},{"text":"見える次元を支えている見えざる次元が存在している。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812cba60ef17641d6109"},{"text":"宇宙の女神である時空の子宮から世界の主が到来すること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812cbdcbe5bca72392c9"},{"text":"突然、殺気が夜を貫いた。","author":"松樹 凛","book":"射手座の香る夏","note":"","id":"35130ed08f34812d9131ec9cfe950dc0"},{"text":"人間は死を避け、生きるために考えるから、人間の思考には時間性や物語性が備わり、そこから規範的な次元が出来してくる。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34812e8cc1fd8b008cbeb7"},{"text":"現在のものから過去を推測することは可能ですが、危険なやり方。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812e9120e0f86503e86d"},{"text":"統治者は一方の手に武器を、太いこん棒を、もう一方の手に協力の歌の平和な調べを持つべき。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34812ea036d2d80d7f8152"},{"text":"人間のすることは、みんな愚か。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f34812ebabff152e837d7c4"},{"text":"人の一生もその人の内なる意志によって作られる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348130b5fce67e92ca33b7"},{"text":"心理学の立場から言えば、指導者とは、なにを成し遂げられるかを見抜いて、それを実行した人間。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481319734c087a81eaf50"},{"text":"この社会でどう生きるべきかを、社会が私に指図するなんてことを許してはなりません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348132b3dbf019517a15ff"},{"text":"軍事関連や歴史、科学といった知識が脚本家を目指す人にとって武器にもなる。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481339e47f84c2286c2ee"},{"text":"内容が面白くなかったらテーマがどんなによく書けていても意味がない。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348133a02be75e7b04176d"},{"text":"おまえたちは、おまえたちに先立つ者らと同じ試練をくぐり抜けることなしに、至福の園へ入れると思っている。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481348173d26f069ee8f8"},{"text":"人々のかまどから煙が立つのが少ない。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481348d21f10dce55d098"},{"text":"人間が言語ゲームに参加できるのは、私たちが社会に縛られている存在だから。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f348134b88ed4c6e9dccb1c"},{"text":"とにかく企画書を書く、あるいは考える時に何よりも重要なのは、自分が映像作品として何を表現したいかというところを相手に伝わるように書くこと。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348136881def34071db298"},{"text":"神話的にものを考えることは、あなたがこの「涙の谷」において避けられない悲嘆や困苦と、折り合いをつけて生きるのを助けてくれる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348136b6ecd5c3f03b1500"},{"text":"政治における主要な情念は貪欲。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348136ba55f1154e9adeb4"},{"text":"化学反応をおこしているのは、自分の内面のいろんな記憶や経験であって、物語そのものではない。その調合の仕方を物語が与えている。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481379314d24402aff7e4"},{"text":"自分の生活のなかに神の言が意味するものを持ち込む人は、みなイエスと並びうる人。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348137b359f0646336dcd3"},{"text":"すべての生はうたかたの夢のようなものであり、マーヤ、つまり幻影。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348138acb3f70905f472d8"},{"text":"犬が人を噛んでもどうってことはないが、人が犬を噛んだら、これは事件。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34813989a2f1f5d452c4c0"},{"text":"敵の目のなかにあるおが屑を取るのではなく、自分自身の目のなかにある丸太を取り除くこと。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348139aad4d59b92ec3cbc"},{"text":"世間の人たちが住まいを作るのは、必ずしも必要に迫られるからとは限らない。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f34813a8f83f038f45a0e16"},{"text":"喜びに取りついていよう。そうしたらそれが私の意識と存在をも運んできてくれるだろう。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34813ab6b4ccccffb67302"},{"text":"人と人工知能の信頼関係はむしろ協調行動から逆に形成される。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34813b8371fd9e3555b4e8"},{"text":"世間の常識に従えば、苦しくなる。従わなければ、まともではないと思われてしまう。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f34813b9917f9a15be534da"},{"text":"都市という知性体は、人を包み、必要な情報を読み取り、そして行動を行う。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34813ca9f1c795f45c18d7"},{"text":"つかのまのもの、やがて消えゆくものはみなメタファーの役割を果たしている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34813d935bc3097a04cfcc"},{"text":"脚本は一番美味しいところから書き始めて、前後を広げて、尺が満ちたら終わる。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34813da829fc525d88563a"},{"text":"詩は通り抜けられる言語。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34813daa08cff5eb29ee22"},{"text":"行く手を阻む迷路が、同時に永遠の生命への道。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34814182dad6d3e4c03dfa"},{"text":"ライターが宗教をあいまいにすることが多いからこそ、内省や探索、発見の余地がたくさんある。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f348141b888c35176775fb0"},{"text":"まず「内容」から書きなさい、内容を面白くすることが一番大切で、内容を面白く書いたら、そこで〝自分はどうしてこれを書いたんだろう〟という「企画意図」を考える。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348141bb1af5e59cfad670"},{"text":"とにかく会話がどの方向に向かっているのか分からないのはダイアローグではない。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34814391c8f29485962009"},{"text":"天国は永遠ではない。それはただ常在しているにすぎない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34814394eee5862f45e26c"},{"text":"天国には問題があります。あなたは天国で非常に楽しい時を過ごすので、そこでは永遠のことなど考えもしない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481448c23efdcb87c40db"},{"text":"あらゆる生命体（incarnation）は、ある潜在能力を持っており、生の使命はその潜在能力を生きること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481448ecfd1527ce37f3c"},{"text":"ショーペンハウエルの答えはこうです。このような心理的危機は、ある形而上学的な認識──すなわち、私と他者とは一体である、私と他者とはひとつの生命の二つの外見であって、別々に見えるのは、空間と時間の条件下でしか形を経験できないという知能の限界の反映に過ぎない、という認識──が飛び出してきた結果なのだ。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348144ac43e8bd834cf2df"},{"text":"優秀なコーチはランナーに腕の位置は正確にはああだとかこうだとか、そんなことは言いません。ランナーが走るのを注意深く見ていて、そのランナーが自分のもとのやり方を修正するのを手伝う。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481459bc7e18b019e038b"},{"text":"本当の家族っていうのは、苦しみを分け合う人たちのことだ。幸せじゃなくて、苦しさで繫がる。","author":"松樹 凛","book":"射手座の香る夏","note":"","id":"35130ed08f348145abeec41049c2819b"},{"text":"自分自身についての知識を探究するとき、その目標が達成されるのは、自己の燃焼点に達したとき。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348146a46cd82cf22957ca"},{"text":"個人はまったくの個人でなく、ひとつの植物の枝である。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481479863fb22e0b4c917"},{"text":"勝利の連続、つねに過去を上まわるパフォーマンスが、偉大な実績を生む。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f348147a256f5ee9de1c04c"},{"text":"特にアニメーションの場合は想像で物を描いてしまっている気がします。そこにあるのは、空想でも面白いものを作れる、自分の中から空想で引っ張り出してきたものの方が面白いという発想なのですが、実は、そんなことあるわけないじゃないですか。限界があるでしょう。その限界の外側にこそ膨大な世界が拡がっている。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481489b84d5b0212bcb2e"},{"text":"人は風景それ自体のなかに、そこにある生命エネルギーの象徴を見いだすべき。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348149a0a7fafc03223d0f"},{"text":"テレビの人物を、映画館というような特別の神殿ではなく、自宅で見ているから。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34814a831bc078cd1145ac"},{"text":"その台詞に向かって全部作る。シリーズとはそういうもので、行間は後で埋めていけばいい。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34814ab036d9b56104af5a"},{"text":"逆にそのことを認めて、もっと色々調べて視野を拡げたら自分の発想ももっと豊かになるし、作品ももっと楽しくなる。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34814ba161dc6ddc8be8a0"},{"text":"人間は、〈何もしないでいられる〉がゆえに、さまざまなことができるのだ。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34814ba536e4592f2d9cd9"},{"text":"AI研究の技術と言っていたものを、全部他の分野にあげていく。そして、自分たちは中空構造を保ち、その穴の中からいろんなものが湧きだしていく。あれやこれやをつくっては捨て、つくっては捨て、とやっていく。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34814bae19d4d6db7d5d9a"},{"text":"情欲がえさで、死が釣り針。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34814c8684d3d9864e0e62"},{"text":"紗月にはそれが、時の軋む音に聞こえた。","author":"松樹 凛","book":"射手座の香る夏","note":"","id":"35130ed08f34814c9c3bf52f68559e24"},{"text":"あなたが直面しているのと同じ問題を扱っていると思われる書物。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34814f8181fb7a431b25c3"},{"text":"自分の人生はひとつしかないんです。ほかの大勢があなたと違うからといって、そっちに合わせる必要はない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34814f981ffb8edc8ebe72"},{"text":"人工知能が社会で活躍する以上、ますます「社会的裏付け」が必要となる。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34814fb6bcc2c0e91bf7c4"},{"text":"動くと裾がとろりと揺れる。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f3481509996c0768484b71e"},{"text":"物語に自然に入って、現実に自然に帰ってこられるように、小説では、行きも帰りも親切に用意されている。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f348150a6d8e90e61091421"},{"text":"ダイアローグとダイアローグの間を埋めるのは演出家の仕事で、だから脚本家はその仕事を奪うな、演出家に余計なイメージを植え付けるな。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481518fb3ea8a3a9b9dfe"},{"text":"テーマはその後、自分がそこまで書いたものから気付いていけばいい。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348151a72ac131d1c835b1"},{"text":"なにかはっきりとした自覚に人を導くような性格が向こうにあれば、人はそれについていける。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815387e0e9910a619a74"},{"text":"必要なのは世界に生命をもたらすこと、そのためのただひとつの道は、自分自身にとっての生命のありかを見つけ、自分がいきいきと生きること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481539f99d9659888bc29"},{"text":"説明的ではなくてこれを表現するためにはどういう響きの言葉がいいのかという言葉の面白さ、いわゆる音声劇。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348153a38ee31ee0cbb973"},{"text":"ラジオドラマを頭の中で展開させるみたいな感覚で見直す。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34815488a5e2aec4ffa198"},{"text":"ひとつひとつの生物体（form）がそれ独自の意図を持ち、独自の可能性を持っている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348154bacfe31707cb5e0b"},{"text":"地元民は、口に砂が詰まる危険を冒してまで、おしゃべりになりたくはない。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481579fded72317028e59"},{"text":"それは、はるか遠い過去から届けられた、星々の甘い残香だった。","author":"松樹 凛","book":"射手座の香る夏","note":"","id":"35130ed08f348158880cd8b265184cdb"},{"text":"冒険こそ冒険の報酬。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481589bcdf1202c5b0d5a"},{"text":"暗闇のなかへ降りて行く。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481599346e2f27f0c952e"},{"text":"もし、するべきことがあれば、自分の身を使えばそれでよい。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f348159bfebd35e3e5d6b71"},{"text":"狩猟民は農耕民にはとてもまねができないほど個人主義的。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815a8cabd23c485dda71"},{"text":"大器晩成型の人は、あるところまで来るのが他人に比べて遅い。自分がどのあたりにいるのかは、自分で感じるしかない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815b89a8f6daa51d7997"},{"text":"せせらぎや川を流れる輝かしい水は、ただの水ではなく、われわれの祖先の血。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815c943de6489921796f"},{"text":"人が自分の無上の喜びに従ってどんな人生を選ぶとしても、それには、だれから脅されようがこの道から絶対に外れないという覚悟が必要。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815d84c5c8e7a5958e61"},{"text":"テレビの人物を、映画館というような特別の神殿ではなく、自宅で見ているから。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815dba72c3e61f9c310e"},{"text":"ある行動を遂行する際に、関係がある（レリバントな）事項を無関係な（イレリバントな）事項から、十分に効率的に区別し選択することは、いかにして可能か。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34815e8311ca4c9309b249"},{"text":"他人のなかに自己の生命があることの認識。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815ea010c5c8c6307da4"},{"text":"命令ではなく、助言を与える。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34815eae4ae4dbde4be197"},{"text":"「無視すること」を積極的・能動的にやってしまえば、それはもはや、純粋な、ほんものの〈無視〉ではない。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34815f8eddfc5e0e7ecfe6"},{"text":"神性が世界と万物のなかにみなぎっている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348160b8bbfed524c21b1a"},{"text":"途中でなんとなくフェードアウトするキャラクターなんか出してはいけない。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34816185c6c8a6fa18d00a"},{"text":"深い話が、いつかAIによって科学的に否定されてしまうのではないか。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481638c23ed8b99104c3f"},{"text":"台詞も、物語の流れや登場人物の感情を分かりやすく観客に伝えるためのものではなく、技術者が実際に使っているような台詞——それは従来〝分かりづらい〟ということで排除されていたものだった——で表現しなければならない。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34816390e6ce1ca8a08654"},{"text":"神話は私たちに、苦しみにどう立ち向かい、どう耐えるか、また苦しみをどのように考えるかを教える。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348163990cf5eb1bcac52f"},{"text":"永遠は時間を超越している。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481648b85f19eef0e046e"},{"text":"モノローグの中でもどこまで本心で語っているのかというところは、本当は大事なのではないかなと思う。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34816593f1c2be7f091fc3"},{"text":"時間の断片を通して原初の存在の完全な力を見る。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348166a784f84e3bacc294"},{"text":"アウムは人を宇宙という共鳴体に接触させる手段としての象徴的な音。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348166b7bcd2bba0a93ed7"},{"text":"時間が存在すれば、苦しみが存在する。過去がなければ未来はない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481679915cf3098f4728d"},{"text":"ほんとうの意味で生きていることから来る痛み。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348169984cf3f60ecae75c"},{"text":"問題については実に膨大な情報があるのですが、これから先は情報がなくなるという時点がある。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481699e7ed301e31b580e"},{"text":"質問が王を癒し、社会を癒す。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348169b2acfcb562874e74"},{"text":"天国には問題があります。あなたは天国で非常に楽しい時を過ごすので、そこでは永遠のことなど考えもしない。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34816ab1a8fa05c6c35083"},{"text":"あなたがそれを知ったとき、あなたは創造の原理と一体になる。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34816b8d5fc735d11762d2"},{"text":"愛はたくさんの機能のうちのひとつです。本来なら全体の秩序に奉仕すべきひとつの機能がシステム全体を支配すると、物事は狂ってくる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34816b9c16ca30dcd82a08"},{"text":"滅びに通じる門は広いが、命に通じる門はなんと狭く、その道も細いことか。それを見いだす者は少ない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34816d8e21d09e735cab19"},{"text":"プロットの概略を一歩一歩示すのではなく、あらゆるすばらしいもののイメージを送り届けるもの。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f34816d9d33f99b7cebcdfd"},{"text":"わたしは肉体があったころよりよほど体に配慮した暮らしをしている。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f34816db1c6fcc431901bab"},{"text":"無上の喜びがどこにあるかを直感する。それをつかまえることです。その先がどうなるかは、だれにもわからない。自分のことは自分で見極めるよう努力する。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34816e8ee5d8c7e0d86dd5"},{"text":"あると思っているから、「無視」して、なきものとすることができるのであって、最初から本当にないと思っていたら、「無視」することはできません。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34816ea866dc1cd2fd85c4"},{"text":"人生において心臓のレベルにまで達した人。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34816f8d7bc52e3a40f4f3"},{"text":"他人を使って苦労を負わせることは罪業にほかならない。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481708579eaf60aa73c0c"},{"text":"もし人生の途中でなにが案内標識の役をしているか、それがわからなければ、自分でそれを作り上げるしかありません。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481709af8e535e5e22e76"},{"text":"瞑想とは、あるテーマを絶えず思考しつづけること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481709e40d431fbe92194"},{"text":"喜びに取りついていよう。そうしたらそれが私の意識と存在をも運んできてくれるだろう。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348170a376d49138649033"},{"text":"人生の課題は、あなたをほんとうに支えている社会が割り当ててくれた分野のなかで生きること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481739a52e743ce66f781"},{"text":"人は自分のなかの有限な相と不滅の相とを区別しなければなりません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348174926bf553b8330582"},{"text":"最善のものは思考を超えているから語ることはできません。次善のものは誤解される。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348174a6bec505c0dd2d49"},{"text":"ジョイスが万物の「輝き（radiance）」と呼んだものを事物の真の姿の顕現として認識し、それを表現することを学んだ人。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348175a4a6e91c947018a6"},{"text":"他人が重要だと言ってるから興味を向けるなんて、賢明なこととは思えません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481769fe6eeffcfacc82e"},{"text":"最善のものは思考を超えているから語ることはできません。次善のものは誤解される。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34817993c6f3a4f32f43f6"},{"text":"生きているうちにできるだけの幸福を経験するべきだ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481799fded335559fd6c4"},{"text":"誰もが遅かれ早かれ、シーソーのような権力闘争のどちらにつくかを選択しなければならないものだ。中立でいたくても、実力を発揮したいのなら、それは不可能だ。物語の主人公がいつもそうであるように。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f348179b0acc5ef2381ca07"},{"text":"植物状態は脳死とは違う。大脳が損傷しているせいで意識はないけれど、小脳や脳幹はちゃんと生きて、動いている。だったら、他のところから意識を持ってくればいい。たとえそれが、別の人間のものであっても。","author":"松樹 凛","book":"射手座の香る夏","note":"","id":"35130ed08f34817a8912fa413323247a"},{"text":"あらゆる時間と空間を通して、神の現存と、生きとし生けるものすべての苦しみへの神の参与。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34817a8e8ad4408742f75c"},{"text":"驚きや畏敬の念から、人間を神に結びつけるような物語を語ろうとする。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34817b9bebd6d86dc8f0c1"},{"text":"仮の宿であるこの世で、儚い住居について、いったい、だれのために、あれこれと心を悩ませるのか。なんの因果で、目を楽しませようというのか。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f34817bbffde504220998d1"},{"text":"旅に出て、目的地がどんどん遠のいていくのを経験すると、ほんとうの目的は旅そのものであったことに気付く。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34817db60ff7d521a8bb92"},{"text":"知性の本質は、世界（環境）と自分の間に一つの循環を作ること。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34817ea2e9e0ebc03d9e30"},{"text":"ショーマンシップは、見かけ倒しの素材を誇大広告で売り込むということではない。真の興行師は、良質の作品、壮大なスペクタクル、緊張感に満ちたドラマ、爆笑コメディ、あるいは世間が求めるような特別な才能など、価値のあるものをきちんと提示している。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f34817f96c9d7ce09fa0881"},{"text":"よく伏線がきちんと回収されなければならないというようなことも言われますが、そんなのどうでもいいんです。それこそ、散らばるだけ散らばらせて全く回収できなくても、面白ければいいわけで。あの伏線どうなったのかなんて、観客が観た後で自分で想像するのが面白いんじゃないかな。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34817fa3f8ce0c736b2e18"},{"text":"最後はみな墓場だからといって、人生が空しいとは言えません。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34817fab07e9554cf4225b"},{"text":"俺たちがどんなに努力して技術を磨こうが、医療だけじゃ救えない命もあるってこと。","author":"蒔田陽平、大北はるか","book":"ナイト・ドクター 上","note":"","id":"35130ed08f34818287d1d9972d2439c0"},{"text":"あなたの敵はあなたの運命が操る手段。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348182a585d5288b8e83bc"},{"text":"サンタクロースはただ、子供たちが人間関係を大事にするきっかけを与えるための手段に過ぎません。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348182ae45f17ce961c703"},{"text":"自分の円環を宇宙の円環に調和させる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481848001ddaf7f1ae337"},{"text":"物語は、われわれが人生と世界に与えるプロット。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34818480a8d4e3e1d6b213"},{"text":"シーンを脚本として表現する際に、ただ戦闘が行われるその場だけでなく、関連する状況や世界を可能な限り広く念頭に置いて考えている。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f348184965ad19bcf5d0002"},{"text":"もし人生の途中でなにが案内標識の役をしているか、それがわからなければ、自分でそれを作り上げるしかありません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348184b77ff05e70fbcb3e"},{"text":"愛は社会秩序とは無関係。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481858360cda1e010a750"},{"text":"どんなことがあろうと、ほんとうにやりたいことをやり続ける根性がもしあるなら、がんばってやってみたまえ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348185b9c3f0ed0eca6511"},{"text":"無上の喜びがどこにあるかを直感する。それをつかまえることです。その先がどうなるかは、だれにもわからない。自分のことは自分で見極めるよう努力する。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348187b479fe9f192ea36c"},{"text":"英雄とは、自分自身よりも大きな何物かに自分の命を捧げた人間。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348188967fccabbfd9c873"},{"text":"教師は、どんな場合にもまずきちんと話をして、それから多少の大まかな手がかりを与えるべき。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34818c8c69e514982d5e48"},{"text":"語る主体のAIを賢くしていくためには、ユーザーの理解がより必要。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34818c9b14dcefb41ac18d"},{"text":"見える次元を支えている見えざる次元が存在している。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34818cb506d9c1dcd82c2f"},{"text":"それは来ては去り、来ては去る。私たちもまた、来ては去る。すべての生命が、来ては去る。その源が、すべてのものをエネルギーで満たすエネルギー。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34818d8c71d396881f6fa1"},{"text":"彼女は頰と唇に笑みのかたちをとらせた。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f34818e94b7f3b90db30892"},{"text":"あなたがそれを知ったとき、あなたは創造の原理と一体になる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34818f9333f36b7b2a6a68"},{"text":"どうやって飛べばいいかわかるまで枝にじっとしていて、それから枝を離れると見事に飛ぶ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34818f9ab7f60c78555c84"},{"text":"手という下僕、足という乗り物は、我が心の思うように動いてくれる。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f34818f9c57db43e81a34ee"},{"text":"自分の道を歩んでいるのであって、パパやママの道を歩いているのではない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481908b20e066ca80d27b"},{"text":"私たちは何でもできるが、そのとき、必要ないことを「無視」して、「何もしない」ことを選んでいる。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f348190aec3d34f2411a95f"},{"text":"人を頼りにすれば、その人の言いなりになってしまう。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f348191a11aee50d2e35325"},{"text":"意識転送技術の大前提だ。早い話が、意識は転送できてもコピーはできない。脳内のナノマシンによってスキャンされた神経活動データが統一性を獲得した――つまり、ひとつのクローン意識として再構成された――時点で、オリジナルは消失する。同一の意識が同時に存在することは不可能だからだ。オルタナへと意識を転送すれば、肉体の側は意識のない完全な欠落体になる。","author":"松樹 凛","book":"射手座の香る夏","note":"","id":"35130ed08f348192a3fff9a2b7f39198"},{"text":"犬が人を噛んでもどうってことはないが、人が犬を噛んだら、これは事件。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348193808de1ebc5e433d4"},{"text":"イエスが仮に光の速度で昇っていったとしても、まだ銀河系のどこかにおられるはず。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819389a9d48f147a9a96"},{"text":"帝国主義的な人々の特徴は、自分らの神を全宇宙の支配者と見なしたがること。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819398b6e04f43fad788"},{"text":"受難（passion）を、共に苦しむこと（compassion）へと変容させた瞬間。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348194b883dda47de3d75e"},{"text":"神を崇めることができるのは神だけ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819693dcd2f3917d1da7"},{"text":"あの窓明かり一つひとつにいろんな事情を抱えた人たちがいて、彼らにとっては重症も軽症もない。","author":"蒔田陽平、大北はるか","book":"ナイト・ドクター 上","note":"","id":"35130ed08f348196ab0acd1e7eae16fd"},{"text":"神話を現代に伝えるのは芸術家。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348196b2afe822a626554c"},{"text":"真実の結婚は、相手と一体になったという自覚。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348197b479fbd60609b728"},{"text":"現在のものから過去を推測することは可能ですが、危険なやり方。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348198991eebbd57127111"},{"text":"マヤ族のインディオは一種のバスケットボールみたいな競技をしたんですが、試合の最後に、勝ったほうのチームのキャプテンが、負けたほうのチームのキャプテンによってその場でいけにえにされたのです。首を切られてしまう。生命の勝利の勢いに乗ってみずからを捧げるというのが、古代社会のいけにえの考え方の本質。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f348198bfe4d1d5e8ba7379"},{"text":"行く手を阻む迷路が、同時に永遠の生命への道。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481998137ff2e041d671c"},{"text":"言語モデルとは「どんな単語の列のあとにどんな単語が現れるのか」という確率を計算するためのモデル。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481998a65fb9b544f8fd4"},{"text":"おまえたちは、おまえたちに先立つ者らと同じ試練をくぐり抜けることなしに、至福の園へ入れると思っているのか。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481999a71efaa23d1eb70"},{"text":"どうせ盗むのなら、最高のものを盗むに越したことはないから。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481999d45e85e12fb7e5e"},{"text":"十三という数字は十二という限界範囲から脱出して超越界に入ることを示す数字。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819ab143f1d5a7d2d632"},{"text":"絶対に必要な条件がありました。やさしい心を持たなければならない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819ab8e8fc279b8dc507"},{"text":"日付が物語の支柱となり、時間のサイクルの基盤となる。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f34819ba7fbde127c8c5d50"},{"text":"あらゆる観念を超えたあなたの心は、あなた自身の存在の基盤との合一によって消滅している。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819bb79bcd3645fec849"},{"text":"AIは何者なのかという論点と、私たちはAIを何者として遇したいのかという論点は別である。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f34819c845afc1ca67ce243"},{"text":"甘く落ち葉の香りがした。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f34819ca838e6129bf4a5d7"},{"text":"緊張のなごりをとどめた右手の人差し指がわずかに震えた。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f34819d8c38c97e2e45aec6"},{"text":"それは来ては去り、来ては去る。私たちもまた、来ては去る。すべての生命が、来ては去る。その源が、すべてのものをエネルギーで満たすエネルギー。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819d96cef8cc770f7860"},{"text":"人間って空想で作っているように見えていても、実際は現実にあるモチーフの選び合いをしている。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34819dad3de3c6cae1434c"},{"text":"とてもいい方法を教えましょう。部屋に座って本を読む──ひたすら読む。然るべき人たちが書いたまともな本ですよ。すると知性がその本と同じ高さまで運ばれ、あなたはそのあいだずっと、穏やかな、静かに燃える喜びを感じ続けるでしょう。こういう生命の自覚は、あなたの日常生活のなかで常に持てるはずです。あなたをほんとうにとらえて離さない作者を見つけたら、その人の全著作をお読みなさい。「だれだれがなにをしたか知りたい」などと考えずに。ベストセラーのリストなんかも、気にすることはありません。これと決めたひとりの作者があなたに与えてくれるものを読む。次には、その作者が読んだ本を読んでいくのもいい。こうするうちに、あるひとつの観点から見た世界像が見えてくるのです。ところが、いまこの作者を読んだかと思えば次はあの作者、という具合に移り気な読み方をしたら、だれがいつこれこれの詩を書いたなんてことには詳しくなるかもしれないが、どの作者もあなたになにひとつ語ってはくれません。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819f8607e7fbf885d880"},{"text":"最後はみな墓場だからといって、人生が空しいとは言えません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f34819fb844ee3f848d1e6d"},{"text":"アニメーションの脚本が作品の正面に立っていない、ある意味二次的なところに下がってしまっている。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f34819fb8b6d22c15086670"},{"text":"美的体験は対象を批判したり拒絶したりする気を起こさせない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a0a10af444244d548b"},{"text":"なにをするにも、どうするか、どううまくやってのけるかについてのルールの体系が必要。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a1a0f1cd0dcd4cc335"},{"text":"もしある人がどこで行き詰まっているかさえわかれば、その人に合った神話を見つけて手引きとすることができる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a1b7a4c173cc9e6e8b"},{"text":"誰とも関わらない孤独な者は、後ろ盾がないことから軽んじられる。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481a1b876dc2f5cbe0e32"},{"text":"とにかくキャラクターを出せば出すほど映像はどんどん散漫になる。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481a38bf1dc060c3848c5"},{"text":"人間を神と和解させることのできる唯一のものは、犯した罪の重大さに匹敵するだけの犠牲しかない。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a3b9eada4fafc1e2dc"},{"text":"マヤ族のインディオは一種のバスケットボールみたいな競技をしたんですが、試合の最後に、勝ったほうのチームのキャプテンが、負けたほうのチームのキャプテンによってその場でいけにえにされたのです。首を切られてしまう。生命の勝利の勢いに乗ってみずからを捧げるというのが、古代社会のいけにえの考え方の本質。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a484cdfe01fb79db74"},{"text":"神話は詩。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a49d40d6f97ca95825"},{"text":"自分のなかにいる神が相手のなかにいる神を認める。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a58467f4e27e09b531"},{"text":"この世にいるうちに、私の世界を持たせてください——そのために地獄に落ちようと、救われようと。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a59164ebd6a86d5fd9"},{"text":"詩人とは、自分の至福に触れることを、職業ともライフスタイルともしている人。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a5b45bed51df6ac03a"},{"text":"脚本や小説に織り込む要素の選択は、つねにクライマックスを意識しながらおこなわなければならない。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481a6b7b4c257cb704b0f"},{"text":"超自然を、なにか自然を超えて、自然の上にあるようなものと見なすのは荒廃を招く思想。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481a9b98afd3cf99d90ba"},{"text":"狩猟民は農耕民にはとてもまねができないほど個人主義的。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481aa8b64edb5184eb0ba"},{"text":"時間が存在すれば、苦しみが存在する。過去がなければ未来はない。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481aa92cacaf46606a590"},{"text":"さり、さり、と紙が切れていく。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f3481abacb1ef5784756b96"},{"text":"自我や自己保存を第一に考えるのをやめたとき、私たちは、真に英雄的な意識変革を遂げる。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481abbca3d88ceb1fa494"},{"text":"縁とは、知り得るものと、決して発見できないものとの接点。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481acb9e3d7f3181cb64f"},{"text":"生きているうちにできるだけの幸福を経験するべきだ。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481afabe5e4b226f414b6"},{"text":"世の中には、自分はなにをすべきか、どんな態度をとるべきか、どんな価値のために生きているのかといったことを考えるとき、自分の心の声を聞くのをやめてしまったり、まわりの連中の意見ばかり聞く人が多すぎる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481b1ab85d03f81943963"},{"text":"風光明媚な地は、個人の所有物ではないので、いくらでも楽しむことができる。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481b29d04d3dac9e2896e"},{"text":"どこの神であろうと、地獄を発明するような神は救世軍に入る資格などありません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481b2b475c823949846b6"},{"text":"脚本家を目指す人は最初から〝しっかりした物語を書く〟ことを目指すのではなく、まずは自分の好きなシーンを書き、それを繋いで一本の脚本にすることから始めた方がいい。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481b2b851ed1a5bc3d8d9"},{"text":"だから言葉にはしない。ただ祈るように、わたしはメッセージを送り出す。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f3481b2bc27cbe58fcbe4fb"},{"text":"信頼が必要なのではなく、協調した行動が実現していることこそが力を持ちます。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481b48960f3adbd59fde2"},{"text":"不安と願望の中間、善と悪との中間にある精神的な小道。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481b589b5d3ed04f7efa9"},{"text":"詩人とは、自分の至福に触れることを、職業ともライフスタイルともしている人。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481b59e9ecd78bf99de0f"},{"text":"医者にも治せない病いであり、傷つけた武器そのものによってしか癒すことのできない傷。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481b5ac82e5925f7f8f87"},{"text":"かつて得た色の名残を生きているわたしと違って、これから色を得てゆくべき人だ。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f3481b68239cc5e3495a5be"},{"text":"最初は自分のことだけを考えていた主人公が、より大きな責任を背負い、時には自分を犠牲にしても、社会に必要なもっと重要なものに尽くすようになる。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481b68c64cfeb9ceb6046"},{"text":"どの状況でも、誰かが権力を持ち、誰かが対処を求めている。それが政治の力学の本質。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481b78fd3c8ffe7c34a11"},{"text":"資本主義は終末を無限に先送りしていくシステム。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481b798c1c8b3f4a3300c"},{"text":"〝いつ〟という疑問を持つことが、独自性を生みだす微妙な陰影を提供してくれる。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481b7ac93ecc653c43f33"},{"text":"ありがとう、というたった五文字は、読んだそばから塵になって風に紛れる。思わず手を伸ばす。指先も一緒にほどけてしまいそうだった。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f3481b8a86fd6622139d460"},{"text":"愛は生の燃え上りです。そして、人生のすべては悲しみに満ちており、愛もまたしかり。愛が強ければ強いほど、苦痛も増していく。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481b98d47fe659ba26338"},{"text":"花粉の道は中心への道。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481ba8db6c96eb40b0605"},{"text":"脚本は左脳側、絵コンテは右脳側。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481bab8f2d39a372f3a84"},{"text":"ヘビは水のように流れるから水のように冷たいけれども、その舌は絶えず炎を吐いている。だから、ヘビのなかには一組の対立物が共存する。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481bb9a29c25c04f1b97f"},{"text":"協調ができている、ということそのものが、人が人工知能に対して信頼する感情を生む。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481bbaaeae2a960627551"},{"text":"言語のかなたに本質をかいま見せる働き。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481bbb0f2e854ce168bc1"},{"text":"円の時間的な相は、あなたが出かけてどこかへ行ったとしても必ず戻ってくる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481bc97e5dcd0d081e197"},{"text":"人は風景それ自体のなかに、そこにある生命エネルギーの象徴を見いだすべき。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481bcb0b9f5a762c7e74f"},{"text":"アニメーションは三本以上引っ張れ。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481bdb33cf1563683d440"},{"text":"母親は子供の本性（nature）を産む。そして父親はいわば子供の社会性を、社会的な役割を産む。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481be9f48df63110121ed"},{"text":"個人はまったくの個人でなく、ひとつの植物の枝である。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481bea3a8eb1c3b7f4a3e"},{"text":"政治における主要な情念は貪欲。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481bf99d8f0fc249e869e"},{"text":"まず任意の〝日付〟と〝場所〟を選ぶ。そこに〝求めるもの〟を持つキャラクターを追加する。そのあと、その〝日付〟と〝場所〟における社会、宗教、政治、経済の環境を使い、主人公が直面しなければならない障害を構築してみよう。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481bf9b59c563880cb43c"},{"text":"すでに見てきた土地なので、追いかけられながらの帰りの旅は、短縮版でも可能。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481c0be8bc11175754d20"},{"text":"平和な人間関係に近づくことです。それが聖杯の本質的な意味。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481c38bfdd1b990ea343d"},{"text":"それぞれ異なる個性のキャラクターを複数配置することによって視聴者の選択肢を増やすというのも目的の一つとなっている。つまり、大概のファンはどれか一人を〝推し〟にするだろうという〝目論見〟である。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481c3a49ad29d1a14c6a0"},{"text":"とてもいい方法を教えましょう。部屋に座って本を読む——ひたすら読む。然るべき人たちが書いたまともな本ですよ。すると知性がその本と同じ高さまで運ばれ、あなたはそのあいだずっと、穏やかな、静かに燃える喜びを感じ続けるでしょう。こういう生命の自覚は、あなたの日常生活のなかで常に持てるはずです。あなたをほんとうにとらえて離さない作者を見つけたら、その人の全著作をお読みなさい。「だれだれがなにをしたか知りたい」などと考えずに。ベストセラーのリストなんかも、気にすることはありません。これと決めたひとりの作者があなたに与えてくれるものを読む。次には、その作者が読んだ本を読んでいくのもいい。こうするうちに、あるひとつの観点から見た世界像が見えてくるのです。ところが、いまこの作者を読んだかと思えば次はあの作者、という具合に移り気な読み方をしたら、だれがいつこれこれの詩を書いたなんてことには詳しくなるかもしれないが、どの作者もあなたになにひとつ語ってはくれません。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481c3b12df9c1425d301a"},{"text":"姿格好だけは聖人だが、心は濁りに染まっている。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481c49455fba01a0782a2"},{"text":"あらゆる時間と空間を通して、神の現存と、生きとし生けるものすべての苦しみへの神の参与。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481c580c6d26e83bd27e4"},{"text":"迷いの多い心のために狂っているのか。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481c58faad97238f75208"},{"text":"私は光を運ぶ電球なのか、それとも、電球を単なる道具として使っている光そのものか。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481c7bb8be9f0e1ff75a7"},{"text":"構造論にはまってしまうと、我々の住んでいる現実とは違う人工的な世界を見ることが目的化してしまう。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481c7bccbdc51d7855b44"},{"text":"神性が世界と万物のなかにみなぎっている。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481c8b7ccf8616ca70c63"},{"text":"ものを考えているだけに見えても、その背景には、過去を参照したり、記憶を引っ張り出したりして、ものを考え、それに基づいて行動し、その結果に責任を持つ、という一連の物語を持った時間が流れている。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481c990bdef194cde9a84"},{"text":"人間は、いろいろなことを知っているが、そのほとんどを常に〈無視〉している。それゆえに、知的でありうる。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481cb93f8f1519421c789"},{"text":"自分たちの食用となる植物は、犠牲にされた神または先祖の、切り刻まれて埋められた体から生えたものだというモチーフ。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481cba240ebe11af088fe"},{"text":"神が創造そのものであり、自分が被造物であると思う。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481cbae34e2a79bb687c2"},{"text":"権勢のある者は欲深くて、心が満たされるということがない。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481cc9245fd786057c0bb"},{"text":"せせらぎや川を流れる輝かしい水は、ただの水ではなく、われわれの祖先の血。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481cda769e8ae5db952aa"},{"text":"すべての生はうたかたの夢のようなものであり、マーヤ、つまり幻影。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481cdaafcf7942561847a"},{"text":"ただし、神話のことも、人間のことも、よくわかっている芸術家。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481cf9151f835f1eebca1"},{"text":"統治者は一方の手に武器を、太いこん棒を、もう一方の手に協力の歌の平和な調べを持つべき。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481cfa184f362424fab8c"},{"text":"人間を神と和解させることのできる唯一のものは、犯した罪の重大さに匹敵するだけの犠牲しかない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d08b30cb4d12e58320"},{"text":"超自然を、なにか自然を超えて、自然の上にあるようなものと見なすのは荒廃を招く思想。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d09095c2a9869b4d20"},{"text":"映画脚本家は、環境的な手がかりを脚本に埋め込み、一緒に映画を創る芸術家の仲間たちに与えることで、自分が最初にイメージした作品の三次元的な世界へと導く。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481d0a485e802b6cd0e63"},{"text":"イエスが仮に光の速度で昇っていったとしても、まだ銀河系のどこかにおられるはず。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d0a713ffcc7a440bd6"},{"text":"自分なりのイデオロギー、自分のちっぽけな思考形態に固執していると、神についてのより大きな経験が近づいてきたとき——自分がそれを受けるだけの心備えがないほど大きな経験がやってきたとき——に、自分の心のなかのイメージにしがみつくことによって、それから逃げてしまう。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d0b30ee77c1e3d0248"},{"text":"フレーム問題を解決するには、潜在的にはできるのに「何もしない」ことを選択できるAIをつくらなければなりません。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481d294b0d7fa43b2c8de"},{"text":"羽振りのいい政治家になるためにはどんな代償を支払うべきかという教訓。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d48edeffaeb74f4ae0"},{"text":"物語のモチーフは色んなところに用意されていて、そういった予めあるものを持ってきて一つの流れにはめ込むということを繰り返している。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481d49852fbac1e30d6b8"},{"text":"家族が家を去り、物語の不安なエネルギーを誘発する。","author":"クリストファー・ボグラー＆デイビッド・マッケナ","book":"面白い物語の法則 下","note":"","id":"35130ed08f3481d5b2dde7d8eb17f7f4"},{"text":"シャンパンゴールドのアイシャドウ、ビューラーとマスカラで重力を振り切った睫毛が涼やかな目元にアクセントをつける。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f3481d6a72dea7b4bf2eaf4"},{"text":"人間は、自分をどう扱ったらいいのかわからない動物。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d6b031f1b9ca3ea190"},{"text":"自分が正しい軌道に乗っているか、そこからはずれているかを知る能力。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d7874fd83910328426"},{"text":"ある人間が他の多くの人のお手本になったとき、その人は神話化の過程に入っている。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481d794f4f41d1e445a4f"},{"text":"自分のためには頑張れない。でも、誰かのためなら頑張れる。","author":"蒔田陽平、大北はるか","book":"ナイト・ドクター 上","note":"","id":"35130ed08f3481d89b7ccb560c6f5971"},{"text":"至福はいまここにある。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481da8757eca012ceef38"},{"text":"救いの手にはなれるが、決して救い主にはなれない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481db83d9f42679beaa8a"},{"text":"脚本にとって物語とはシーンの位置関係を決めるためのものであり、それが可視化されるのはシーンの関連性を通してだけなのである。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481db9583e8ce0e12aa3d"},{"text":"ゲームは文学から「帰し方」で学ぶことがたくさんある。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481dcbac0f92717d1fbdd"},{"text":"あなた自身が至福なのだ。無上の喜びを追求するとは、こういうこと。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481dd8e3adc8499d094f9"},{"text":"文学は読む人の記憶の素材からイメージを構築させるから、その人固有の物語イメージとなって、読む人を物語に深く誘い込む。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481ddb69fdc91ed6e4655"},{"text":"英雄とは、自分自身よりも大きな何物かに自分の命を捧げた人間。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481df9152f43ddfbf601b"},{"text":"至福はいまここに。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481dfadccd39ee3525737"},{"text":"新しい行動の創造こそ、知的な行動。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481e08f1af98fd99545d9"},{"text":"前からいた人たちがみんな死んでしまい、世の中自体が移り変わって行くとき、そのときはじめて、マーヤの神話があなたの心に入ってくる。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e09f77ca03d4530796"},{"text":"シーン割りとダイアローグだけを書くのが理想の脚本家。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481e0be2cfd1942ba4ea0"},{"text":"よい教師も、若い人をよく見て、その可能性がどこにあるかをつかむ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e188f6cd5275c0afb8"},{"text":"冷たい宇宙から人間を守るのは都市であり、そこには、一分の隙も許さない管理体制が必要。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481e1ae01cc3c626ee4ac"},{"text":"食べ物が消化され新たなエネルギーが創り出される暗い場所。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e3a2fdd6744b4610b5"},{"text":"今この病院を任されてるのは俺たちだ。何が普通かは俺が決める。","author":"蒔田陽平、大北はるか","book":"ナイト・ドクター 上","note":"","id":"35130ed08f3481e3b4cdf6c556bc21ef"},{"text":"永遠とは、いついつまでも存在するというようなものではない。それはまさに、いま、ここにある。この地上であなたが他者と関わり合う、その経験のなかにある。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e59146d11d58f45a14"},{"text":"大きなアリ塚で暮らしているから、「俺、何でも知ってるぜ」と思うかもしれないけど、別に一人でつくったわけではないし、一人で維持できるわけでもない。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481e59991f34a7f3c9b0a"},{"text":"ネットワークにつながった、ネットの向こう側につながっているシステムまで含めた信頼が必要となります。スマートシティ、およびメタバースなど、そういった背景となるシステムは人工知能に一定の信頼と背景を与えるようになります。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481e683d0c6849ef8e8b7"},{"text":"あなた自身が至福なのだ。無上の喜びを追求するとは、こういうこと。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e782bef53f3fb4b5a2"},{"text":"すでに完成された自分を脱ぎ捨てて行かなければならない。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e78a96d1403ad9fc13"},{"text":"天与の賜物を受け取った人々は、英雄のメッセージを自分流に解釈して、かなりグロテスクなことをやっている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e78f40d7e9d0fbe007"},{"text":"神が創造そのものであり、自分が被造物であると思う。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e8b956c424a57c23da"},{"text":"すべての世代は、次の世代の到来を可能にするために死なねばならない。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481e9a531ef5a15515f19"},{"text":"人は愛を実践したあとで、そのことを学ぶ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481ea884bd4300ccb188d"},{"text":"ピラミッドは四つの稜線を持っています。これは磁石の四方向です。ある方向にだれかがいる、別の方向にもだれかがいる。またこの方向にもだれかがいる。このピラミッドの低いレベルにいるかぎり、あなたはこっち側にいるかあっち側にいるかのどちらかですが、頂上まで登れば、四つの面も稜線も一点に会し、そこに神の目が開く。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481eaa0fde7a64f933819"},{"text":"愛は目と目を通して心に入る。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481ecb127cd210fed3963"},{"text":"ある人間が他の多くの人のお手本になったとき、その人は神話化の過程に入っている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481edafb9ff658b7dda90"},{"text":"朝、死ぬ人がいるかと思うと、夕方、生まれる人がいる。","author":"鴨 長明","book":"方丈記","note":"","id":"35130ed08f3481f19cb3c90d4d5ca1b9"},{"text":"縁とは、知り得るものと、決して発見できないものとの接点。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481f1bb76c9983133f52a"},{"text":"演出家が何を根拠に演出するかを分かった上で脚本を書くか、それとも文学として書くか。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481f3a888f53a91d3b0bf"},{"text":"前からいた人たちがみんな死んでしまい、世の中自体が移り変わって行くとき、そのときはじめて、マーヤの神話があなたの心に入ってくる。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481f5a7bce29ea066c982"},{"text":"AIの解剖は人類の解剖のためのひとつの鍵。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481f69ef4db06491d86f7"},{"text":"神話を現代に伝えるのは芸術家。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481f78b68f43517279c0a"},{"text":"きみ自身がきみの創造主なのだ。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481f7a265e7973ec87a3e"},{"text":"ロジックの上での信頼と現実世界での信頼はまた別のレイヤーにある。","author":"大澤 真幸、川添 愛、三宅 陽一郎、山本 貴光、吉川 浩満","book":"私たちはAIを信頼できるか","note":"","id":"35130ed08f3481f7a55ef73755d03dae"},{"text":"あなたは実際いろんなルールを忘れていい。なぜなら、それらはもうあなたの身についているのだから。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481f9bd9be2cf582512da"},{"text":"恐ろしい龍には、そのうろこの一枚一枚に、「なんじ……すべし」が刻まれている。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481fb935dc1ecd7105a6d"},{"text":"滅びに通じる門は広いが、命に通じる門はなんと狭く、その道も細いことか。それを見いだす者は少ない。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481fb988beb96c89d5374"},{"text":"経験が心臓の中心に達して、他人や他の動物に対する慈愛の念が目覚め、自分と相手とがある意味では同じ生命を共有している存在だと自覚する。","author":"ジョーゼフ キャンベル＆ビル モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481fcad42d99e53a6cbcc"},{"text":"消えていくんなら消えていく理由が必要で、そういうところを無視して書くと単なるお祭り騒ぎになってしまって、観終わっても何も残りません。","author":"野崎 透","book":"アニメーションの脚本術","note":"","id":"35130ed08f3481fd843ad3b78ade815b"},{"text":"芸術とは自然に向けて掲げられた鏡。","author":"ジョーゼフ・キャンベル＆ビル・モイヤーズ","book":"神話の力","note":"","id":"35130ed08f3481fdb557f4713c932e15"},{"text":"生きた肉体の感覚が早くも恋しいのに、戻ってくると奇妙に安らぐ。","author":"笹原 千波","book":"風になるにはまだ","note":"","id":"35130ed08f3481ffa7e7ceec726aef72"},{"text":"遺漏なく／いろうなく","author":"","book":"","note":"抜かりなく。漏れなく。","id":"35530ed08f3481009812dce33cca7337"},{"text":"specimen","author":"","book":"","note":"見本。標本。","id":"35530ed08f3481009a4bff635930d661"},{"text":"打擲／ちょうちゃく","author":"","book":"","note":"打ちたたくこと。なぐること。","id":"35530ed08f34810185c2dc3383533360"},{"text":"ファッジ／キャラメルファッジ","author":"","book":"","note":"バター、砂糖、牛乳で作る。タフィーやキャラメルより低温(115℃)で作るため滑らかで柔らかい食感。","id":"35530ed08f34810192b4e1877a9b95c4"},{"text":"マーフィーベッド／Murphy Bed","author":"","book":"","note":"主に北アメリカで使用される言葉で、壁に収納するタイプのベッド。収納ベッド。アパートメントタイプ等にみられる。使用していない際、部屋を広く使える利点がある。「wall bed (ウォールベッド)」「pull-down bed」などとも呼ばれる。","id":"35530ed08f34810290efd5280bffbaf3"},{"text":"bathing","author":"","book":"","note":"水浴び。","id":"35530ed08f348102ac17e61143cfbeeb"},{"text":"ガルシア効果／Garcia effect","author":"","book":"","note":"初めての食物を口にし、不調をきたした場合、その味覚は長期記憶されて繰り返さない。味覚と脳内連合学習の結果。","id":"35530ed08f348102b522f2087a2666bf"},{"text":"目方／めかた","author":"","book":"","note":"物の重さ。掛け目。量目。","id":"35530ed08f348103837dd7dc21acbf5b"},{"text":"テンダーボート／tender boat","author":"","book":"","note":"陸地から船へ、あるいは船同士の間で人員や物資を輸送して船の活動を支援するためのボート。交通船、足船、連絡船などと呼ばれることも。","id":"35530ed08f348103b154d4170d0155b7"},{"text":"ヴィクトリア朝／Victorian era","author":"","book":"","note":"ヴィクトリア女王の在位期間(1837–1901)。産業革命により絶頂期を迎えたイギリスの時代。","id":"35530ed08f348103b62ed9494ff69d68"},{"text":"船級協会／Classification Society","author":"","book":"","note":"船舶の船体・艦装・機関について、その構造や現状が良好な状態にあると認め、船級の登録に関する規則を定め、その検査を行う機関。","id":"35530ed08f3481049a62f84fc5e023b3"},{"text":"クラッベ病／Krabbe disease","author":"","book":"","note":"知的障害、麻痺、失明、難聴、仮性球麻痺を引き起こすスフィンゴリピドシス (遺伝性代謝疾患の 1 つ) で、進行すると死に至る。","id":"35530ed08f348105a97cf3de86dbf392"},{"text":"ジルコン／zircon","author":"","book":"","note":"ケイ酸ジルコニウムからなる鉱物。地質学的年代測定に用いられる。地球最古の岩石から検出された例がある。","id":"35530ed08f348105b6d9ca3aa0c5c1c5"},{"text":"P 値／P-value","author":"","book":"","note":"統計的仮説検定で使用される確率値。観測されたデータが帰無仮説のもとで生じる確率。一般に 0.05 未満で「統計学的に有意」とされる。","id":"35530ed08f348106afbbd3b035f53c7c"},{"text":"バル・ミツバー／bar mitzvah","author":"","book":"","note":"ヘブライ語で「戒律の子」の意。ユダヤ教において成人とみなされる年齢に達した男児 (13 歳) を指す。女児の場合は「バト・ミツバー (Bat Mitzvah)」(12 歳) と呼ばれる。成人を祝う儀式の名称でもある。","id":"35530ed08f3481078989e1434ef015f7"},{"text":"枢要／すうよう","author":"","book":"","note":"物事の最も大切なところ。最も大切であるさま。","id":"35530ed08f3481079b04c88aaf3bcee2"},{"text":"ファンネル","author":"","book":"","note":"車両や船舶、ジェット機の烟突。帖髪やファッション伊達も含めて同名だが本項では船舶の烟突。","id":"35530ed08f348107ae35fde5af8f0f09"},{"text":"あんこ猫／黒猫","author":"","book":"","note":"黒猫の異称。古来の日本で黒猫は縁起物として喜ばれた(小豆が縁起物であることに由来)。江戸時代には黒猫を見ると、当時不治の病とされた労咳(ろうがい: 現在の肺結核)が治ると言われており、新選組の沖田総司が黒猫を飼っていたという記録も残る。","id":"35530ed08f348107bb72e24085b7957c"},{"text":"ウィンドワード／Windward","author":"","book":"","note":"風上。オアフ島東岸の呼称。リゾート地。","id":"35530ed08f34810886e5d101b515bd8f"},{"text":"probable","author":"","book":"","note":"起こりそうな。ありうる。","id":"35530ed08f348109922ecd8009160603"},{"text":"厭わしい／いとわしい","author":"","book":"","note":"不愉快で、いやである。わずらわしい。","id":"35530ed08f3481099664d49a8d0d9a88"},{"text":"cozy","author":"","book":"","note":"居心地が良い。くつろぎ。","id":"35530ed08f34810aa38fd94036bc0ee5"},{"text":"鹿爪らしい／しかつめらしい","author":"","book":"","note":"もっともらしい。堅苦しくまじめくさった感じがする。まじめぶっている。形式ばっている。","id":"35530ed08f34810bacaff66429fddaa6"},{"text":"LD50／半数致死量","author":"","book":"","note":"実験動物の半数 (50%) を死に至らしめる薬物・化学物質の投与量。毒性の強さを示す代表的指標。","id":"35530ed08f34810c9602e255bf84e9db"},{"text":"chef’s kiss","author":"","book":"","note":"「最高だ、非常にすばらしい」と表現するときに使われる。ネット用語で、皮肉に使われることもある。","id":"35530ed08f34810ca5b6d8c0274414aa"},{"text":"トイレタリー／toiletry","author":"","book":"","note":"身体の洗浄や身喙み、嗜好などを目的とした商品の総称。","id":"35530ed08f34810da7c9e7ef649c3298"},{"text":"駕御／がぎょ","author":"","book":"","note":"馬を自由に乗りこなす意。人を自分の思うままに使うこと。","id":"35530ed08f34810daef4eaab8b70f506"},{"text":"斯界／しかい","author":"","book":"","note":"この社会。その道その道の専門の社会。この道。この方面。","id":"35530ed08f34810ea195e3162ee02220"},{"text":"披瀣／ひれき","author":"","book":"","note":"考えをすべて打ち明けること。心中を包み隠さずに打ち明けること。","id":"35530ed08f34810ebfbfd9d63ab5b838"},{"text":"stewing","author":"","book":"","note":"煮込み (stew) の現在分詞・動名詞形。とろ火で長時間煮込む調理法。","id":"35530ed08f34810f827dfe462f26147a"},{"text":"axis mundi／世界軸","author":"","book":"","note":"神話学の概念。世界の中心を貫く軸。聖なる山・木・柱として表現される。","id":"35530ed08f34811094e9f4324c84e5ad"},{"text":"心算／しんさん","author":"","book":"","note":"心中(しんちゅう)の計画。こころづもり。胸算用。暗算。","id":"35530ed08f348111984ffa97ac5755d7"},{"text":"spun","author":"","book":"","note":"spin の過去分詞。紡いだ。","id":"35530ed08f3481119fa3ed02be96a57c"},{"text":"ソサエティ諸島／Society Islands","author":"","book":"","note":"王立協会がジェームズ・クックを派遣したことにちなむ。主島: タヒチ島。","id":"35530ed08f348111a7b7d58a7a427b4e"},{"text":"愛い／うい","author":"","book":"","note":"感心。けなげである。多く、目下の者に対して用いる。","id":"35530ed08f3481129297cc219b214dc8"},{"text":"mud room","author":"","book":"","note":"土間。室外で使う靴やコートなどを扱うための珄関・間取り。","id":"35530ed08f348112b631fac9b56ad4d5"},{"text":"dumbwaiter","author":"","book":"","note":"料理や食器を上下階に運ぶための小型エレベーター。食事運搬用エレベータ。","id":"35530ed08f3481139236cbf56e936005"},{"text":"薄花桜／うすばなざくら","author":"","book":"","note":"薄紅色の桜。","id":"35530ed08f3481148001e7139262048c"},{"text":"コーディレラ／Cordillera","author":"","book":"","note":"アメリカ・コロラド州のゲーテッドコミュニティ。静寂な山間の隠れ家。","id":"35530ed08f348114baa5fdc796da9d0d"},{"text":"Innocent eyes","author":"","book":"","note":"純真無垢な目。けがれを知らない眼差し。\n※Cong 用法: 赤子のような純粋な美意識を持つ視覚／目。","id":"35530ed08f3481158374f0803fdf8f72"},{"text":"patagonia／パタゴニア","author":"","book":"","note":"アルゼンチン、チリにまたがる地域。マーブル模様の美しい玪岩を産出。南米、特にブラジルで採掘された火山石はインテリアとしてキッチンの天板、テーブル、コーヒーテーブル、バスルームの表面に使用。","id":"35530ed08f348117a92be776708aa3ec"},{"text":"[ERROR-削除予定] バッチ4で誤投入","author":"","book":"","note":"耳にさわる、不快に職業をスキップ","id":"35530ed08f34811a9a53ee90fe69148b"},{"text":"バンケットホール／banquet hall・banquet room","author":"","book":"","note":"ホテルやビル、結婚式場などにある大規模な部屋や、宴会用広間のこと。「バンケット」には、大規模な会議や宴会の意味合いがある。","id":"35530ed08f34811abcefe0e058f4df41"},{"text":"ジンク／zinc","author":"","book":"","note":"亜鉛。","id":"35530ed08f34811ba4f3ec65856b9be9"},{"text":"Jynneos","author":"","book":"","note":"サル痘 (mpox) ワクチン。天然痘・サル痘予防に用いられる。FDA 承認。","id":"35530ed08f34811c8f8dd47672015056"},{"text":"デイヘッド／day head","author":"","book":"","note":"貯水タンクのないトイレ(船舶用語)。","id":"35530ed08f34811cbd76ecb6fd71c122"},{"text":"abundantly","author":"","book":"","note":"充分に。豊富な。","id":"35530ed08f34811d91acd62f3b7812fe"},{"text":"天舟／てんしゅう","author":"","book":"","note":"天を進む舟。未周達な人を天下を訪れる身とさせて助けるもののたとえ。","id":"35530ed08f34811da320f932fb7ea7d8"},{"text":"燎原／りょうげん","author":"","book":"","note":"火をつけて野原を焼くこと。勢いが激しくて防ぎとめることができない々3をいう。","id":"35530ed08f34811ea459cbee3eb13e0e"},{"text":"夜に日を継ぐ／よるにひをつぐ","author":"","book":"","note":"一日中を通して。夜も昬も休まず努力を続けること。由来『孟子』。","id":"35530ed08f34811f8096f2df72ad43fa"},{"text":"forge","author":"","book":"","note":"加熱炉。鍍える。を練る所。捱造する。着実に前進する。","id":"35530ed08f3481219c2ef93511bbe7e2"},{"text":"使嗾／しそう","author":"","book":"","note":"指図してそそのかすこと。けしかけること。","id":"35530ed08f3481228720f78ab1630507"},{"text":"カシータ／casita","author":"","book":"","note":"スペイン語で「小さな家」。主屋に黔して建てられるゲストハウスや付属棟も指す。","id":"35530ed08f348122ad8ff9edb1c7ee34"},{"text":"ブルーストーン／bluestone","author":"","book":"","note":"粗粒玄武岩・輝緑岩。Dolerite／Diabaseとも呼ばれる。ストーンヘンジで使用された。ウェールズのプレセリ丘陵が原産地とされるため「プレセリブルーストーン」とも呼ばれる。","id":"35530ed08f34812395c6fc7fc3a66680"},{"text":"ジャック&ジル／Jack and Jill","author":"","book":"","note":"“Jack and Jill (J&J)” または “Dance with a Stranger (DWAS)” というパートナーダンス競技会の一つの形態。競技カップルはリーダーとフォロアーをランダムに組み合わせてできあがる。","id":"35530ed08f34812488d1ed1ca51a95bc"},{"text":"Arclinea","author":"","book":"","note":"イタリアの高級キッチンメーカー。1925 年に Giovanni Fortuna によって創設。","id":"35530ed08f34812492fbd917892ace46"},{"text":"bulwarks","author":"","book":"","note":"防波堤。防壁。船舶の舵を上部で囲う舵偎もいう。","id":"35530ed08f348124b4cbe0107a31786e"},{"text":"鯨波／げいは","author":"","book":"","note":"大波。巨濤。また、大勢の人が一斉にあげる声。鬨の声。","id":"35530ed08f34812594f2d29955c63d0f"},{"text":"忠言／ちゅうごん","author":"","book":"","note":"真心から諫める言葉。","id":"35530ed08f348125a90ae4e8bfccfc4b"},{"text":"現世／うつしよ","author":"","book":"","note":"現在の世。この世。うつしよ。「この世」の雅語的、古語的言い方。","id":"35530ed08f348125b0d8e3c12d5e794d"},{"text":"nutrient／栄養分","author":"","book":"","note":"生物が成長・維持に必要とする物質。タンパク質、糖質、脂質、ビタミン、ミネラル等。","id":"35530ed08f34812682c9c29937365b7e"},{"text":"バグダッドテーブル／Baghdad Table","author":"","book":"","note":"世界に 10 台しか存在しないアルミ製のテーブル。イラク・バグダッド市街を立体的に造形。Edra 社製。","id":"35530ed08f34812690bbda3666f3bfd5"},{"text":"大時代／おおじだい","author":"","book":"","note":"極めて古風なさま。大げさな振る舞いや古めかしい表現のたとえにも用いる。","id":"35530ed08f3481278892ecd46b9b629a"},{"text":"テラゾ／Terrazzo","author":"","book":"","note":"花崗岩などを粉砕し、樹脂を混ぜた人工大理石。イタリア語由来。","id":"35530ed08f3481288e05eacd742c6c77"},{"text":"ギア灯台／Guia Lighthouse","author":"","book":"","note":"マカオに現存する中国最古の灯台。砦だった。","id":"35530ed08f3481298774cd93d1267612"},{"text":"掣肘／せいちゅう","author":"","book":"","note":"傍から干渉して自由な行動を妨げること。また、その妨げ。","id":"35530ed08f3481298c91cd7ce01f95e3"},{"text":"コーナーケース／corner case","author":"","book":"","note":"複数の境界条件が同時に発生する稀な状況。ソフトウェアテストで考慮すべき例外的ケース。","id":"35530ed08f34812a8389de891f98fbac"},{"text":"カラードコイン／colored coin","author":"","book":"","note":"用途を明記された暗号通貨。特定の用途(例: 犯罪)に使われた通貨を識別できる。","id":"35530ed08f34812a8ee0fc8e56cc9a56"},{"text":"ポトラッチ／potlatch","author":"","book":"","note":"北太平洋沿岸のアメリカインディアンの儀礼で、公的な地位を誇示するために自分の富を分配する行為をいう。チヌーク族の用語で「贈答」を意味し、オレゴン州北部からアラスカ州南部にかけて、トリンギット、チムシアン、ハイダ、ベラ・クーラ、南・北クワキウトル、沿岸サリッシュ、下チヌークの諸民族の間で行われる。主催者の地位により大小さまざまの祝宴が開かれ、近隣の人々を招き、その階級に応じて贈物をする。","id":"35530ed08f34812a9564c2c14389b9bf"},{"text":"キットバッシング／kitbashing","author":"","book":"","note":"市販のキットの部品をオリジナルのモデルや他のキットに組み込んで、新たなモデルを作る手法。","id":"35530ed08f34812bb93dd23dad88b4aa"},{"text":"オルソポックスウイルス属／Orthopoxvirus","author":"","book":"","note":"DNA ウイルスで、天然痘、サル痘、牛痘、ラクダ痘などを含む。","id":"35530ed08f34812d80c2e3090bb71eb4"},{"text":"繊手／せんしゅ","author":"","book":"","note":"しなやかで美しい手。主に女性の手をいう。","id":"35530ed08f34812e85bade7724d42cc7"},{"text":"どた靴","author":"","book":"","note":"ゆるかったり、重かったりして歩くたびにどたどた音をたてるような、ぶかっこうな靴。","id":"35530ed08f34812e9890ccf57c3b2eb9"},{"text":"泰山府君／たいざんふくん","author":"","book":"","note":"中国、山東省の東岳泰山の神に対する古称。人間の生死、寿命、官位および死後の審判をつかさどり、生前に罪を犯した者はその魂を拘引し、地底の獄に投じて懲罰すると考えられたから、仏教の閻魔王に相当する冥府の神。","id":"35530ed08f34812ebd5ef0f9189c503d"},{"text":"吝か／やぶさか","author":"","book":"","note":"ざんばらに思うさま。ためらうさま。「吝かではない」と使う場合、「進んでそうしたい」の意。","id":"35530ed08f34812fb49be1cec52103f1"},{"text":"プレートライト／Plate Light","author":"","book":"","note":"照明システム。同じカメラで複数の照明設定を同時にそれぞれが記録。多方向から必要なライトを当て、編集作業時に選択可能。『ソー：ラブ＆サンダー』で初使用。","id":"35530ed08f348130a53ce8c1ad3159f7"},{"text":"bow／船首","author":"","book":"","note":"船首。","id":"35530ed08f34813189faf491b59dd52d"},{"text":"カラーラ大理石／Carrara marble","author":"","book":"","note":"イタリア・トスカーナ地方产の白い大理石。ダビデ像に使用されたことで著名。","id":"35530ed08f348132bd26f77f80890ae6"},{"text":"den","author":"","book":"","note":"私室。書斎。小部屋。","id":"35530ed08f348134914ce829285d5a71"},{"text":"lumbering","author":"","book":"","note":"(米・カナダ) 製材業。重そうにぎこちなく動く。","id":"35530ed08f348134a780c547a1cf1474"},{"text":"intriguing","author":"","book":"","note":"好奇心をそそる。興味を引く。","id":"35530ed08f348134b12ee4cc7d7c1aff"},{"text":"exist","author":"","book":"","note":"存在する。","id":"35530ed08f3481368756f971275a8f94"},{"text":"認知的不協和／cognitive dissonance","author":"","book":"","note":"相反する価値観と接したとき、葛藤を覚えながらも培ってきた価値観を棄てられず、代わりに相反する価値観を否定しようとする。","id":"35530ed08f34813690b7e3ff38d61026"},{"text":"幔幕／まんまく","author":"","book":"","note":"式場などに長く張りめぐらす幕。","id":"35530ed08f34813695eceb4200ca5510"},{"text":"にもかかわらず／in spite of","author":"","book":"","note":"ティリッヒ神学の核を為す考え。神・イエスにもかかわらず罪人として処刑された逆説。「勇気とは『それ』にもかかわらず、自己を肯定すること」パウル・ティリッヒ『The Courage to Be』。","id":"35530ed08f348137ab84fda2adf5b0bb"},{"text":"認知的完結欲求／cognitive need for closure","author":"","book":"","note":"物事に対して確固たる安定した答えを求め、曖昧な状況を嫌い避ける心理学的傾向。判断の早期固定や情報探索の打ち切りを促し、認知バイアスの一因となる。","id":"35530ed08f3481388615f45c2cc07c98"},{"text":"運否天賦／うんぷてんぷ","author":"","book":"","note":"運命・運不運を天にまかせること。なりゆきまかせ。","id":"35530ed08f348138879be0414d0bfba2"},{"text":"モーション・コントロール・システム","author":"","book":"","note":"カメラの動いた位置・角度を記録して再現可能にし、視覚効果に使うシステム。バーチャルカメラの先駆。初期は歯車式、現代はコンピュータ制御。","id":"35530ed08f3481399963e41bcbb36921"},{"text":"イブン・スィーナー／Ibn Sīnā／アヴィセンナ","author":"","book":"","note":"中央アジア・ブハラ出身の哲学者・医学者(c.980–1037)。ラテン名アヴィセンナ (Avicenna)。18 歳で形而上学以外の万学を究めた「第 2 のアリストテレス」「イスラム世界が生み出した最高の知性」と評される。愛弟子アル・ジュザジャーニーによると、スィーナーは通読せず問題を真っ先に読み、それに対する著者の答えを読み取る読書をしていた。","id":"35530ed08f348139aa25e050d7ae69b7"},{"text":"イペ／ipe","author":"","book":"","note":"別名「パオロべ」。年輪や杉目に乏しく、南方材らしく密に詰まった材質をしている。色は薄褐色から暗色の帯のものまでかなり幅広く、辺材は黄白色。ヴァイオリン属の楽器の弓材の、希少なブラジルボク(フェルナンブーコ)の代替材として世界で評価されている。","id":"35530ed08f34813a878bd6185ee5a694"},{"text":"ニオブ／niobium","author":"","book":"","note":"安定した性質の金属。元素記号 Nb、原子番号 41。鉄鋼製品の耐久力強化に使われることが多く、世界最大の鉱床はブラジルとカナダにある。","id":"35530ed08f34813a89c3c91f9aba1cd7"},{"text":"直中／ただなか","author":"","book":"","note":"まんなか。ちょうどその中央。また、ひたすらそのことをしているとき。","id":"35530ed08f34813a9db2faff77d64699"},{"text":"ハマム／hammam","author":"","book":"","note":"トルコや中東諸国の伝統的な公衆浴場(蒸し風呂)。アラビア語の「ḥammām(熱する、温める)」に由来。","id":"35530ed08f34813c9df5ff3989035e26"},{"text":"ブーム／boom","author":"","book":"","note":"撮影や収録スタジオで、マイクロフォンなどを出演者の声の届く範囲で、カメラの収録する範囲の外 (主に上方) に配置できるようにした、吊り下げる装置。先端にマイクロフォンをつけ、反対側の端にはバランスのとれるようにおもりをつけている。","id":"35530ed08f34813ca160e49fd002a936"},{"text":"サケイ／沙鶏","author":"","book":"","note":"乾燥地帯に生息する鳥類。羽毛に水分を染み込ませ、運搬できる。","id":"35530ed08f34813ca8b8daa869c5dbd8"},{"text":"黒禍論／こかわろん","author":"","book":"","note":"黒狼・黒き色の者が増えるとき、世に禍がもたらされる。太古の言い伝え。\n※ウルフバース設定語。","id":"35530ed08f34813d87d2fff70f2e2239"},{"text":"ヘリンボーン／杉綾織","author":"","book":"","note":"杉綾織。杉の葉のような山形に綾織した服地。床材のデザインとしても使われる。","id":"35530ed08f34813dadaee4c9d4039b8b"},{"text":"爪牙／そうが","author":"","book":"","note":"つめときば。嫌邪しい敵やライバル。身を守り、人を攻撃するための道具。同原は主君を助け、敵を防ぐ者。","id":"35530ed08f34813e8efbc01cce10a683"},{"text":"ブラス／brass","author":"","book":"","note":"真鍮。黄銅。銅と亜鉛の合金。","id":"35530ed08f348140a37df07dc1a1a78e"},{"text":"patagonia／パタゴニア","author":"","book":"","note":"アルゼンチン、チリにまたがる地域。マーブル模様の美しい玪岩を産出。南米、特にブラジルで採掘された火山石はインテリアとしてキッチンの天板、テーブル、コーヒーテーブル、バスルームの表面に使用。","id":"35530ed08f3481418f6dd9e0dd4b3a17"},{"text":"plaintiff","author":"","book":"","note":"原告。","id":"35530ed08f348142970dca9af537f0d7"},{"text":"うっそりと","author":"","book":"","note":"ぼんやりと、のんびりとした様子。また、ひっそりと、人気のない様子。","id":"35530ed08f348142aba1c50259dbaf4e"},{"text":"スウェード／suede","author":"","book":"","note":"語源はスウェーデン。子羊の皮で作られることが多かったが、現在は子牛の皮で作るのが主流。表面をバフさせてやわらかな起毛を出した革。","id":"35530ed08f34814495a7c210cacd4449"},{"text":"不帰／ふき","author":"","book":"","note":"二度と戻らないこと。とくに、人が死ぬこと。","id":"35530ed08f3481468f4ce55fe1956d48"},{"text":"トロッカー／trocar","author":"","book":"","note":"葬儀屋の道具。空洞を持つ槍様。吸引器と接続し、体内の臓器から液体を抜き取る。","id":"35530ed08f348146b796d1e1778fad73"},{"text":"アトリビュート／attribute","author":"","book":"","note":"西洋美術において、特定の人物・キャラクター・神話・宗教の象徴を識別するための物や特徴を指すシンボル。聖人や神格の持ち物(鍵、剣、書物など)が代表例。","id":"35530ed08f34814792e7f63805ea6b5c"},{"text":"バズカット／buzz cut","author":"","book":"","note":"坊主頭。底側をバリカンで刈り上げるスタイル。","id":"35530ed08f348147a12dcb1d3f20f238"},{"text":"ティエラ・デル・フエゴ／Tierra del Fuego","author":"","book":"","note":"南アメリカ大陸最南端の諸島。スペイン語で「火の土地」の意。","id":"35530ed08f348147ab9bdd2da8d13f74"},{"text":"かいな／腕","author":"","book":"","note":"「うで」の古い言い方。肩からひじまでの部分。二の腕。また、肩から手首までの部分もいう。\n※接尾の助数詞: 手を動かして舞うところから、舞の手を数えるのに用いる。","id":"35530ed08f348147bb0afb8de7029bfe"},{"text":"武辺者／ぶへんしゃ・ぶへんもの","author":"","book":"","note":"武芸にたずさわる人。武士。武人。","id":"35530ed08f348148921afbc18f9810f7"},{"text":"神韻縹渺／しんいんひょうびょう","author":"","book":"","note":"そこはかとなく、きわめてすぐれた趣という意味で、芸術作品などがたいへんにすぐれているさまをいう。「神韻」は、神わざとしか思えないようなすぐれた趣のこと。「縹渺」は「縹緲」とも書き、かすかではっきりしないさま。","id":"35530ed08f3481498368cba16d8f2898"},{"text":"astroturf","author":"","book":"","note":"スポーツ用の人工芝。","id":"35530ed08f34814a9c28e95bb27face4"},{"text":"裳裾／もすそ","author":"","book":"","note":"下半身に着るスカート状の衣類の裾。","id":"35530ed08f34814cb879cb72c5370f77"},{"text":"カンチレバー／cantilever","author":"","book":"","note":"① レコードを再生するカートリッジの一部分。針先と発電部を結合する棒状のもので、アルミやチタン、ボロン、サファイアなどでできている。\n② 片持棁。一端を固定してもう一端を自由にした棁。","id":"35530ed08f34814d8ee9fb124c350cb8"},{"text":"コーリアン石／Corian","author":"","book":"","note":"メタクリル樹脂を原料とした、世界初のアクリル系人工大理石。デュポン社開発。","id":"35530ed08f34814e9d8de95cab36506f"},{"text":"悍馬・駻馬／かんば","author":"","book":"","note":"荒れっぽい性質の馬。","id":"35530ed08f34814fb1e2e53bde063135"},{"text":"招請／しょうせい","author":"","book":"","note":"礼を尽くして招き請うこと。招待。","id":"35530ed08f34814fbb2cd11f7d9da9f4"},{"text":"tidally","author":"","book":"","note":"潮の。潮汐に関する。","id":"35530ed08f34814fbfc6c06b8b104cd1"},{"text":"ルビンのつぼ／Rubin's vase","author":"","book":"","note":"反転図形・多義図形。错覚を利用したトリックアート。デンマークの心理学者エドガー・ルビンが提示した、背景と図の認知が反転する多義図形。","id":"35530ed08f3481509806ff7f7727c55d"},{"text":"sauce head","author":"","book":"","note":"映画用語。頭が吹っ飛ぶ様。映画『ターミネーター 2』で T-1000 の視覚効果に用いられたことが切っ掛け。","id":"35530ed08f34815184dadc16809047e9"},{"text":"ヌック／nook","author":"","book":"","note":"「こぢんまりとして居心地のよい空間」のこと。スコットランドの「neuk (ヌーク)」が語源と言われており、「温かくて心地のよい場所」という意味がある。","id":"35530ed08f3481519380f8acc1c6d1b5"},{"text":"水溶性ビタミン","author":"","book":"","note":"B 群、C。酶素の役割を担う。体内に蓄積されず毎日の摂取が欠かせない。","id":"35530ed08f348152a619ecef9cf7b6fd"},{"text":"古色蒼然／こしょくそうぜん","author":"","book":"","note":"いかにも年月を経たように見えるさま。ふるびた色の現われているさま。","id":"35530ed08f34815396b3fea53cb8f955"},{"text":"慕情／ぼじょう","author":"","book":"","note":"恋い慕う気持ち。慕わしく思う情。","id":"35530ed08f3481539815f714eaafef36"},{"text":"goldilocks","author":"","book":"","note":"金髪の美女。人の家に忍び込み食料品を食べたりするが、金目のものは盗まないどろぼう。童話「ゴルディロックスと三匹のくま」の主人公。転じて「ちょうどよい」状態を示す比喩 (例: ゴルディロックスゾーン = 生命が存在しうる惑星軌道)。","id":"35530ed08f3481548532e74efa622c6e"},{"text":"sanitary／サニタリ","author":"","book":"","note":"キッチンを除く、トイレ、浴室、洗面室など、衛生のための水まわり設備をもつ空間を総称する用語。衛生的な、公衆衛生のという意味の形容詞である英語の sanitary の意味が、日本で特化し、衛生を保つ場所やそのために必要な設備を指すようになった。そのなかの小物や設備も含む。欧米で多く見られるのは、寢室に隣接して浴室、洗面所、トイレなどの機能をひとつにまとめたバスルームを設ける形。","id":"35530ed08f348155b4a4e3f4347ff75c"},{"text":"テンダーボート","author":"","book":"","note":"陸地から船へ、あるいは船同士の間で人員や物資を輸送して船の活動を支援するボート。交通船、足船、連絡船などとも呼ばれる。","id":"35530ed08f348158863ac0b94e16103d"},{"text":"杞憂の故事／きゆうのこじ","author":"","book":"","note":"中国の古典「列子」に由来。杞の国に天が落ち、地が崩れると心配して食事も睡眠も取れなくなった人がいた。見かねた人が説得し、安心させたという説話が語源。「杞人憂天(きじんゆうてん)」という成語もある。杞人は太陽や月、星が落ちてくることも心配していた。","id":"35530ed08f3481599454f7a161691e50"},{"text":"アジャイル／agile","author":"","book":"","note":"柔軟で迅速な。ソフトウェア開発手法としては、短い反復を繰り返しながら要件を柔軟に取り込み開発を進めるアプローチ。","id":"35530ed08f348159b55ff0139502fdd1"},{"text":"eely","author":"","book":"","note":"ウナギのような。","id":"35530ed08f348159bdbaf4fb54b7b9b1"},{"text":"禾穀／かこく","author":"","book":"","note":"稲。また、稲、麦、アワ、ヒエ、キビなどの総称。","id":"35530ed08f34815aaecac0dda13bb348"},{"text":"アマゾナイト／amazonite","author":"","book":"","note":"微斜長石と呼ばれるカリウム長石の一種である緑色のテクトシリケート鉱物。最初にアマゾン川で採れたかは定かではない。","id":"35530ed08f34815bac74c8d07d9c14eb"},{"text":"オロパナ／Olopana","author":"","book":"","note":"ハワイの酣長。","id":"35530ed08f34815cacc5f33719ba5cc2"},{"text":"サンゴネラン","author":"","book":"","note":"ラン科の小型植物。塵ほどの種子を持つとされる。","id":"35530ed08f34815d84f4e5b1af739d39"},{"text":"トロポポーズ／tropopause","author":"","book":"","note":"対流圏と成層圏の境界面。地表から高さ 7・8 km から十数 km のところにある。","id":"35530ed08f34815d8573e3d524a7fc32"},{"text":"Foiler／水中翼帆走艇","author":"","book":"","note":"水中翼帆走艇。水面から浮き上がって航行するヨット。40 ノットで 40 度ターンオーバー可能。","id":"35530ed08f34815d98c1c8eb6d76759a"},{"text":"feasible","author":"","book":"","note":"(計画・案などが) 実現可能な、実行可能な。","id":"35530ed08f34815da779e9dec8e3b2cc"},{"text":"フルーテッド／fluted","author":"","book":"","note":"縞模様。柱・グラス・衣類などに見られる、縦の溝を並べた装飾パターン。","id":"35530ed08f34815daa5acb0bafeda808"},{"text":"Gaggenau","author":"","book":"","note":"1683 年にドイツで創立されたビルトインキッチン機器メーカー。","id":"35530ed08f34815e8a22d4269f38d698"},{"text":"vital part","author":"","book":"","note":"軍艦における「重要防御区画」をいう概念。VP と略されることがある。破壊された場合致命的であることから転じて、軍艦設備でなくても使われることがある。","id":"35530ed08f34815ea303fff55c079943"},{"text":"カバナ／cabana","author":"","book":"","note":"ビーチやプールの近くでよく見られるシェルターの一種。","id":"35530ed08f34815fa567dedc0b6906b3"},{"text":"ビデオロッタリーターミナルズ／VLT","author":"","book":"","note":"スロットマシンととてもよく似たもので、ボタンを押すかハンドルを引くかしてリールを回転させる。米国先住民が経営する実店舗カジノでよく見られるゲーム。ペイアウト率が 9 割に満たない運ゲー事。","id":"35530ed08f34815fb11ad8c52d7b0a94"},{"text":"パンテオン／pantheon","author":"","book":"","note":"ある人々に信じられている神々。もとはローマの万神殿。","id":"35530ed08f3481608702f3f329a153ef"},{"text":"Schedule 1","author":"","book":"","note":"米国管理物質法 (Controlled Substances Act) における最も厳格な規制カテゴリ。医療用途が認められず、乱用の危険性が高いとされる物質を指定。ヘロイン、LSD、MDMA、サイロシビンなど。","id":"35530ed08f348160b348cbcbe9de4855"},{"text":"Pebble Technology International","author":"","book":"","note":"プール仕上げメーカー。","id":"35530ed08f348161b13ee79e1b335f2e"},{"text":"ドレインチューブ／drain tube","author":"","book":"","note":"葬儀屋の道具。細いステンレス製のシリンジ様。静脈に差しこみ、バーを引いてから血液を抜き取る。ピストンの長さで排出速度を調整可能。","id":"35530ed08f348161b49cee1374e8614f"},{"text":"バーンドア／barn door","author":"","book":"","note":"アメリカの納屋や倉庫で使われていたスタイルの引き戸。英語の barn(納屋)に由来し、納屋に使われるようなドアを意味する。","id":"35530ed08f3481628bf5e1587d04fc7a"},{"text":"醇乎／じゅんこ","author":"","book":"","note":"心情・行動などが、まじりけがなく純粋なさま。","id":"35530ed08f34816380ace905a6a1c937"},{"text":"痞え／つかえ","author":"","book":"","note":"のどや胸につかえる感じ。胸のつかえ。","id":"35530ed08f348164806af5cd41fa7a86"},{"text":"「目には目をといって 世界は堕落した」","author":"マーカス","book":"原文: \"An eye for an eye and the world goes blind.\"","note":"---\n『Detroit: Become Human』(Capitol Park, 平和ルート)","id":"35530ed08f348164af74de587865e7c9"},{"text":"コーキング材","author":"","book":"","note":"建築現場などで気密性・防水性を保持するためや、施工場所の隔間を埋めるための可塑剤。","id":"35530ed08f348164b2c0fdeca99bd863"},{"text":"privileged","author":"","book":"","note":"特権的な。","id":"35530ed08f348165bc28f8bba4deca46"},{"text":"アラエウラ／Hawaiian Gallinule","author":"","book":"","note":"ハワイ伝承に登場する鳥。火起こしの術 (白檀＋ハウの木) をマウイに脅迫されたとされる。罰として燃えさしを押し当てられ、嘴に赤いラインが残ったという。","id":"35530ed08f3481669be5e924e9f3f51c"},{"text":"縦深／じゅうしん","author":"","book":"","note":"軍隊で、戦線に配置された部隊の最前線から後方の部隊までの縦の深さの距離。縦隊の場合は最先頭の兵士から最後尾の兵士までの距離をいう。敵に向かって垂直の線をさし、水平の線は正面と称する。","id":"35530ed08f348166b871e9af59c45868"},{"text":"ドクイトグモ／Loxosceles","author":"","book":"","note":"アメリカ合衆国の亜熱帯地域 (テキサス州からジョージア州) 原産。くすんだオレンジ色～赤褐色の脚が細い。頭胸部背面にヴァイオリンによく似た形の褐色の斑紋をもつ。稀に全身性症候群を誘発。","id":"35530ed08f348166b959ee9077e4b2c0"},{"text":"悪貨は良貨を駆逐する／グレシャムの原則","author":"","book":"","note":"品位量目の違う二種の貨幣に、同一の名目価格をつけて流通させる時、実質価値の高い貨幣は蓄蔵されたり、地金として使用されたりして市場から姿を消し、実質価値の低い貨幣のみ残るというもの。","id":"35530ed08f3481678073fb6a2c6baab4"},{"text":"ヒュミドール／humidor","author":"","book":"","note":"葉巻用保管庫。ラテン語「humidus／湿っている」に由来。","id":"35530ed08f348168b39ac3a9be28609d"},{"text":"カラン","author":"","book":"","note":"蛇口。語源はオランダ語で「鶴」を意味する kraan。銅湯などで一般的な表記。","id":"35530ed08f348168b5f8e258dd79076b"},{"text":"brain stem","author":"","book":"","note":"脳幹。","id":"35530ed08f3481699cabd9087f84a30d"},{"text":"La Cornue／ラ・コルニュ","author":"","book":"","note":"フランスのオーブンおよび調理レンジメーカー。1908年、創業者 Albert Dupuy が世界初の対流式オーブンを開発。","id":"35530ed08f3481699d6eda28e5df55f1"},{"text":"エクスプローラーヨット／explorer yacht","author":"","book":"","note":"長距離航海・遠隔地探検向けに設計された大型ヨット。高い航続距離・耐久性・自給能力を備える。","id":"35530ed08f348169a79bdcfc411003a5"},{"text":"叱正／しっせい","author":"","book":"","note":"他人の書いたものの欠点を遠慮なく直すこと。詩文の添削を請う時に謙逑していう語。斧正(ふせい)。批正。","id":"35530ed08f34816bb492ec644fc7c0f7"},{"text":"ノースショア／North Shore","author":"","book":"","note":"オアフ島北部の呼称。サーフィンの名所・聖地。","id":"35530ed08f34816bb695c65447138f25"},{"text":"アルカンターラ／Alcantara","author":"","book":"","note":"イタリア製の人造皮革。68% のポリエステルと 32% のポリウレタン。東レの岡本三宜博士開発。","id":"35530ed08f34816c914ce452cf774828"},{"text":"balmy","author":"","book":"","note":"心地よい。穏やかな。温かくてさわやかな (気候など)。","id":"35530ed08f34816da855f3a366818f96"},{"text":"切歯扼腕／せっしやくわん","author":"","book":"","note":"歯ぎしりをして自分の腕をにぎりしめること。憤慨したり、くやしがったりするときの様子にいう。","id":"35530ed08f34816eb1a9e6f325ea86f4"},{"text":"sleek","author":"","book":"","note":"つるつるとした、滑らかな。スマートな、洗練された。すらりとした、引き締まった。うまくまとめた、簡潔な。","id":"35530ed08f3481708d4fc5a2175d6851"},{"text":"自由簧／じゅうこう","author":"","book":"","note":"フリーリード。気息で振動するリード楽器の発音体。笙、ハーモニカ、アコーディオンなどで使用される。","id":"35530ed08f3481709c02d0d78825986c"},{"text":"卓見・達見／たっけん・たつけん","author":"","book":"","note":"前者はすぐれた意見・見識のこと。後者は広い見通しを持ったすぐれた見解のこと。","id":"35530ed08f348170b94dd913c0e8417a"},{"text":"夾雑物／きょうざつぶつ","author":"","book":"","note":"不純物。","id":"35530ed08f34817194bfcfd8c756d940"},{"text":"persist","author":"","book":"","note":"(困難に屈せず) 続行する、根強く残る。固執する。","id":"35530ed08f348171abd4e6942c55dc27"},{"text":"吐根／トコン／ipecac","author":"","book":"","note":"ネイティブアメリカンが古くから使う催吐剤の薬草。ルイ 14 世の赤痢を治癒したことからアメーバ赤痢に効く薬草として広まった。","id":"35530ed08f348171bdcbf5f35b78aa4f"},{"text":"ポートホール／舷窓","author":"","book":"","note":"船舶の側面に設けられた円形の小窓。","id":"35530ed08f348172890fc123921cbceb"},{"text":"額ずく／ぬかずく","author":"","book":"","note":"額を地につけて礼拝する。丁寧に礼をする。","id":"35530ed08f3481728f8bc30ae7d64833"},{"text":"烈士／れっし","author":"",
