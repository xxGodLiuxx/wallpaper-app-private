"book":"","note":"気性がはげしく、自分の信念をもって一途に行動する人。強い信念を持って、勇ましく活動する者。正義のために命を投げ出した人、またその人に与えられる尊称。","id":"35530ed08f3481729450c5798f735079"},{"text":"オーニング／awning","author":"","book":"","note":"日よけ。雨覆い。建物の窓や出入り口、テラスなどに取り付ける可動式のカバー。","id":"35530ed08f348172acf5f98b3e11d77d"},{"text":"カルダシェフ・スケール／The Kardashev scale","author":"","book":"","note":"文明の発達度を、利用できるエネルギー量で分類する尺度。ソビエトの天文学者ニコライ・カルダシェフ提案。Type I (惑星規模)、II (恒星規模)、III (銀河規模) など。","id":"35530ed08f348172afb1dbf8618526bd"},{"text":"泣訴／きゅうそ","author":"","book":"","note":"泣いて訴えること。","id":"35530ed08f348172ba3fdfff73e902b3"},{"text":"ケーソン／caisson","author":"","book":"","note":"土木、建築工事で、地下に沈めて基礎とする鉄筋コンクリートや鉄の筒または箱。潜函(せんかん)。","id":"35530ed08f34817481b0dc8017be61eb"},{"text":"汀／みぎわ","author":"","book":"","note":"波打ち際。水辺。","id":"35530ed08f3481748946d2368755897d"},{"text":"幽邕／ゆうすい","author":"","book":"","note":"奥深くてもの静かなこと。","id":"35530ed08f348174a16ae35103369dda"},{"text":"群狼／ぐんろう","author":"","book":"","note":"群れをなす狼。また、その比喩。","id":"35530ed08f34817581a2e1eeab046f15"},{"text":"弔悼／ちょうとう","author":"","book":"","note":"人の死を弔い、哀悼の意を表すこと。","id":"35530ed08f34817684e5f1794967a82d"},{"text":"玄妙／げんみょう","author":"","book":"","note":"奥深く微妙であること。極めて優れて言葉では表しがたいこと。","id":"35530ed08f3481799798f6c67abe16f5"},{"text":"キャラメル","author":"","book":"","note":"砂糖＋牛乳。低温(120℃)で作るため柔らかい食感。","id":"35530ed08f348179a2b9c97c7e55cf7c"},{"text":"動静／どうせい","author":"","book":"","note":"物事や人の状況・動向。動きや静けさの様子。","id":"35530ed08f34817ba132e28fb8a4576a"},{"text":"glossary","author":"","book":"","note":"用語集。巻末に付される語句とその意味のリスト。","id":"35530ed08f34817badcdce84f28e709e"},{"text":"あえか","author":"","book":"","note":"① 触れれば落ちるようなさま。危なっかしい様子。\n② 容姿や気持などがかよわく、なよなよとしたさま。きゃしゃであるさま。ふつう若い女性に関して用いられ、上品で美しいという感じを伴うことが多い。\n③ 自然の景物や夢、希望などのはかなげで美しいさま。","id":"35530ed08f34817ca0fdcfe7cf17e6d1"},{"text":"矢庭に／やにわに","author":"","book":"","note":"その場で、時間もかけないで一気に事を行なうさまを表わす語。直ちに。たちどころに。","id":"35530ed08f34817d92a6e161cdae8dae"},{"text":"絶佳／ぜっか","author":"","book":"","note":"すぐれて美しいこと。景色などについて ook":"","note":"山形が繰り返されるジグザグ型の縞柄。シェブロンは軍服の腕章などの山形を意味する。","id":"35530ed08f34818a8a48db02a94f14a4"},{"text":"エンボス・デボス加工","author":"","book":"","note":"金属板、樹脂、紙に凹凸を付けて文字・絵柄を浮き彫りにする加工。エンボス(emboss)は凸加工、デボス(deboss)は凹加工。","id":"35530ed08f34818a8c2de15e9b2b6fa7"},{"text":"マナイアカラニ／Manaiakalani","author":"","book":"","note":"ハワイ神話で半神マウイが島々を釣り上げたとされる魔法の釣り針。","id":"35530ed08f34818b8544e71de7bf991a"},{"text":"アッシュウッド・クラッディング／ashwood cladding","author":"","book":"","note":"アッシュ材 (タモ・トネリコ材) を用いた外装材・内装パネル。建物の壁面仕上げに使用される。","id":"35530ed08f34818b9ce1f19170023f7a"},{"text":"刺突／しとつ","author":"","book":"","note":"突き刺すこと。","id":"35530ed08f34818ba465d172948882a5"},{"text":"primitive","author":"","book":"","note":"原始的な。","id":"35530ed08f34818ba927f456a862b480"},{"text":"リーワード／Leeward","author":"","book":"","note":"風下。オアフ島西岸の呼称。","id":"35530ed08f34818bb24eefe136931917"},{"text":"夜さり","author":"","book":"","note":"夜になる頃。夜間。","id":"35530ed08f34818c88b3ff26caf0ddd7"},{"text":"cozy","author":"","book":"","note":"居心地がよい。くつろぎ。","id":"35530ed08f34818d9ef3d1a22eaf7d9f"},{"text":"憩って／いこって","author":"","book":"","note":"「憩う(いこう)」の連用形。休む。休息する。","id":"35530ed08f34818daa4dc21ddcef8944"},{"text":"ドーマー／dormer","author":"","book":"","note":"屋根に突き出して設けられた小窓。屋根裏部屋の採光・換気に用いる。","id":"35530ed08f34819082d3d1d6cdcaff4e"},{"text":"朱殷／しゅあん","author":"","book":"","note":"時間が経った血のような暗い朱色。凄惨な様子を表現する色として使われる。","id":"35530ed08f348191916ce29610d90fd4"},{"text":"爽気／そうき","author":"","book":"","note":"さわやかな空気。すがすがしい気分・気配。","id":"35530ed08f34819284b7d3b131b32dd0"},{"text":"無かりせば","author":"","book":"","note":"「なし」の連用形「なかり」＋過去の助動詞「き」の未然形「せ」＋接続助詞「ば」の複合。「もしなかったならば」の意。","id":"35530ed08f348192aa98d596697258ea"},{"text":"詳解／しょうかい","author":"","book":"","note":"くわしく解釈すること。詳しい解説。","id":"35530ed08f348192b4a7fd36b85e594a"},{"text":"LCAC／Landing Craft Air Cushion","author":"","book":"","note":"エア・クッション型揚陸艇。エルキャック。\nスペック例: 全長 26.80 m (スカート込) / 最大幅 14.33 m (スカート込) / 艦体全長 24.69 m / 艦体幅 13.31 m / 満載排水量 166.6 トン / 軽荷排水量 87.9–93.4 トン / 吃水 0.78 m。","id":"35530ed08f348193860fc92b8e5baa13"},{"text":"hallway","author":"","book":"","note":"廟下。廀下。","id":"35530ed08f3481939b3dc329bf06f285"},{"text":"カバナ／cabana","author":"","book":"","note":"ビーチやプールの近くでよく見られるシェルターの一種。","id":"35530ed08f3481959ba2e05b386a4cc1"},{"text":"キャベンディッシュバナナ／Cavendish banana","author":"","book":"","note":"一般的な食用バナナ。種子ではなくクローンで栽培される。","id":"35530ed08f34819695d3e64ab80aa728"},{"text":"Butler’s pantry","author":"","book":"","note":"台所に隣接した送迫部屋やパントリー。主に高級住宅で見られる。","id":"35530ed08f3481969794d0955110946f"},{"text":"ボスポラス海峡／Bosporus","author":"","book":"","note":"黒海とマルマラ海を結ぶトルコの海峡。アジアとヨーロッパを分ける境界。ギリシャ語で「牽牛の渡渉」の意。イスタンブールが両岸に広がる。","id":"35530ed08f3481969ff5fe4f0877a77a"},{"text":"brown dwarf／褐色矮星","author":"","book":"","note":"恒星と惑星の中間的天体。質量が太陽の約 0.08 倍未満で、水素核融合を維持できない天体。","id":"35530ed08f348196bbc8c409756a11cd"},{"text":"water feature","author":"","book":"","note":"庭の作りで水を使った物の総称。噴水、滁、池、人工川などを含む。","id":"35530ed08f348197af09db2f93d92b3d"},{"text":"ジャック＆ジル／Jack and Jill","author":"","book":"","note":"\"Jack and Jill (J&J)\" または \"Dance with a Stranger (DWAS)\" というのはパートナーダンス競技会の一つの形態で、そこでは競技カップルはリーダーとフォロアーをランダムに組み合わせてできあがる。","id":"35530ed08f348197b598c7d069420b33"},{"text":"ペルソナ・ノン・グラータ／persona non grata","author":"","book":"","note":"ラテン語「好ましくない人」。外交使節を交換している国家間で、接受国が派遣国に対し、外交使節団の構成員 (外交使節および職員) である特定の者の受け入れ、滑在を拒否する通告。接受国は、いつでも、理由を示さないで、特定の外交官がペルソナ・ノン・グラータであると通告できる (外交関係に関するウィーン条約 9 条 1)。","id":"35530ed08f34819893bdf34ab2445987"},{"text":"兢兢／きょうきょう","author":"","book":"","note":"恐れつつしむさま。わなないて慎むさま。","id":"35530ed08f348198a722c6fa788151a4"},{"text":"ジャーヘッド／jarhead","author":"","book":"","note":"坑主頭のようなミリタリーカット。米海兵隊員を指す俗語としても使われる。","id":"35530ed08f348198a909dfd6c4386501"},{"text":"lash out at","author":"","book":"","note":"食ってかかる。激しく非難する。","id":"35530ed08f34819982f0fae6e00655bb"},{"text":"戦塵／せんじん","author":"","book":"","note":"戦争の埃。戦場の塵。比喩的に戦乱の世。","id":"35530ed08f348199a172cc567092fb29"},{"text":"topological／トポロジカル","author":"","book":"","note":"[一般
